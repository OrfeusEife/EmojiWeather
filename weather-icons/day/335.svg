<svg width="233" height="200" viewBox="0 0 233 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- TŁO: RADIALNY GRADIENT ZANIKAJĄCY DO PRZEZROCZYSTOŚCI -->
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#4A9FD8" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#2E7DBC" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1A5A8A" stop-opacity="0"/>
    </radialGradient>

    <!-- CHMURA: JASNA, PUSZYSTA -->
    <radialGradient id="cloudGrad" cx="30%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="45%" stop-color="#F0F4F8"/>
      <stop offset="80%" stop-color="#D0E0EC"/>
      <stop offset="100%" stop-color="#A0B8CC"/>
    </radialGradient>

    <!-- PŁATEK ŚNIEGU -->
    <radialGradient id="snowflake" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#D0E8FF" stop-opacity="0.6"/>
    </radialGradient>

    <!-- FILTRY -->
    <filter id="cloudShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#3A6A8A" flood-opacity="0.3"/>
    </filter>
    <filter id="snowGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
    <filter id="snowShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0.5" dy="0.5" stdDeviation="0.5" flood-color="#1A4A6A" flood-opacity="0.4"/>
    </filter>
  </defs>

  <style>
    .bgLayer {
      animation: bgPulse 6s ease-in-out infinite;
    }
    .cloudMove {
      animation: cloudFloat 5s ease-in-out infinite;
    }
    .snowflake {
      animation: fallHeavySnow 2.8s ease-in-out infinite;
      filter: url(#snowShadow);
    }
    /* Opóźnienia dla dużej liczby płatków – gęsto, co ~0,1–0,15s */
    .s1 { animation-delay: 0.00s; }
    .s2 { animation-delay: 0.10s; }
    .s3 { animation-delay: 0.20s; }
    .s4 { animation-delay: 0.30s; }
    .s5 { animation-delay: 0.40s; }
    .s6 { animation-delay: 0.50s; }
    .s7 { animation-delay: 0.60s; }
    .s8 { animation-delay: 0.70s; }
    .s9 { animation-delay: 0.80s; }
    .s10 { animation-delay: 0.90s; }
    .s11 { animation-delay: 1.00s; }
    .s12 { animation-delay: 1.10s; }
    .s13 { animation-delay: 1.20s; }
    .s14 { animation-delay: 1.30s; }
    .s15 { animation-delay: 1.40s; }
    .s16 { animation-delay: 1.50s; }
    .s17 { animation-delay: 1.60s; }
    .s18 { animation-delay: 1.70s; }
    .s19 { animation-delay: 1.80s; }
    .s20 { animation-delay: 1.90s; }
    .s21 { animation-delay: 2.00s; }
    .s22 { animation-delay: 2.10s; }
    .s23 { animation-delay: 2.20s; }
    .s24 { animation-delay: 2.30s; }
    .s25 { animation-delay: 2.40s; }
    .s26 { animation-delay: 2.50s; }
    .s27 { animation-delay: 0.05s; }
    .s28 { animation-delay: 0.15s; }
    .s29 { animation-delay: 0.25s; }
    .s30 { animation-delay: 0.35s; }
    .s31 { animation-delay: 0.45s; }
    .s32 { animation-delay: 0.55s; }
    .s33 { animation-delay: 0.65s; }
    .s34 { animation-delay: 0.75s; }
    .s35 { animation-delay: 0.85s; }
    .s36 { animation-delay: 0.95s; }
    .s37 { animation-delay: 1.05s; }
    .s38 { animation-delay: 1.15s; }
    .s39 { animation-delay: 1.25s; }
    .s40 { animation-delay: 1.35s; }
    .s41 { animation-delay: 1.45s; }
    .s42 { animation-delay: 1.55s; }
    .s43 { animation-delay: 1.65s; }
    .s44 { animation-delay: 1.75s; }
    .s45 { animation-delay: 1.85s; }
    .s46 { animation-delay: 1.95s; }
    .s47 { animation-delay: 2.05s; }
    .s48 { animation-delay: 2.15s; }
    .s49 { animation-delay: 2.25s; }
    .s50 { animation-delay: 2.35s; }

    @keyframes bgPulse {
      0%,100% { opacity: 0.9; }
      50% { opacity: 1; }
    }
    @keyframes cloudFloat {
      0%,100% { transform: translateX(0) translateY(0); }
      50% { transform: translateX(-4px) translateY(-3px); }
    }
    @keyframes fallHeavySnow {
      0% { transform: translateY(-20px) translateX(0) rotate(0deg); opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 0.9; }
      100% { transform: translateY(60px) translateX(-10px) rotate(540deg); opacity: 0; }
    }
  </style>

  <!-- TŁO -->
  <rect width="233" height="200" fill="url(#bgGlow)" class="bgLayer"/>

  <!-- CHMURA -->
  <g class="cloudMove" filter="url(#cloudShadow)">
    <path d="M 50,115 
             C 50,95 70,85 85,90 
             C 95,70 125,65 140,80 
             C 155,75 175,85 180,105 
             C 195,105 200,115 195,125 
             C 190,135 170,135 160,130 
             L 70,130 
             C 55,130 45,125 50,115 Z" 
          fill="url(#cloudGrad)"/>
    <path d="M 70,105 C 80,90 105,85 125,93 C 135,88 152,92 158,106 C 165,102 175,108 172,118 C 168,126 148,128 135,124 L 85,126 C 73,127 66,120 70,105 Z" 
          fill="#FFFFFF" opacity="0.5"/>
  </g>

  <!-- PŁATKI ŚNIEGU – OBFTE OPADY (50 sztuk, różne rozmiary) -->
  <g filter="url(#snowGlow)">
    <!-- Warstwa 1: duże płatki (r=3-3.5) -->
    <circle class="snowflake s1" cx="80" cy="138" r="3.5" fill="url(#snowflake)"/>
    <circle class="snowflake s2" cx="110" cy="142" r="3" fill="url(#snowflake)"/>
    <circle class="snowflake s3" cx="140" cy="136" r="3.5" fill="url(#snowflake)"/>
    <circle class="snowflake s4" cx="170" cy="140" r="3" fill="url(#snowflake)"/>
    <circle class="snowflake s5" cx="100" cy="148" r="3.5" fill="url(#snowflake)"/>
    <circle class="snowflake s6" cx="130" cy="145" r="3" fill="url(#snowflake)"/>
    <circle class="snowflake s7" cx="160" cy="150" r="3.5" fill="url(#snowflake)"/>
    <circle class="snowflake s8" cx="90" cy="155" r="3" fill="url(#snowflake)"/>
    <circle class="snowflake s9" cx="120" cy="158" r="3.5" fill="url(#snowflake)"/>
    <circle class="snowflake s10" cx="150" cy="162" r="3" fill="url(#snowflake)"/>

    <!-- Warstwa 2: średnie płatki (r=2.5) -->
    <circle class="snowflake s11" cx="75" cy="165" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s12" cx="105" cy="170" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s13" cx="135" cy="168" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s14" cx="165" cy="175" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s15" cx="85" cy="178" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s16" cx="115" cy="182" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s17" cx="145" cy="180" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s18" cx="95" cy="185" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s19" cx="125" cy="188" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s20" cx="155" cy="190" r="2.5" fill="url(#snowflake)"/>

    <!-- Warstwa 3: małe płatki (r=2) oraz dodatkowe -->
    <circle class="snowflake s21" cx="70" cy="148" r="2" fill="url(#snowflake)"/>
    <circle class="snowflake s22" cx="95" cy="140" r="2" fill="url(#snowflake)"/>
    <circle class="snowflake s23" cx="125" cy="152" r="2" fill="url(#snowflake)"/>
    <circle class="snowflake s24" cx="155" cy="145" r="2" fill="url(#snowflake)"/>
    <circle class="snowflake s25" cx="80" cy="172" r="2" fill="url(#snowflake)"/>
    <circle class="snowflake s26" cx="110" cy="175" r="2" fill="url(#snowflake)"/>
    <circle class="snowflake s27" cx="140" cy="178" r="2" fill="url(#snowflake)"/>
    <circle class="snowflake s28" cx="170" cy="168" r="2" fill="url(#snowflake)"/>
    <circle class="snowflake s29" cx="100" cy="190" r="2" fill="url(#snowflake)"/>
    <circle class="snowflake s30" cx="130" cy="192" r="2" fill="url(#snowflake)"/>

    <!-- Dodatkowe płatki dla większego zagęszczenia (20 sztuk) -->
    <circle class="snowflake s31" cx="78" cy="135" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s32" cx="108" cy="133" r="3" fill="url(#snowflake)"/>
    <circle class="snowflake s33" cx="138" cy="140" r="2" fill="url(#snowflake)"/>
    <circle class="snowflake s34" cx="168" cy="138" r="3" fill="url(#snowflake)"/>
    <circle class="snowflake s35" cx="88" cy="145" r="2" fill="url(#snowflake)"/>
    <circle class="snowflake s36" cx="118" cy="148" r="3.5" fill="url(#snowflake)"/>
    <circle class="snowflake s37" cx="148" cy="155" r="2" fill="url(#snowflake)"/>
    <circle class="snowflake s38" cx="73" cy="160" r="3" fill="url(#snowflake)"/>
    <circle class="snowflake s39" cx="103" cy="163" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s40" cx="133" cy="166" r="2" fill="url(#snowflake)"/>
    <circle class="snowflake s41" cx="163" cy="172" r="3" fill="url(#snowflake)"/>
    <circle class="snowflake s42" cx="93" cy="180" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s43" cx="123" cy="185" r="2" fill="url(#snowflake)"/>
    <circle class="snowflake s44" cx="153" cy="188" r="3" fill="url(#snowflake)"/>
    <circle class="snowflake s45" cx="83" cy="190" r="2" fill="url(#snowflake)"/>
    <circle class="snowflake s46" cx="113" cy="193" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s47" cx="143" cy="195" r="2" fill="url(#snowflake)"/>
    <circle class="snowflake s48" cx="173" cy="185" r="3" fill="url(#snowflake)"/>
    <circle class="snowflake s49" cx="98" cy="195" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s50" cx="128" cy="198" r="2" fill="url(#snowflake)"/>
  </g>

  <!-- GRUBA WARSTWA ŚNIEGU PRZY PODŁOŻU (rozmyta) -->
  <ellipse cx="115" cy="190" rx="90" ry="8" fill="#C0E0FF" opacity="0.3" filter="url(#snowGlow)"/>
  <ellipse cx="115" cy="196" rx="65" ry="5" fill="#D0E8FF" opacity="0.2" filter="url(#snowGlow)"/>
</svg>