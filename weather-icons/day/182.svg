<svg width="233" height="200" viewBox="0 0 233 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- TŁO: RADIALNY GRADIENT ZANIKAJĄCY DO PRZEZROCZYSTOŚCI -->
     <radialGradient id="bgGlow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#4A9FD8" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#2E7DBC" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1A5A8A" stop-opacity="0"/>
    </radialGradient>

    <!-- SŁOŃCE -->
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF9C4" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#FFE082" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFB300" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="sunCore" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF176"/>
      <stop offset="100%" stop-color="#FFB300"/>
    </linearGradient>

    <!-- CHMURA: JASNA, PUSZYSTA -->
    <radialGradient id="cloudGrad" cx="30%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="45%" stop-color="#F0F4F8"/>
      <stop offset="80%" stop-color="#D0E0EC"/>
      <stop offset="100%" stop-color="#A0B8CC"/>
    </radialGradient>

    <!-- KROPLA DESZCZU -->
    <linearGradient id="rainDrop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#40C4FF"/>
      <stop offset="100%" stop-color="#1A73E8"/>
    </linearGradient>

    <!-- PŁATEK ŚNIEGU -->
    <radialGradient id="snowflake" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#D0E8FF" stop-opacity="0.6"/>
    </radialGradient>

    <!-- FILTRY -->
    <filter id="sunGlowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="cloudShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#3A6A8A" flood-opacity="0.3"/>
    </filter>
    <filter id="snowGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
    <filter id="snowShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0.5" dy="0.5" stdDeviation="0.5" flood-color="#1A4A6A" flood-opacity="0.3"/>
    </filter>
  </defs>

  <style>
    .bgLayer {
      animation: bgPulse 8s ease-in-out infinite;
    }
    /* SŁOŃCE – WYCHODZI I CHOWA SIĘ ZA CHMURĄ */
    .sunMove {
      animation: slideBehindCloud 10s ease-in-out infinite alternate;
      transform-origin: 75px 70px;
    }
    .cloudMove {
      animation: cloudFloat 6s ease-in-out infinite;
    }
    /* KROPLA DESZCZU (szybsza) */
    .rainDrop {
      animation: fallRain 1.8s ease-in infinite;
    }
    /* PŁATEK ŚNIEGU (wolniejszy, z wirowaniem) */
    .snowflake {
      animation: fallSnow 3.5s ease-in-out infinite;
      filter: url(#snowShadow);
    }
    /* Opóźnienia dla deszczu (10 kropli) */
    .r1 { animation-delay: 0.0s; }
    .r2 { animation-delay: 0.2s; }
    .r3 { animation-delay: 0.4s; }
    .r4 { animation-delay: 0.6s; }
    .r5 { animation-delay: 0.8s; }
    .r6 { animation-delay: 1.0s; }
    .r7 { animation-delay: 1.2s; }
    .r8 { animation-delay: 1.4s; }
    .r9 { animation-delay: 0.1s; }
    .r10 { animation-delay: 0.5s; }

    /* Opóźnienia dla śniegu (15 płatków) */
    .s1 { animation-delay: 0.0s; }
    .s2 { animation-delay: 0.3s; }
    .s3 { animation-delay: 0.6s; }
    .s4 { animation-delay: 0.9s; }
    .s5 { animation-delay: 1.2s; }
    .s6 { animation-delay: 1.5s; }
    .s7 { animation-delay: 1.8s; }
    .s8 { animation-delay: 2.1s; }
    .s9 { animation-delay: 2.4s; }
    .s10 { animation-delay: 2.7s; }
    .s11 { animation-delay: 0.15s; }
    .s12 { animation-delay: 0.45s; }
    .s13 { animation-delay: 0.75s; }
    .s14 { animation-delay: 1.05s; }
    .s15 { animation-delay: 1.35s; }

    @keyframes bgPulse {
      0%,100% { opacity: 0.9; }
      50% { opacity: 1; }
    }
    @keyframes slideBehindCloud {
      0% { transform: translateX(0); }
      100% { transform: translateX(75px); }
    }
    @keyframes cloudFloat {
      0%,100% { transform: translateX(0) translateY(0); }
      50% { transform: translateX(-3px) translateY(-2px); }
    }
    @keyframes fallRain {
      0% { transform: translateY(-25px) translateX(0); opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 0.9; }
      100% { transform: translateY(55px) translateX(-8px); opacity: 0; }
    }
    @keyframes fallSnow {
      0% { transform: translateY(-20px) translateX(0) rotate(0deg); opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 0.9; }
      100% { transform: translateY(50px) translateX(-6px) rotate(360deg); opacity: 0; }
    }
  </style>

  <!-- TŁO -->
  <rect width="233" height="200" fill="url(#bgGlow)" class="bgLayer"/>

  <!-- SŁOŃCE (RUCHOME, CHOWA SIĘ ZA CHMURĄ) -->
  <g class="sunMove">
    <circle cx="75" cy="70" r="38" fill="url(#sunGlow)" filter="url(#sunGlowFilter)"/>
    <circle cx="75" cy="70" r="24" fill="url(#sunCore)" filter="url(#sunGlowFilter)" opacity="0.9"/>
    <circle cx="75" cy="70" r="20" fill="url(#sunCore)"/>
    <circle cx="68" cy="63" r="4" fill="#FFF9C4" opacity="0.9"/>
    <circle cx="82" cy="68" r="3.5" fill="#FFF9C4" opacity="0.8"/>
    <circle cx="72" cy="78" r="3" fill="#FFF9C4" opacity="0.7"/>
  </g>

  <!-- CHMURA – RYSOWANA PO SŁOŃCU, BY JE ZASŁANIAĆ -->
  <g class="cloudMove" filter="url(#cloudShadow)">
    <path d="M 50,115 
             C 50,95 70,85 85,90 
             C 95,70 125,65 140,80 
             C 155,75 175,85 180,105 
             C 195,105 200,115 195,125 
             C 190,135 170,135 160,130 
             L 70,130 
             C 55,130 45,125 50,115 Z" 
          fill="url(#cloudGrad)"/>
    <path d="M 70,105 C 80,90 105,85 125,93 C 135,88 152,92 158,106 C 165,102 175,108 172,118 C 168,126 148,128 135,124 L 85,126 C 73,127 66,120 70,105 Z" 
          fill="#FFFFFF" opacity="0.5"/>
  </g>

  <!-- KROPLE DESZCZU (10 sztuk) -->
  <g>
    <path class="rainDrop r1" d="M 90 138 C 90 138 86 145 86 148 C 86 151 88 153 90 153 C 92 153 94 151 94 148 C 94 145 90 138 90 138 Z" fill="url(#rainDrop)"/>
    <path class="rainDrop r2" d="M 115 142 C 115 142 111 149 111 152 C 111 155 113 157 115 157 C 117 157 119 155 119 152 C 119 149 115 142 115 142 Z" fill="url(#rainDrop)"/>
    <path class="rainDrop r3" d="M 140 136 C 140 136 136 143 136 146 C 136 149 138 151 140 151 C 142 151 144 149 144 146 C 144 143 140 136 140 136 Z" fill="url(#rainDrop)"/>

  
    <path class="rainDrop r8" d="M 80 152 C 80 152 76 159 76 162 C 76 165 78 167 80 167 C 82 167 84 165 84 162 C 84 159 80 152 80 152 Z" fill="url(#rainDrop)"/>
    <path class="rainDrop r9" d="M 120 155 C 120 155 116 162 116 165 C 116 168 118 170 120 170 C 122 170 124 168 124 165 C 124 162 120 155 120 155 Z" fill="url(#rainDrop)"/>
    <path class="rainDrop r10" d="M 145 160 C 145 160 141 167 141 170 C 141 173 143 175 145 175 C 147 175 149 173 149 170 C 149 167 145 160 145 160 Z" fill="url(#rainDrop)"/>
  </g>

  <!-- PŁATKI ŚNIEGU (15 sztuk) -->
  <g filter="url(#snowGlow)">
    <circle class="snowflake s1" cx="95" cy="140" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s2" cx="120" cy="144" r="2" fill="url(#snowflake)"/>
    <circle class="snowflake s3" cx="145" cy="138" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s4" cx="170" cy="142" r="2" fill="url(#snowflake)"/>
    <circle class="snowflake s5" cx="100" cy="150" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s6" cx="125" cy="148" r="2" fill="url(#snowflake)"/>
    <circle class="snowflake s7" cx="150" cy="152" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s8" cx="85" cy="155" r="2" fill="url(#snowflake)"/>
    <circle class="snowflake s9" cx="110" cy="158" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s10" cx="135" cy="162" r="2" fill="url(#snowflake)"/>
    <circle class="snowflake s11" cx="160" cy="165" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s12" cx="90" cy="168" r="2" fill="url(#snowflake)"/>
    <circle class="snowflake s13" cx="115" cy="172" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s14" cx="140" cy="170" r="2" fill="url(#snowflake)"/>
    <circle class="snowflake s15" cx="165" cy="175" r="2.5" fill="url(#snowflake)"/>
  </g>

  <!-- MGIEŁKA PRZY PODŁOŻU -->
  <ellipse cx="115" cy="188" rx="80" ry="6" fill="#C0E0FF" opacity="0.2" filter="url(#sunGlowFilter)"/>
</svg>