<svg width="233" height="200" viewBox="0 0 233 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- TŁO: RADIALNY GRADIENT ZANIKAJĄCY DO PRZEZROCZYSTOŚCI -->
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#00BFFF" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#008B8B" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#5F9EA0" stop-opacity="0"/>
    </radialGradient>

    <!-- SŁOŃCE Z PRZEJAŚNIENIAMI -->
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE566" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#FFB820" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FF8C00" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="sunCore" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF176"/>
      <stop offset="100%" stop-color="#FF9800"/>
    </linearGradient>

    <!-- CHMURA: JASNA, PUSZYSTA Z CIENIEM -->
    <radialGradient id="cloudGrad" cx="30%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="45%" stop-color="#E8F2FA"/>
      <stop offset="80%" stop-color="#B8D4E8"/>
      <stop offset="100%" stop-color="#8EB8D4"/>
    </radialGradient>

    <!-- KROPLA DESZCZU: NIEBIESKA -->
    <linearGradient id="rainDrop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#40C4FF"/>
      <stop offset="100%" stop-color="#1A73E8"/>
    </linearGradient>

    <!-- FILTRY -->
    <filter id="sunGlowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="cloudShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#3A5C8C" flood-opacity="0.35"/>
    </filter>
    <filter id="rainBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
  </defs>

  <style>
    .bgLayer {
      animation: bgPulse 6s ease-in-out infinite;
    }
    .sunMove {
      animation: sunGlide 10s ease-in-out infinite alternate;
      transform-origin: 65px 65px;
    }
    .cloudMove {
      animation: cloudFloat 5s ease-in-out infinite;
    }
    .rainDrop {
      animation: fallModerate 1.6s linear infinite;
    }
    /* Opóźnienia dla poszczególnych kropli – tworzą ciągły, umiarkowany deszcz */
    .d1 { animation-delay: 0s; }
    .d2 { animation-delay: 0.2s; }
    .d3 { animation-delay: 0.4s; }
    .d4 { animation-delay: 0.6s; }
    .d5 { animation-delay: 0.8s; }
    .d6 { animation-delay: 1.0s; }
    .d7 { animation-delay: 0.1s; }
    .d8 { animation-delay: 0.3s; }
    .d9 { animation-delay: 0.5s; }
    .d10 { animation-delay: 0.7s; }
    .d11 { animation-delay: 0.9s; }
    .d12 { animation-delay: 1.1s; }

    @keyframes bgPulse {
      0%,100% { opacity: 0.85; }
      50% { opacity: 1; }
    }
    @keyframes sunGlide {
      0% { transform: translateX(0) translateY(0); }
      100% { transform: translateX(15px) translateY(-5px); }
    }
    @keyframes cloudFloat {
      0%,100% { transform: translateX(0) translateY(0); }
      50% { transform: translateX(-3px) translateY(-2px); }
    }
    @keyframes fallModerate {
      0% { transform: translateY(-20px); opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 0.9; }
      100% { transform: translateY(45px); opacity: 0; }
    }
  </style>

  <!-- TŁO -->
  <rect width="233" height="200" fill="url(#bgGlow)" class="bgLayer"/>

  <!-- SŁOŃCE Z PRZEJAŚNIENIAMI (WIDOCZNE Z LEWEJ STRONY) -->
  <g class="sunMove">
    <!-- Poświata -->
    <circle cx="65" cy="65" r="38" fill="url(#sunGlow)" filter="url(#sunGlowFilter)"/>
    <!-- Tarcza słoneczna -->
    <circle cx="65" cy="65" r="24" fill="url(#sunCore)" filter="url(#sunGlowFilter)" opacity="0.9"/>
    <circle cx="65" cy="65" r="20" fill="url(#sunCore)"/>
    <!-- Ostre akcenty (promienie) -->
    <circle cx="58" cy="58" r="4" fill="#FFF9C4" opacity="0.9"/>
    <circle cx="72" cy="62" r="3.5" fill="#FFF9C4" opacity="0.8"/>
    <circle cx="62" cy="73" r="3" fill="#FFF9C4" opacity="0.7"/>
  </g>

  <!-- CHMURA – PRZESUNIĘTA NIEZNACZNIE W PRAWO, BY SŁOŃCE BYŁO WIDOCZNE -->
  <g class="cloudMove" filter="url(#cloudShadow)">
    <path d="M 60,115 
             C 60,95 80,85 95,90 
             C 105,70 135,65 150,80 
             C 165,75 185,85 190,105 
             C 205,105 210,115 205,125 
             C 200,135 180,135 170,130 
             L 80,130 
             C 65,130 55,125 60,115 Z" 
          fill="url(#cloudGrad)"/>
    <!-- Jaśniejszy akcent na górze chmury -->
    <path d="M 80,105 C 90,90 115,85 135,93 C 145,88 162,92 168,106 C 175,102 185,108 182,118 C 178,126 158,128 145,124 L 95,126 C 83,127 76,120 80,105 Z" 
          fill="#FFFFFF" opacity="0.4"/>
  </g>

  <!-- KROPLE DESZCZU (UMIARKOWANY DESZCZ – 12 KROPLI) -->
  <g filter="url(#rainBlur)">
    <!-- Rząd główny (pod chmurą) -->
    <path class="rainDrop d1" d="M90 135 C90 135 86 142 86 145 C86 148 88 150 90 150 C92 150 94 148 94 145 C94 142 90 135 90 135Z" fill="url(#rainDrop)"/>
    <path class="rainDrop d2" d="M115 132 C115 132 111 139 111 142 C111 145 113 147 115 147 C117 147 119 145 119 142 C119 139 115 132 115 132Z" fill="url(#rainDrop)"/>
    <path class="rainDrop d3" d="M140 130 C140 130 136 137 136 140 C136 143 138 145 140 145 C142 145 144 143 144 140 C144 137 140 130 140 130Z" fill="url(#rainDrop)"/>
    <path class="rainDrop d4" d="M165 135 C165 135 161 142 161 145 C161 148 163 150 165 150 C167 150 169 148 169 145 C169 142 165 135 165 135Z" fill="url(#rainDrop)"/>
    <path class="rainDrop d5" d="M105 140 C105 140 101 147 101 150 C101 153 103 155 105 155 C107 155 109 153 109 150 C109 147 105 140 105 140Z" fill="url(#rainDrop)"/>
    <path class="rainDrop d6" d="M130 138 C130 138 126 145 126 148 C126 151 128 153 130 153 C132 153 134 151 134 148 C134 145 130 138 130 138Z" fill="url(#rainDrop)"/>

    <!-- Dodatkowe krople dla zwiększenia intensywności (umiarkowany deszcz) -->
    <path class="rainDrop d7" d="M100 145 C100 145 96 152 96 155 C96 158 98 160 100 160 C102 160 104 158 104 155 C104 152 100 145 100 145Z" fill="url(#rainDrop)"/>
    <path class="rainDrop d8" d="M125 142 C125 142 121 149 121 152 C121 155 123 157 125 157 C127 157 129 155 129 152 C129 149 125 142 125 142Z" fill="url(#rainDrop)"/>
    <path class="rainDrop d9" d="M150 140 C150 140 146 147 146 150 C146 153 148 155 150 155 C152 155 154 153 154 150 C154 147 150 140 150 140Z" fill="url(#rainDrop)"/>
    <path class="rainDrop d10" d="M80 148 C80 148 76 155 76 158 C76 161 78 163 80 163 C82 163 84 161 84 158 C84 155 80 148 80 148Z" fill="url(#rainDrop)"/>
    <path class="rainDrop d11" d="M155 145 C155 145 151 152 151 155 C151 158 153 160 155 160 C157 160 159 158 159 155 C159 152 155 145 155 145Z" fill="url(#rainDrop)"/>
    <path class="rainDrop d12" d="M110 150 C110 150 106 157 106 160 C106 163 108 165 110 165 C112 165 114 163 114 160 C114 157 110 150 110 150Z" fill="url(#rainDrop)"/>
  </g>

  <!-- WILGOTNE ODBLYSKI NA DOLE -->
  <ellipse cx="115" cy="186" rx="70" ry="5" fill="#40C4FF" opacity="0.2" filter="url(#sunGlowFilter)"/>
</svg>