<svg width="233" height="200" viewBox="0 0 233 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- TŁO: RADIALNY GRADIENT ZANIKAJĄCY DO PRZEZROCZYSTOŚCI -->
   <radialGradient id="bgGlow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#B0E0FF" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#80C0E0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#5F9EA0" stop-opacity="0"/>
    </radialGradient>

    <!-- CHMURA: CIEMNIEJSZA, BARDZIEJ BURZOWA -->
    <radialGradient id="cloudGrad" cx="30%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#C0D8E8"/>
      <stop offset="45%" stop-color="#90B0C8"/>
      <stop offset="80%" stop-color="#6088A8"/>
      <stop offset="100%" stop-color="#406888"/>
    </radialGradient>

    <!-- SMUGA DESZCZU (DŁUGA, PRZEŹROCZYSTA) -->
    <linearGradient id="rainStreak" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#80D8FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1A73E8" stop-opacity="0.2"/>
    </linearGradient>

    <!-- KROPLA DESZCZU -->
    <linearGradient id="rainDrop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#40C4FF"/>
      <stop offset="100%" stop-color="#1A73E8"/>
    </linearGradient>

    <!-- FILTRY -->
    <filter id="cloudShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1A3A5A" flood-opacity="0.5"/>
    </filter>
    <filter id="motionBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0 3"/>
    </filter>
  </defs>

  <style>
    .bgLayer {
      animation: bgPulse 4s ease-in-out infinite;
    }
    .cloudMove {
      animation: cloudFloat 4s ease-in-out infinite;
    }
    /* Smugi – bardzo szybkie, z rozmyciem */
    .streak {
      animation: streakFall 0.8s linear infinite;
      filter: url(#motionBlur);
    }
    /* Krople – nieco wolniejsze, dla urozmaicenia */
    .drop {
      animation: dropFall 1.0s linear infinite;
    }
    /* Opóźnienia dla smug (30 smug) */
    .s1 { animation-delay: 0.00s; }
    .s2 { animation-delay: 0.05s; }
    .s3 { animation-delay: 0.10s; }
    .s4 { animation-delay: 0.15s; }
    .s5 { animation-delay: 0.20s; }
    .s6 { animation-delay: 0.25s; }
    .s7 { animation-delay: 0.30s; }
    .s8 { animation-delay: 0.35s; }
    .s9 { animation-delay: 0.40s; }
    .s10 { animation-delay: 0.45s; }
    .s11 { animation-delay: 0.50s; }
    .s12 { animation-delay: 0.55s; }
    .s13 { animation-delay: 0.60s; }
    .s14 { animation-delay: 0.65s; }
    .s15 { animation-delay: 0.70s; }
    .s16 { animation-delay: 0.75s; }
    .s17 { animation-delay: 0.02s; }
    .s18 { animation-delay: 0.07s; }
    .s19 { animation-delay: 0.12s; }
    .s20 { animation-delay: 0.17s; }
    .s21 { animation-delay: 0.22s; }
    .s22 { animation-delay: 0.27s; }
    .s23 { animation-delay: 0.32s; }
    .s24 { animation-delay: 0.37s; }
    .s25 { animation-delay: 0.42s; }
    .s26 { animation-delay: 0.47s; }
    .s27 { animation-delay: 0.52s; }
    .s28 { animation-delay: 0.57s; }
    .s29 { animation-delay: 0.62s; }
    .s30 { animation-delay: 0.67s; }
    /* Opóźnienia dla kropel (15 kropel) */
    .d1 { animation-delay: 0.03s; }
    .d2 { animation-delay: 0.13s; }
    .d3 { animation-delay: 0.23s; }
    .d4 { animation-delay: 0.33s; }
    .d5 { animation-delay: 0.43s; }
    .d6 { animation-delay: 0.53s; }
    .d7 { animation-delay: 0.63s; }
    .d8 { animation-delay: 0.73s; }
    .d9 { animation-delay: 0.08s; }
    .d10 { animation-delay: 0.18s; }
    .d11 { animation-delay: 0.28s; }
    .d12 { animation-delay: 0.38s; }
    .d13 { animation-delay: 0.48s; }
    .d14 { animation-delay: 0.58s; }
    .d15 { animation-delay: 0.68s; }

    @keyframes bgPulse {
      0%,100% { opacity: 0.9; }
      50% { opacity: 1; }
    }
    @keyframes cloudFloat {
      0%,100% { transform: translateX(0) translateY(0); }
      50% { transform: translateX(-5px) translateY(-3px); }
    }
    @keyframes streakFall {
      0% { transform: translateY(-40px) translateX(0); opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 0.8; }
      100% { transform: translateY(60px) translateX(-15px); opacity: 0; }
    }
    @keyframes dropFall {
      0% { transform: translateY(-30px) translateX(0); opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 0.9; }
      100% { transform: translateY(55px) translateX(-8px); opacity: 0; }
    }
  </style>

  <!-- TŁO -->
  <rect width="233" height="200" fill="url(#bgGlow)" class="bgLayer"/>

  <!-- CHMURA – CIEMNA, BURZOWA, BEZ SŁOŃCA -->
  <g class="cloudMove" filter="url(#cloudShadow)">
    <path d="M 40,115 
             C 40,95 60,82 78,88 
             C 88,68 120,60 138,75 
             C 152,68 175,76 182,96 
             C 198,98 205,110 198,124 
             C 192,136 170,138 158,132 
             L 65,134 
             C 48,136 38,130 40,115 Z" 
          fill="url(#cloudGrad)"/>
    <path d="M 70,105 C 80,88 105,82 125,90 C 135,85 152,90 158,104 C 165,100 175,106 172,118 C 168,126 148,128 135,124 L 85,126 C 73,127 66,120 70,105 Z" 
          fill="#FFFFFF" opacity="0.2"/>
  </g>

  <!-- SMUGI DESZCZU – 30 długich linii ukośnych -->
  <g>
    <!-- Rząd 1 (x od 70 do 180) -->
    <rect class="streak s1" x="80" y="130" width="2" height="18" fill="url(#rainStreak)" transform="rotate(15, 81, 139)"/>
    <rect class="streak s2" x="100" y="125" width="2" height="20" fill="url(#rainStreak)" transform="rotate(12, 101, 135)"/>
    <rect class="streak s3" x="120" y="135" width="2" height="16" fill="url(#rainStreak)" transform="rotate(18, 121, 143)"/>
    <rect class="streak s4" x="140" y="128" width="2" height="19" fill="url(#rainStreak)" transform="rotate(10, 141, 137)"/>
    <rect class="streak s5" x="160" y="132" width="2" height="17" fill="url(#rainStreak)" transform="rotate(14, 161, 140)"/>
    <rect class="streak s6" x="90" y="140" width="2" height="18" fill="url(#rainStreak)" transform="rotate(16, 91, 149)"/>
    <rect class="streak s7" x="110" y="138" width="2" height="20" fill="url(#rainStreak)" transform="rotate(11, 111, 148)"/>
    <rect class="streak s8" x="130" y="142" width="2" height="16" fill="url(#rainStreak)" transform="rotate(13, 131, 150)"/>
    <rect class="streak s9" x="150" y="136" width="2" height="19" fill="url(#rainStreak)" transform="rotate(17, 151, 145)"/>
    <rect class="streak s10" x="170" y="145" width="2" height="17" fill="url(#rainStreak)" transform="rotate(12, 171, 153)"/>

    <!-- Rząd 2 (przesunięte pionowo) -->
    <rect class="streak s11" x="75" y="150" width="2" height="18" fill="url(#rainStreak)" transform="rotate(14, 76, 159)"/>
    <rect class="streak s12" x="95" y="148" width="2" height="20" fill="url(#rainStreak)" transform="rotate(15, 96, 158)"/>
    <rect class="streak s13" x="115" y="152" width="2" height="16" fill="url(#rainStreak)" transform="rotate(11, 116, 160)"/>
    <rect class="streak s14" x="135" y="147" width="2" height="19" fill="url(#rainStreak)" transform="rotate(18, 136, 156)"/>
    <rect class="streak s15" x="155" y="155" width="2" height="17" fill="url(#rainStreak)" transform="rotate(13, 156, 163)"/>
    <rect class="streak s16" x="175" y="150" width="2" height="18" fill="url(#rainStreak)" transform="rotate(16, 176, 159)"/>
    <rect class="streak s17" x="85" y="158" width="2" height="20" fill="url(#rainStreak)" transform="rotate(12, 86, 168)"/>
    <rect class="streak s18" x="105" y="160" width="2" height="16" fill="url(#rainStreak)" transform="rotate(15, 106, 168)"/>
    <rect class="streak s19" x="125" y="155" width="2" height="19" fill="url(#rainStreak)" transform="rotate(14, 126, 164)"/>
    <rect class="streak s20" x="145" y="162" width="2" height="17" fill="url(#rainStreak)" transform="rotate(17, 146, 170)"/>

    <!-- Dodatkowe smugi dla wzmocnienia -->
    <rect class="streak s21" x="82" y="135" width="2" height="18" fill="url(#rainStreak)" transform="rotate(13, 83, 144)"/>
    <rect class="streak s22" x="102" y="130" width="2" height="20" fill="url(#rainStreak)" transform="rotate(16, 103, 140)"/>
    <rect class="streak s23" x="122" y="140" width="2" height="16" fill="url(#rainStreak)" transform="rotate(11, 123, 148)"/>
    <rect class="streak s24" x="142" y="133" width="2" height="19" fill="url(#rainStreak)" transform="rotate(15, 143, 142)"/>
    <rect class="streak s25" x="162" y="138" width="2" height="17" fill="url(#rainStreak)" transform="rotate(14, 163, 146)"/>
    <rect class="streak s26" x="92" y="145" width="2" height="18" fill="url(#rainStreak)" transform="rotate(17, 93, 154)"/>
    <rect class="streak s27" x="112" y="143" width="2" height="20" fill="url(#rainStreak)" transform="rotate(12, 113, 153)"/>
    <rect class="streak s28" x="132" y="148" width="2" height="16" fill="url(#rainStreak)" transform="rotate(16, 133, 156)"/>
    <rect class="streak s29" x="152" y="140" width="2" height="19" fill="url(#rainStreak)" transform="rotate(13, 153, 149)"/>
    <rect class="streak s30" x="172" y="147" width="2" height="17" fill="url(#rainStreak)" transform="rotate(15, 173, 155)"/>
  </g>

  <!-- KROPLE DESZCZU – 15 sztuk, dla urozmaicenia -->
  <g>
    <path class="drop d1" d="M88 138 C88 138 84 145 84 148 C84 151 86 153 88 153 C90 153 92 151 92 148 C92 145 88 138 88 138Z" fill="url(#rainDrop)"/>
    <path class="drop d2" d="M108 142 C108 142 104 149 104 152 C104 155 106 157 108 157 C110 157 112 155 112 152 C112 149 108 142 108 142Z" fill="url(#rainDrop)"/>
    <path class="drop d3" d="M128 136 C128 136 124 143 124 146 C124 149 126 151 128 151 C130 151 132 149 132 146 C132 143 128 136 128 136Z" fill="url(#rainDrop)"/>
    <path class="drop d4" d="M148 140 C148 140 144 147 144 150 C144 153 146 155 148 155 C150 155 152 153 152 150 C152 147 148 140 148 140Z" fill="url(#rainDrop)"/>
    <path class="drop d5" d="M168 144 C168 144 164 151 164 154 C164 157 166 159 168 159 C170 159 172 157 172 154 C172 151 168 144 168 144Z" fill="url(#rainDrop)"/>
    <path class="drop d6" d="M98 148 C98 148 94 155 94 158 C94 161 96 163 98 163 C100 163 102 161 102 158 C102 155 98 148 98 148Z" fill="url(#rainDrop)"/>
    <path class="drop d7" d="M118 152 C118 152 114 159 114 162 C114 165 116 167 118 167 C120 167 122 165 122 162 C122 159 118 152 118 152Z" fill="url(#rainDrop)"/>
    <path class="drop d8" d="M138 146 C138 146 134 153 134 156 C134 159 136 161 138 161 C140 161 142 159 142 156 C142 153 138 146 138 146Z" fill="url(#rainDrop)"/>
    <path class="drop d9" d="M158 150 C158 150 154 157 154 160 C154 163 156 165 158 165 C160 165 162 163 162 160 C162 157 158 150 158 150Z" fill="url(#rainDrop)"/>
    <path class="drop d10" d="M78 145 C78 145 74 152 74 155 C74 158 76 160 78 160 C80 160 82 158 82 155 C82 152 78 145 78 145Z" fill="url(#rainDrop)"/>
    <path class="drop d11" d="M178 148 C178 148 174 155 174 158 C174 161 176 163 178 163 C180 163 182 161 182 158 C182 155 178 148 178 148Z" fill="url(#rainDrop)"/>
    <path class="drop d12" d="M103 155 C103 155 99 162 99 165 C99 168 101 170 103 170 C105 170 107 168 107 165 C107 162 103 155 103 155Z" fill="url(#rainDrop)"/>
    <path class="drop d13" d="M123 158 C123 158 119 165 119 168 C119 171 121 173 123 173 C125 173 127 171 127 168 C127 165 123 158 123 158Z" fill="url(#rainDrop)"/>
    <path class="drop d14" d="M143 162 C143 162 139 169 139 172 C139 175 141 177 143 177 C145 177 147 175 147 172 C147 169 143 162 143 162Z" fill="url(#rainDrop)"/>
    <path class="drop d15" d="M163 158 C163 158 159 165 159 168 C159 171 161 173 163 173 C165 173 167 171 167 168 C167 165 163 158 163 158Z" fill="url(#rainDrop)"/>
  </g>

  <!-- ROZPYLONA WODA / MGIEŁKA PRZY PODŁOŻU -->
  <ellipse cx="115" cy="188" rx="95" ry="8" fill="#80D8FF" opacity="0.35" filter="url(#cloudShadow)"/>
  <ellipse cx="115" cy="193" rx="70" ry="5" fill="#A0E0FF" opacity="0.25" filter="url(#cloudShadow)"/>
</svg>