<svg width="233" height="200" viewBox="0 0 233 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- TŁO: BŁĘKITNY RADIALNY GRADIENT ZANIKAJĄCY DO PRZEZROCZYSTOŚCI -->
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#4A9FD8" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#2E7DBC" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1A5A8A" stop-opacity="0"/>
    </radialGradient>

    <!-- SŁOŃCE: JASNE, ŻÓŁTE -->
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF9C4" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#FFE082" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFB300" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="sunCore" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF176"/>
      <stop offset="100%" stop-color="#FFB300"/>
    </linearGradient>

    <!-- CHMURA: JASNA, PUSZYSTA -->
    <radialGradient id="cloudGrad" cx="30%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="45%" stop-color="#F0F4F8"/>
      <stop offset="80%" stop-color="#D0E0EC"/>
      <stop offset="100%" stop-color="#A0B8CC"/>
    </radialGradient>

    <!-- PŁATEK ŚNIEGU – BIAŁY Z CIENIEM -->
    <radialGradient id="snowflake" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="70%" stop-color="#F0F8FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#C0E0FF" stop-opacity="0.6"/>
    </radialGradient>

    <!-- FILTRY -->
    <filter id="sunGlowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="cloudShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#1A4A6A" flood-opacity="0.3"/>
    </filter>
    <filter id="snowGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
    <!-- Silniejszy cień dla płatka, żeby był widoczny na błękitnym tle -->
    <filter id="snowShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0.5" dy="0.8" stdDeviation="0.8" flood-color="#0F3A5A" flood-opacity="0.7"/>
    </filter>
  </defs>

  <style>
    .bgLayer {
      animation: bgPulse 8s ease-in-out infinite;
    }
    .sunMove {
      animation: slideBehindCloud 12s ease-in-out infinite alternate;
      transform-origin: 75px 70px;
    }
    .cloudMove {
      animation: cloudFloat 7s ease-in-out infinite;
    }
    .snowflake {
      animation: fallSnow 4s ease-in-out infinite;
      filter: url(#snowShadow);
    }
    .s1 { animation-delay: 0s; }
    .s2 { animation-delay: 0.5s; }
    .s3 { animation-delay: 1.0s; }
    .s4 { animation-delay: 1.5s; }
    .s5 { animation-delay: 2.0s; }
    .s6 { animation-delay: 2.5s; }
    .s7 { animation-delay: 3.0s; }
    .s8 { animation-delay: 3.5s; }
    .s9 { animation-delay: 0.8s; }
    .s10 { animation-delay: 1.3s; }
    .s11 { animation-delay: 1.8s; }
    .s12 { animation-delay: 2.3s; }
    .s13 { animation-delay: 2.8s; }
    .s14 { animation-delay: 3.3s; }
    .s15 { animation-delay: 0.2s; }
    .s16 { animation-delay: 0.7s; }
    .s17 { animation-delay: 1.2s; }
    .s18 { animation-delay: 1.7s; }
    .s19 { animation-delay: 2.2s; }
    .s20 { animation-delay: 2.7s; }

    @keyframes bgPulse {
      0%,100% { opacity: 0.9; }
      50% { opacity: 1; }
    }
    @keyframes slideBehindCloud {
      0% { transform: translateX(0); }
      100% { transform: translateX(75px); }
    }
    @keyframes cloudFloat {
      0%,100% { transform: translateX(0) translateY(0); }
      50% { transform: translateX(-4px) translateY(-2px); }
    }
    @keyframes fallSnow {
      0% { transform: translateY(-20px) translateX(0) rotate(0deg); opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 0.9; }
      100% { transform: translateY(55px) translateX(-10px) rotate(360deg); opacity: 0; }
    }
  </style>

  <!-- TŁO – BŁĘKITNE, JASNIEJSZE -->
  <rect width="233" height="200" fill="url(#bgGlow)" class="bgLayer"/>

  <!-- SŁOŃCE -->
  <g class="sunMove">
    <circle cx="75" cy="70" r="38" fill="url(#sunGlow)" filter="url(#sunGlowFilter)"/>
    <circle cx="75" cy="70" r="24" fill="url(#sunCore)" filter="url(#sunGlowFilter)" opacity="0.9"/>
    <circle cx="75" cy="70" r="20" fill="url(#sunCore)"/>
    <circle cx="68" cy="63" r="4" fill="#FFF9C4" opacity="0.9"/>
    <circle cx="82" cy="68" r="3.5" fill="#FFF9C4" opacity="0.8"/>
    <circle cx="72" cy="78" r="3" fill="#FFF9C4" opacity="0.7"/>
  </g>

  <!-- CHMURA -->
  <g class="cloudMove" filter="url(#cloudShadow)">
    <path d="M 50,115 
             C 50,95 70,85 85,90 
             C 95,70 125,65 140,80 
             C 155,75 175,85 180,105 
             C 195,105 200,115 195,125 
             C 190,135 170,135 160,130 
             L 70,130 
             C 55,130 45,125 50,115 Z" 
          fill="url(#cloudGrad)"/>
    <path d="M 70,105 C 80,90 105,85 125,93 C 135,88 152,92 158,106 C 165,102 175,108 172,118 C 168,126 148,128 135,124 L 85,126 C 73,127 66,120 70,105 Z" 
          fill="#FFFFFF" opacity="0.5"/>
  </g>

  <!-- PŁATKI ŚNIEGU – Z CIENIEM I BLASKiem -->
  <g filter="url(#snowGlow)">
    <circle class="snowflake s1" cx="90" cy="138" r="3" fill="url(#snowflake)"/>
    <circle class="snowflake s2" cx="115" cy="142" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s3" cx="140" cy="136" r="3" fill="url(#snowflake)"/>
    <circle class="snowflake s4" cx="165" cy="140" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s5" cx="105" cy="148" r="3" fill="url(#snowflake)"/>
    <circle class="snowflake s6" cx="130" cy="145" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s7" cx="155" cy="150" r="3" fill="url(#snowflake)"/>
    <circle class="snowflake s8" cx="80" cy="152" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s9" cx="100" cy="155" r="3" fill="url(#snowflake)"/>
    <circle class="snowflake s10" cx="125" cy="158" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s11" cx="150" cy="160" r="3" fill="url(#snowflake)"/>
    <circle class="snowflake s12" cx="170" cy="155" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s13" cx="95" cy="162" r="3" fill="url(#snowflake)"/>
    <circle class="snowflake s14" cx="120" cy="165" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s15" cx="145" cy="168" r="3" fill="url(#snowflake)"/>
    <circle class="snowflake s16" cx="75" cy="168" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s17" cx="110" cy="170" r="3" fill="url(#snowflake)"/>
    <circle class="snowflake s18" cx="135" cy="172" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s19" cx="160" cy="165" r="3" fill="url(#snowflake)"/>
    <circle class="snowflake s20" cx="85" cy="175" r="2.5" fill="url(#snowflake)"/>
  </g>

  <!-- ŚNIEŻNA MGIEŁKA PRZY PODŁOŻU -->
  <ellipse cx="115" cy="188" rx="80" ry="6" fill="#A0D8FF" opacity="0.25" filter="url(#sunGlowFilter)"/>
  <ellipse cx="115" cy="193" rx="55" ry="3" fill="#C0E8FF" opacity="0.2" filter="url(#sunGlowFilter)"/>
</svg>