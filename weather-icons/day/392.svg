<svg width="233" height="200" viewBox="0 0 233 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- TŁO: BURZOWE, CIEMNE -->
    <radialGradient id="bgStorm" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#4A6E8A" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#2E4A6A" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1A2E4A" stop-opacity="0"/>
    </radialGradient>

    <!-- SŁOŃCE ZA CHMURĄ -->
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF9C4" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#FFE082" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFB300" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sunCore" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF176"/>
      <stop offset="100%" stop-color="#FFB300"/>
    </linearGradient>

    <!-- CHMURA: CIEMNA, BURZOWA -->
    <radialGradient id="cloudStorm" cx="30%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#8A9AAA"/>
      <stop offset="45%" stop-color="#5A6A7A"/>
      <stop offset="80%" stop-color="#3A4A5A"/>
      <stop offset="100%" stop-color="#2A3A4A"/>
    </radialGradient>

    <!-- PŁATEK ŚNIEGU -->
    <radialGradient id="snowFlake" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#D0E8FF" stop-opacity="0.6"/>
    </radialGradient>

    <!-- FILTRY -->
    <filter id="sunGlowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="cloudShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0A1A2A" flood-opacity="0.5"/>
    </filter>
    <filter id="lightningGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="snowBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.3"/>
    </filter>
  </defs>

  <style>
    .bgLayer {
      animation: bgPulse 8s ease-in-out infinite;
    }
    /* Słońce – wolny ruch za chmurą */
    .sunMove {
      animation: slideSun 20s ease-in-out infinite alternate;
    }
    .cloudMove {
      animation: cloudFloat 6s ease-in-out infinite;
    }
    /* Błyskawica */
    .lightning {
      animation: flash 0.2s steps(2, start) infinite;
    }
    .lightningGlow {
      animation: flashGlow 0.2s steps(2, start) infinite;
    }
    /* Śnieg – opad z kołysaniem */
    .snow {
      animation: fallSnow 4s ease-in-out infinite;
    }
    /* Opóźnienia dla płatków śniegu (15 sztuk) */
    .s1 { animation-delay: 0.0s; }
    .s2 { animation-delay: 0.3s; }
    .s3 { animation-delay: 0.7s; }
    .s4 { animation-delay: 1.0s; }
    .s5 { animation-delay: 1.4s; }
    .s6 { animation-delay: 1.8s; }
    .s7 { animation-delay: 2.1s; }
    .s8 { animation-delay: 2.5s; }
    .s9 { animation-delay: 2.9s; }
    .s10 { animation-delay: 3.2s; }
    .s11 { animation-delay: 3.6s; }
    .s12 { animation-delay: 4.0s; }
    .s13 { animation-delay: 4.3s; }
    .s14 { animation-delay: 4.7s; }
    .s15 { animation-delay: 5.0s; }

    @keyframes bgPulse {
      0%,100% { opacity: 0.9; }
      50% { opacity: 1; }
    }
    @keyframes slideSun {
      0% { transform: translateX(0); }
      50% { transform: translateX(100px); }
      100% { transform: translateX(0); }
    }
    @keyframes cloudFloat {
      0%,100% { transform: translateX(0) translateY(0); }
      50% { transform: translateX(-4px) translateY(-2px); }
    }
    @keyframes flash {
      0% { opacity: 1; }
      50% { opacity: 0.3; }
      100% { opacity: 1; }
    }
    @keyframes flashGlow {
      0% { opacity: 0.8; }
      50% { opacity: 0.1; }
      100% { opacity: 0.8; }
    }
    /* Śnieg – opadanie z lekkim wahaniem w poziomie */
    @keyframes fallSnow {
      0% { transform: translateY(-20px) translateX(0px); opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 0.9; }
      100% { transform: translateY(70px) translateX(12px); opacity: 0; }
    }
  </style>

  <!-- TŁO -->
  <rect width="233" height="200" fill="url(#bgStorm)" class="bgLayer"/>

  <!-- SŁOŃCE ZA CHMURĄ (przelotne przejaśnienie) -->
  <g class="sunMove">
    <circle cx="50" cy="65" r="32" fill="url(#sunGlow)" filter="url(#sunGlowFilter)"/>
    <circle cx="50" cy="65" r="20" fill="url(#sunCore)" filter="url(#sunGlowFilter)" opacity="0.9"/>
    <circle cx="50" cy="65" r="16" fill="url(#sunCore)"/>
    <circle cx="44" cy="59" r="3" fill="#FFF9C4" opacity="0.9"/>
    <circle cx="56" cy="63" r="2.5" fill="#FFF9C4" opacity="0.8"/>
    <circle cx="48" cy="72" r="2" fill="#FFF9C4" opacity="0.7"/>
  </g>

  <!-- BŁYSKAWICA (SZERSZA) -->
  <g class="lightning">
    <path d="M 115,70 L 128,100 L 105,108 L 135,140 L 100,148 L 140,190" 
          fill="none" stroke="#FFF085" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#lightningGlow)" class="lightningGlow"/>
    <path d="M 115,70 L 128,100 L 105,108 L 135,140 L 100,148 L 140,190" 
          fill="none" stroke="#FFDF20" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 115,70 L 128,100 L 105,108 L 135,140 L 100,148 L 140,190" 
          fill="none" stroke="#FEF9C2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- CHMURA (CIEMNA, BURZOWA) -->
  <g class="cloudMove" filter="url(#cloudShadow)">
    <path d="M 40,115 
             C 40,95 60,82 78,88 
             C 88,68 120,60 138,75 
             C 152,68 175,76 182,96 
             C 198,98 205,110 198,124 
             C 192,136 170,138 158,132 
             L 65,134 
             C 48,136 38,130 40,115 Z" 
          fill="url(#cloudStorm)"/>
    <path d="M 70,105 C 80,88 105,82 125,90 C 135,85 152,90 158,104 C 165,100 175,106 172,118 C 168,126 148,128 135,124 L 85,126 C 73,127 66,120 70,105 Z" 
          fill="#FFFFFF" opacity="0.1"/>
  </g>

  <!-- PŁATKI ŚNIEGU – PRZELOTNE, LEKKIE (15 sztuk) -->
  <g filter="url(#snowBlur)">
    <circle cx="60" cy="130" r="3" fill="url(#snowFlake)" class="snow s1"/>
    <circle cx="85" cy="125" r="2.5" fill="url(#snowFlake)" class="snow s2"/>
    <circle cx="110" cy="135" r="3.5" fill="url(#snowFlake)" class="snow s3"/>
    <circle cx="135" cy="128" r="2" fill="url(#snowFlake)" class="snow s4"/>
    <circle cx="160" cy="132" r="3" fill="url(#snowFlake)" class="snow s5"/>
    <circle cx="75" cy="145" r="2.5" fill="url(#snowFlake)" class="snow s6"/>
    <circle cx="100" cy="140" r="3" fill="url(#snowFlake)" class="snow s7"/>
    <circle cx="125" cy="148" r="2" fill="url(#snowFlake)" class="snow s8"/>
    <circle cx="150" cy="142" r="3.5" fill="url(#snowFlake)" class="snow s9"/>
    <circle cx="175" cy="138" r="2.5" fill="url(#snowFlake)" class="snow s10"/>
    <circle cx="70" cy="155" r="2" fill="url(#snowFlake)" class="snow s11"/>
    <circle cx="95" cy="160" r="3" fill="url(#snowFlake)" class="snow s12"/>
    <circle cx="120" cy="152" r="2.5" fill="url(#snowFlake)" class="snow s13"/>
    <circle cx="145" cy="158" r="3" fill="url(#snowFlake)" class="snow s14"/>
    <circle cx="165" cy="150" r="2" fill="url(#snowFlake)" class="snow s15"/>
  </g>

  <!-- LEKKIE ZAMGLENIE PRZY PODŁOŻU -->
  <ellipse cx="115" cy="188" rx="80" ry="6" fill="#D0E8FF" opacity="0.15" filter="url(#lightningGlow)"/>
</svg>