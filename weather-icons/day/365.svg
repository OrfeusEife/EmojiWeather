<svg width="233" height="200" viewBox="0 0 233 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- TŁO: RADIALNY GRADIENT ZANIKAJĄCY DO PRZEZROCZYSTOŚCI -->
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#4A9FD8" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#2E7DBC" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1A5A8A" stop-opacity="0"/>
    </radialGradient>

    <!-- CHMURA: JASNA, PUSZYSTA -->
    <radialGradient id="cloudGrad" cx="30%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="45%" stop-color="#F0F4F8"/>
      <stop offset="80%" stop-color="#D0E0EC"/>
      <stop offset="100%" stop-color="#A0B8CC"/>
    </radialGradient>

    <!-- KROPLA DESZCZU -->
    <linearGradient id="rainDrop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#40C4FF"/>
      <stop offset="100%" stop-color="#1A73E8"/>
    </linearGradient>

    <!-- PŁATEK ŚNIEGU -->
    <radialGradient id="snowflake" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#D0E8FF" stop-opacity="0.6"/>
    </radialGradient>

    <!-- FILTRY -->
    <filter id="cloudShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#3A6A8A" flood-opacity="0.3"/>
    </filter>
    <filter id="snowGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
    <filter id="snowShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0.5" dy="0.5" stdDeviation="0.5" flood-color="#1A4A6A" flood-opacity="0.3"/>
    </filter>
  </defs>

  <style>
    .bgLayer {
      animation: bgPulse 8s ease-in-out infinite;
    }
    .cloudMove {
      animation: cloudFloat 6s ease-in-out infinite;
    }
    /* KROPLA DESZCZU */
    .rainDrop {
      animation: fallRain 1.8s ease-in infinite;
    }
    /* PŁATEK ŚNIEGU */
    .snowflake {
      animation: fallSnow 3.5s ease-in-out infinite;
      filter: url(#snowShadow);
    }
    /* Opóźnienia dla deszczu (12 kropli) */
    .r1 { animation-delay: 0.0s; }
    .r2 { animation-delay: 0.2s; }
    .r3 { animation-delay: 0.4s; }
    .r4 { animation-delay: 0.6s; }
    .r5 { animation-delay: 0.8s; }
    .r6 { animation-delay: 1.0s; }
    .r7 { animation-delay: 1.2s; }
    .r8 { animation-delay: 1.4s; }
    .r9 { animation-delay: 0.1s; }
    .r10 { animation-delay: 0.5s; }
    .r11 { animation-delay: 0.9s; }
    .r12 { animation-delay: 1.3s; }

    /* Opóźnienia dla śniegu (18 płatków) */
    .s1 { animation-delay: 0.0s; }
    .s2 { animation-delay: 0.3s; }
    .s3 { animation-delay: 0.6s; }
    .s4 { animation-delay: 0.9s; }
    .s5 { animation-delay: 1.2s; }
    .s6 { animation-delay: 1.5s; }
    .s7 { animation-delay: 1.8s; }
    .s8 { animation-delay: 2.1s; }
    .s9 { animation-delay: 2.4s; }
    .s10 { animation-delay: 2.7s; }
    .s11 { animation-delay: 3.0s; }
    .s12 { animation-delay: 0.15s; }
    .s13 { animation-delay: 0.45s; }
    .s14 { animation-delay: 0.75s; }
    .s15 { animation-delay: 1.05s; }
    .s16 { animation-delay: 1.35s; }
    .s17 { animation-delay: 1.65s; }
    .s18 { animation-delay: 1.95s; }

    @keyframes bgPulse {
      0%,100% { opacity: 0.9; }
      50% { opacity: 1; }
    }
    @keyframes cloudFloat {
      0%,100% { transform: translateX(0) translateY(0); }
      50% { transform: translateX(-3px) translateY(-2px); }
    }
    @keyframes fallRain {
      0% { transform: translateY(-25px) translateX(0); opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 0.9; }
      100% { transform: translateY(55px) translateX(-8px); opacity: 0; }
    }
    @keyframes fallSnow {
      0% { transform: translateY(-20px) translateX(0) rotate(0deg); opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 0.9; }
      100% { transform: translateY(50px) translateX(-6px) rotate(360deg); opacity: 0; }
    }
  </style>

  <!-- TŁO -->
  <rect width="233" height="200" fill="url(#bgGlow)" class="bgLayer"/>

  <!-- CHMURA (BEZ SŁOŃCA) -->
  <g class="cloudMove" filter="url(#cloudShadow)">
    <path d="M 50,115 
             C 50,95 70,85 85,90 
             C 95,70 125,65 140,80 
             C 155,75 175,85 180,105 
             C 195,105 200,115 195,125 
             C 190,135 170,135 160,130 
             L 70,130 
             C 55,130 45,125 50,115 Z" 
          fill="url(#cloudGrad)"/>
    <path d="M 70,105 C 80,90 105,85 125,93 C 135,88 152,92 158,106 C 165,102 175,108 172,118 C 168,126 148,128 135,124 L 85,126 C 73,127 66,120 70,105 Z" 
          fill="#FFFFFF" opacity="0.5"/>
  </g>

  <!-- KROPLE DESZCZU (12 sztuk) -->
  <g>
    <path class="rainDrop r1" d="M 85 138 C 85 138 81 145 81 148 C 81 151 83 153 85 153 C 87 153 89 151 89 148 C 89 145 85 138 85 138 Z" fill="url(#rainDrop)"/>
    <path class="rainDrop r2" d="M 110 142 C 110 142 106 149 106 152 C 106 155 108 157 110 157 C 112 157 114 155 114 152 C 114 149 110 142 110 142 Z" fill="url(#rainDrop)"/>
    
    <path class="rainDrop r5" d="M 100 148 C 100 148 96 155 96 158 C 96 161 98 163 100 163 C 102 163 104 161 104 158 C 104 155 100 148 100 148 Z" fill="url(#rainDrop)"/>
    <path class="rainDrop r6" d="M 125 145 C 125 145 121 152 121 155 C 121 158 123 160 125 160 C 127 160 129 158 129 155 C 129 152 125 145 125 145 Z" fill="url(#rainDrop)"/>
    
    <path class="rainDrop r9" d="M 115 155 C 115 155 111 162 111 165 C 111 168 113 170 115 170 C 117 170 119 168 119 165 C 119 162 115 155 115 155 Z" fill="url(#rainDrop)"/>
    <path class="rainDrop r10" d="M 140 160 C 140 160 136 167 136 170 C 136 173 138 175 140 175 C 142 175 144 173 144 170 C 144 167 140 160 140 160 Z" fill="url(#rainDrop)"/>
    
    <path class="rainDrop r12" d="M 130 170 C 130 170 126 177 126 180 C 126 183 128 185 130 185 C 132 185 134 183 134 180 C 134 177 130 170 130 170 Z" fill="url(#rainDrop)"/>
  </g>

  <!-- PŁATKI ŚNIEGU (18 sztuk) -->
  <g filter="url(#snowGlow)">
    <circle class="snowflake s1" cx="90" cy="140" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s2" cx="115" cy="144" r="2" fill="url(#snowflake)"/>
    <circle class="snowflake s3" cx="140" cy="138" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s4" cx="165" cy="142" r="2" fill="url(#snowflake)"/>
    <circle class="snowflake s5" cx="105" cy="150" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s6" cx="130" cy="148" r="2" fill="url(#snowflake)"/>
    <circle class="snowflake s7" cx="155" cy="152" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s8" cx="80" cy="155" r="2" fill="url(#snowflake)"/>
    <circle class="snowflake s9" cx="110" cy="158" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s10" cx="135" cy="162" r="2" fill="url(#snowflake)"/>
    <circle class="snowflake s11" cx="160" cy="165" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s12" cx="95" cy="168" r="2" fill="url(#snowflake)"/>
    <circle class="snowflake s13" cx="120" cy="172" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s14" cx="145" cy="170" r="2" fill="url(#snowflake)"/>
    <circle class="snowflake s15" cx="170" cy="175" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s16" cx="85" cy="178" r="2" fill="url(#snowflake)"/>
    <circle class="snowflake s17" cx="125" cy="182" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s18" cx="150" cy="180" r="2" fill="url(#snowflake)"/>
  </g>

  <!-- MGIEŁKA PRZY PODŁOŻU -->
  <ellipse cx="115" cy="188" rx="80" ry="6" fill="#C0E0FF" opacity="0.25" filter="url(#cloudShadow)"/>
</svg>