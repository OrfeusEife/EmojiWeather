<svg width="233" height="200" viewBox="0 0 233 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- TŁO -->
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#00BFFF" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#008B8B" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#5F9EA0" stop-opacity="0"/>
    </radialGradient>

    <!-- SŁOŃCE -->
    <radialGradient id="sunGlowHard" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE566" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#FFB820" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FF8C00" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="sunCoreHard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF176"/>
      <stop offset="100%" stop-color="#FF9800"/>
    </linearGradient>

    <!-- CHMURKA (gradient bez zmian) -->
    <radialGradient id="cloudGrad" cx="30%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="45%" stop-color="#E8F2FA"/>
      <stop offset="80%" stop-color="#B8D4E8"/>
      <stop offset="100%" stop-color="#8EB8D4"/>
    </radialGradient>

    <!-- FILTRY -->
    <filter id="glowHard" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="cloudShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#3A5C8C" flood-opacity="0.3"/>
    </filter>
  </defs>

  <style>
    .bgLayer { animation: bgPulse 6s ease-in-out infinite; }
    .sunPulseHard { animation: pulseHard 3.5s ease-in-out infinite; transform-origin: 116px 100px; }
    .sunGlowHardAnim { animation: glowHardPulse 3.5s ease-in-out infinite; transform-origin: 116px 100px; }
    .cloudMove { animation: cloudFloat 6s ease-in-out infinite; }

    @keyframes bgPulse { 0%,100% { opacity: 0.85; } 50% { opacity: 1; } }
    @keyframes pulseHard { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
    @keyframes glowHardPulse { 0%,100% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.14); opacity: 1; } }
    @keyframes cloudFloat { 0%,100% { transform: translateX(0) translateY(0); } 50% { transform: translateX(-2px) translateY(-2px); } }
  </style>

  <!-- TŁO -->
  <rect width="233" height="200" fill="url(#bgGlow)" class="bgLayer"/>

  <!-- SŁOŃCE -->
  <circle cx="116" cy="100" r="52" fill="url(#sunGlowHard)" filter="url(#glowHard)" class="sunGlowHardAnim"/>
  <g class="sunPulseHard">
    <circle cx="116" cy="100" r="32" fill="url(#sunCoreHard)" filter="url(#glowHard)" opacity="0.9"/>
    <circle cx="116" cy="100" r="28" fill="url(#sunCoreHard)"/>
    <circle cx="106" cy="88" r="6" fill="#FFF9C4" opacity="0.9"/>
    <circle cx="126" cy="104" r="5" fill="#FFF9C4" opacity="0.8"/>
    <circle cx="108" cy="112" r="4" fill="#FFF9C4" opacity="0.7"/>
  </g>

  <!-- CHMURKA W ODBICIU LUSTRZANYM W POZIOMIE (flipped), NACHODZĄCA NA SŁOŃCE Z PRAWEJ STRONY -->
  <g class="cloudMove" filter="url(#cloudShadow)" transform="translate(240, 0) scale(-1, 1)">
    <path d="M 125,115 
             C 125,100 140,92 152,96 
             C 160,82 178,80 188,90 
             C 196,86 208,92 210,105 
             C 215,108 216,118 210,125 
             C 205,130 190,128 180,125 
             L 135,125 
             C 125,125 120,120 125,115 Z"
          fill="url(#cloudGrad)"/>
  </g>
</svg>