<svg width="233" height="200" viewBox="0 0 233 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- TŁO: RADIALNY GRADIENT ZANIKAJĄCY DO PRZEZROCZYSTOŚCI -->
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#B0E0FF" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#80C0E0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#5F9EA0" stop-opacity="0"/>
    </radialGradient>

    <!-- CHMURA: JASNA, PUSZYSTA -->
    <radialGradient id="cloudGrad" cx="30%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="45%" stop-color="#E8F2FA"/>
      <stop offset="80%" stop-color="#B8D4E8"/>
      <stop offset="100%" stop-color="#8EB8D4"/>
    </radialGradient>

    <!-- KULKA GRADU – RADIALNY GRADIENT -->
    <radialGradient id="hailStone" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="60%" stop-color="#C0E8FF"/>
      <stop offset="100%" stop-color="#6CA0C0"/>
    </radialGradient>

    <!-- FILTRY -->
    <filter id="cloudShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#3A5C8C" flood-opacity="0.35"/>
    </filter>
    <filter id="iceGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.2"/>
    </filter>
  </defs>

  <style>
    .bgLayer {
      animation: bgPulse 6s ease-in-out infinite;
    }
    .cloudMove {
      animation: cloudFloat 5s ease-in-out infinite;
    }

    /* SZYBKIE ANIMACJE – każda kulka ma inny kąt padania */
    .h1 { animation: fall1 0.9s linear infinite; }
    .h2 { animation: fall2 1.0s linear infinite; }
    .h3 { animation: fall3 0.8s linear infinite; }
    .h4 { animation: fall4 0.95s linear infinite; }
    .h5 { animation: fall5 0.85s linear infinite; }
    .h6 { animation: fall6 1.05s linear infinite; }
    .h7 { animation: fall7 0.9s linear infinite; }

    /* Opóźnienia – żeby nie spadały jednocześnie */
    .d1 { animation-delay: 0s; }
    .d2 { animation-delay: 0.2s; }
    .d3 { animation-delay: 0.4s; }
    .d4 { animation-delay: 0.6s; }
    .d5 { animation-delay: 0.8s; }
    .d6 { animation-delay: 1.0s; }
    .d7 { animation-delay: 1.2s; }

    /* Różne trajektorie – od mocnego lewego do mocnego prawego */
    @keyframes fall1 {
      0% { transform: translate(0px, -20px); opacity: 0; }
      15% { opacity: 1; }
      85% { opacity: 1; }
      100% { transform: translate(-20px, 60px); opacity: 0; }
    }
    @keyframes fall2 {
      0% { transform: translate(0px, -20px); opacity: 0; }
      15% { opacity: 1; }
      85% { opacity: 1; }
      100% { transform: translate(-10px, 60px); opacity: 0; }
    }
    @keyframes fall3 {
      0% { transform: translate(0px, -20px); opacity: 0; }
      15% { opacity: 1; }
      85% { opacity: 1; }
      100% { transform: translate(-5px, 60px); opacity: 0; }
    }
    @keyframes fall4 {
      0% { transform: translate(0px, -20px); opacity: 0; }
      15% { opacity: 1; }
      85% { opacity: 1; }
      100% { transform: translate(0px, 60px); opacity: 0; }
    }
    @keyframes fall5 {
      0% { transform: translate(0px, -20px); opacity: 0; }
      15% { opacity: 1; }
      85% { opacity: 1; }
      100% { transform: translate(8px, 60px); opacity: 0; }
    }
    @keyframes fall6 {
      0% { transform: translate(0px, -20px); opacity: 0; }
      15% { opacity: 1; }
      85% { opacity: 1; }
      100% { transform: translate(15px, 60px); opacity: 0; }
    }
    @keyframes fall7 {
      0% { transform: translate(0px, -20px); opacity: 0; }
      15% { opacity: 1; }
      85% { opacity: 1; }
      100% { transform: translate(22px, 60px); opacity: 0; }
    }

    @keyframes bgPulse {
      0%,100% { opacity: 0.85; }
      50% { opacity: 1; }
    }
    @keyframes cloudFloat {
      0%,100% { transform: translateX(0) translateY(0); }
      50% { transform: translateX(-3px) translateY(-2px); }
    }
  </style>

  <!-- TŁO -->
  <rect width="233" height="200" fill="url(#bgGlow)" class="bgLayer"/>

  <!-- CHMURA -->
  <g class="cloudMove" filter="url(#cloudShadow)">
    <path d="M 50,115 
             C 50,95 70,85 85,90 
             C 95,70 125,65 140,80 
             C 155,75 175,85 180,105 
             C 195,105 200,115 195,125 
             C 190,135 170,135 160,130 
             L 70,130 
             C 55,130 45,125 50,115 Z" 
          fill="url(#cloudGrad)"/>
    <path d="M 70,105 C 80,90 105,85 125,93 C 135,88 152,92 158,106 C 165,102 175,108 172,118 C 168,126 148,128 135,124 L 85,126 C 73,127 66,120 70,105 Z" 
          fill="#FFFFFF" opacity="0.4"/>
  </g>

  <!-- 7 KULEK GRADU – każda z własnym kątem i szybkim spadkiem -->
  <g filter="url(#iceGlow)">
    <circle cx="95" cy="140" r="5" fill="url(#hailStone)" class="h1 d1"/>
    <circle cx="120" cy="145" r="5" fill="url(#hailStone)" class="h2 d2"/>
    <circle cx="140" cy="138" r="5" fill="url(#hailStone)" class="h3 d3"/>
    <circle cx="105" cy="150" r="5" fill="url(#hailStone)" class="h4 d4"/>
    <circle cx="155" cy="142" r="5" fill="url(#hailStone)" class="h5 d5"/>
    <circle cx="130" cy="148" r="5" fill="url(#hailStone)" class="h6 d6"/>
    <circle cx="170" cy="146" r="5" fill="url(#hailStone)" class="h7 d7"/>
  </g>

  <!-- LODOWA MGIEŁKA PRZY PODŁOŻU -->
  <ellipse cx="115" cy="188" rx="90" ry="7" fill="#C0E0FF" opacity="0.3" filter="url(#iceGlow)"/>
  <ellipse cx="115" cy="193" rx="65" ry="4" fill="#FFFFFF" opacity="0.2" filter="url(#iceGlow)"/>
  <ellipse cx="115" cy="196" rx="40" ry="2" fill="#E0F0FF" opacity="0.3" filter="url(#iceGlow)"/>
</svg>