<svg width="233" height="200" viewBox="0 0 233 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#B0E0FF" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#80C0E0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#5F9EA0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="darkCloudGrad" cx="30%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#B0C4DE"/>
      <stop offset="40%" stop-color="#8CAEC8"/>
      <stop offset="80%" stop-color="#5A7A9A"/>
      <stop offset="100%" stop-color="#4A6A8A"/>
    </radialGradient>
    <radialGradient id="lightCloudGrad" cx="30%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="45%" stop-color="#E8F2FA"/>
      <stop offset="80%" stop-color="#B8D4E8"/>
      <stop offset="100%" stop-color="#8EB8D4"/>
    </radialGradient>
    <filter id="cloudShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#2A4A6A" flood-opacity="0.4"/>
    </filter>
    <filter id="cloudShadowLight" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#3A5C8C" flood-opacity="0.3"/>
    </filter>
  </defs>

  <style>
    .bgLayer { animation: bgPulse 6s ease-in-out infinite; }
    .darkCloud { animation: darkCloudMove 8s ease-in-out infinite; }
    .lightCloudLeft { animation: lightCloudMove1 7s ease-in-out infinite; }
    .lightCloudRight { animation: lightCloudMove2 6s ease-in-out infinite; }
    
    /* DODANE: animacja dla poziomych kresek */
    .horizontalLine {
      animation: moveLeftRight 12s ease-in-out infinite;
    }

    @keyframes bgPulse { 0%,100% { opacity: 0.85; } 50% { opacity: 1; } }
    @keyframes darkCloudMove { 0%,100% { transform: translateX(0) translateY(0); } 50% { transform: translateX(-5px) translateY(-3px); } }
    @keyframes lightCloudMove1 { 0%,100% { transform: translateX(0) translateY(0); } 50% { transform: translateX(-3px) translateY(-2px); } }
    @keyframes lightCloudMove2 { 0%,100% { transform: translateX(0) translateY(0); } 50% { transform: translateX(4px) translateY(-2px); } }
    
    /* DODANE: klatki kluczowe dla przesuwania kresek w lewo i prawo */
    @keyframes moveLeftRight {
      0% { transform: translateX(-20px); }
      50% { transform: translateX(20px); }
      100% { transform: translateX(-20px); }
    }
  </style>

  <rect width="233" height="200" fill="url(#bgGlow)" class="bgLayer"/>

  <!-- DUŻA CIEMNA CHMURA -->
  <g class="darkCloud" filter="url(#cloudShadow)">
    <path d="M 40,115 C 40,90 70,75 95,82 C 115,65 155,60 175,78 C 195,72 220,85 222,108 C 225,118 220,135 208,140 C 195,148 160,145 140,138 L 60,138 C 45,138 35,130 40,115 Z" fill="url(#darkCloudGrad)"/>
  </g>

  <!-- LEWA JASNA CHMURKA -->
  <g class="lightCloudLeft" filter="url(#cloudShadowLight)">
    <path d="M 20,102 C 20,90 33,82 45,86 C 55,75 70,73 80,81 C 89,77 99,84 101,95 C 105,101 103,111 95,115 C 87,119 75,117 65,114 L 30,114 C 23,114 20,108 20,102 Z" fill="url(#lightCloudGrad)"/>
  </g>

  <!-- PRAWA JASNA CHMURKA (większa, bliżej środka, cała widoczna) -->
  <g class="lightCloudRight" filter="url(#cloudShadowLight)">
    <path d="M 145,138 C 145,125 158,117 170,121 C 180,110 195,108 205,115 C 212,118 215,126 212,132 C 208,137 198,136 188,134 L 155,134 C 147,134 145,130 145,138 Z" fill="url(#lightCloudGrad)"/>
  </g>

  <!-- DŁUGIE POZIOME KRESKI (pod chmurą) – TERAZ BĘDĄ SIĘ PRZESUWAĆ -->
  <g stroke="#778899" stroke-width="3.5" stroke-dasharray="30 18 20 8" opacity="0.5">
    <line class="horizontalLine" x1="30" y1="155" x2="220" y2="155" style="animation-duration: 4s; animation-delay: -5s;" />
    <line class="horizontalLine" x1="40" y1="170" x2="230" y2="170" style="animation-duration: 6s; animation-delay: -2s;" />
    <line class="horizontalLine" x1="25" y1="185" x2="215" y2="185" style="animation-duration: 9s; animation-delay: -1s;" />
  </g>
</svg>