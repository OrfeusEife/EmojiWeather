<svg width="233" height="200" viewBox="0 0 233 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- TŁO: CIEMNE, BURZOWE -->
    <radialGradient id="bgStorm" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#3A5E7A" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#1F3F58" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0F2A3A" stop-opacity="0"/>
    </radialGradient>

    <!-- CHMURA: CIEMNA, BURZOWA -->
    <radialGradient id="cloudStorm" cx="30%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#7A8A9A"/>
      <stop offset="45%" stop-color="#5A6A7A"/>
      <stop offset="80%" stop-color="#3A4A5A"/>
      <stop offset="100%" stop-color="#2A3A4A"/>
    </radialGradient>

    <!-- KROPLA DESZCZU -->
    <linearGradient id="rainDrop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#80D8FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1A73E8" stop-opacity="0.5"/>
    </linearGradient>

    <!-- KULKA GRADU -->
    <radialGradient id="hailStone" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="60%" stop-color="#C0E8FF"/>
      <stop offset="100%" stop-color="#6CA0C0"/>
    </radialGradient>

    <!-- FILTRY -->
    <filter id="cloudShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0A1A2A" flood-opacity="0.5"/>
    </filter>
    <filter id="lightningGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="rainBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.1"/>
    </filter>
    <filter id="iceGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.3"/>
    </filter>
  </defs>

  <style>
    .bgLayer {
      animation: bgPulse 8s ease-in-out infinite;
    }
    .cloudMove {
      animation: cloudFloat 6s ease-in-out infinite;
    }
    .lightning {
      animation: flash 0.2s steps(2, start) infinite;
    }
    .lightningGlow {
      animation: flashGlow 0.2s steps(2, start) infinite;
    }
    /* Deszcz – 10 kropel, mocno ukośny (skos w lewo) */
    .rainDrop {
      animation: fallRain 1.8s ease-in infinite;
    }
    /* Grad – 6 kulek, różne kąty */
    .hailLeft {
      animation: fallHailLeft 1.0s linear infinite;
    }
    .hailStraight {
      animation: fallHailStraight 0.9s linear infinite;
    }
    .hailRight {
      animation: fallHailRight 1.1s linear infinite;
    }
    /* Opóźnienia deszczu */
    .r1 { animation-delay: 0.0s; }
    .r2 { animation-delay: 0.2s; }
    .r3 { animation-delay: 0.4s; }
    .r4 { animation-delay: 0.6s; }
    .r5 { animation-delay: 0.8s; }
    .r6 { animation-delay: 1.0s; }
    .r7 { animation-delay: 1.2s; }
    .r8 { animation-delay: 1.4s; }
    .r9 { animation-delay: 1.6s; }
    .r10 { animation-delay: 1.8s; }
    /* Opóźnienia gradu */
    .h1 { animation-delay: 0.0s; }
    .h2 { animation-delay: 0.3s; }
    .h3 { animation-delay: 0.6s; }
    .h4 { animation-delay: 0.9s; }
    .h5 { animation-delay: 1.2s; }
    .h6 { animation-delay: 1.5s; }

    @keyframes bgPulse {
      0%,100% { opacity: 0.9; }
      50% { opacity: 1; }
    }
    @keyframes cloudFloat {
      0%,100% { transform: translateX(0) translateY(0); }
      50% { transform: translateX(-4px) translateY(-2px); }
    }
    @keyframes flash {
      0% { opacity: 1; }
      50% { opacity: 0.3; }
      100% { opacity: 1; }
    }
    @keyframes flashGlow {
      0% { opacity: 0.8; }
      50% { opacity: 0.1; }
      100% { opacity: 0.8; }
    }
    /* Deszcz zacinający – mocny skos w lewo (-22px) */
    @keyframes fallRain {
      0% { transform: translateY(-25px) translateX(0px); opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 0.8; }
      100% { transform: translateY(60px) translateX(-22px); opacity: 0; }
    }
    /* Grad – lekkie skosy */
    @keyframes fallHailLeft {
      0% { transform: translate(0px, -25px); opacity: 0; }
      15% { opacity: 1; }
      85% { opacity: 1; }
      100% { transform: translate(-15px, 60px); opacity: 0; }
    }
    @keyframes fallHailStraight {
      0% { transform: translate(0px, -25px); opacity: 0; }
      15% { opacity: 1; }
      85% { opacity: 1; }
      100% { transform: translate(0px, 60px); opacity: 0; }
    }
    @keyframes fallHailRight {
      0% { transform: translate(0px, -25px); opacity: 0; }
      15% { opacity: 1; }
      85% { opacity: 1; }
      100% { transform: translate(15px, 60px); opacity: 0; }
    }
  </style>

  <!-- TŁO -->
  <rect width="233" height="200" fill="url(#bgStorm)" class="bgLayer"/>

  <!-- BŁYSKAWICA (SZERSZA) -->
  <g class="lightning">
    <path d="M 115,70 L 128,100 L 105,108 L 135,140 L 100,148 L 140,190" 
          fill="none" stroke="#FFF085" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#lightningGlow)" class="lightningGlow"/>
    <path d="M 115,70 L 128,100 L 105,108 L 135,140 L 100,148 L 140,190" 
          fill="none" stroke="#FFDF20" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 115,70 L 128,100 L 105,108 L 135,140 L 100,148 L 140,190" 
          fill="none" stroke="#FEF9C2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- CHMURA (CIEMNA) -->
  <g class="cloudMove" filter="url(#cloudShadow)">
    <path d="M 40,115 
             C 40,95 60,82 78,88 
             C 88,68 120,60 138,75 
             C 152,68 175,76 182,96 
             C 198,98 205,110 198,124 
             C 192,136 170,138 158,132 
             L 65,134 
             C 48,136 38,130 40,115 Z" 
          fill="url(#cloudStorm)"/>
    <path d="M 70,105 C 80,88 105,82 125,90 C 135,85 152,90 158,104 C 165,100 175,106 172,118 C 168,126 148,128 135,124 L 85,126 C 73,127 66,120 70,105 Z" 
          fill="#FFFFFF" opacity="0.1"/>
  </g>

  <!-- DESZCZ ZACINAJĄCY – 10 KROPEL, MOCNY SKOS -->
  <g filter="url(#rainBlur)">
    <path class="rainDrop r1" d="M 75,135 C 75,135 72,142 72,145 C 72,148 74,150 75,150 C 76,150 78,148 78,145 C 78,142 75,135 75,135 Z" fill="url(#rainDrop)"/>
    <path class="rainDrop r2" d="M 100,130 C 100,130 97,137 97,140 C 97,143 99,145 100,145 C 101,145 103,143 103,140 C 103,137 100,130 100,130 Z" fill="url(#rainDrop)"/>
    <path class="rainDrop r3" d="M 125,138 C 125,138 122,145 122,148 C 122,151 124,153 125,153 C 126,153 128,151 128,148 C 128,145 125,138 125,138 Z" fill="url(#rainDrop)"/>
    <path class="rainDrop r4" d="M 150,132 C 150,132 147,139 147,142 C 147,145 149,147 150,147 C 151,147 153,145 153,142 C 153,139 150,132 150,132 Z" fill="url(#rainDrop)"/>
    <path class="rainDrop r5" d="M 175,140 C 175,140 172,147 172,150 C 172,153 174,155 175,155 C 176,155 178,153 178,150 C 178,147 175,140 175,140 Z" fill="url(#rainDrop)"/>
    <path class="rainDrop r6" d="M 85,150 C 85,150 82,157 82,160 C 82,163 84,165 85,165 C 86,165 88,163 88,160 C 88,157 85,150 85,150 Z" fill="url(#rainDrop)"/>
    <path class="rainDrop r7" d="M 110,145 C 110,145 107,152 107,155 C 107,158 109,160 110,160 C 111,160 113,158 113,155 C 113,152 110,145 110,145 Z" fill="url(#rainDrop)"/>
    <path class="rainDrop r8" d="M 135,152 C 135,152 132,159 132,162 C 132,165 134,167 135,167 C 136,167 138,165 138,162 C 138,159 135,152 135,152 Z" fill="url(#rainDrop)"/>
    <path class="rainDrop r9" d="M 160,148 C 160,148 157,155 157,158 C 157,161 159,163 160,163 C 161,163 163,161 163,158 C 163,155 160,148 160,148 Z" fill="url(#rainDrop)"/>
    <path class="rainDrop r10" d="M 90,162 C 90,162 87,169 87,172 C 87,175 89,177 90,177 C 91,177 93,175 93,172 C 93,169 90,162 90,162 Z" fill="url(#rainDrop)"/>
  </g>

  <!-- GRAD (6 KULEK) -->
  <g filter="url(#iceGlow)">
    <circle cx="85" cy="140" r="5" fill="url(#hailStone)" class="hailLeft h1"/>
    <circle cx="120" cy="148" r="5" fill="url(#hailStone)" class="hailStraight h2"/>
    <circle cx="155" cy="138" r="5" fill="url(#hailStone)" class="hailRight h3"/>
    <circle cx="105" cy="152" r="5" fill="url(#hailStone)" class="hailStraight h4"/>
    <circle cx="140" cy="144" r="5" fill="url(#hailStone)" class="hailLeft h5"/>
    <circle cx="170" cy="150" r="5" fill="url(#hailStone)" class="hailRight h6"/>
  </g>

  <!-- MGIEŁKA PRZY PODŁOŻU -->
  <ellipse cx="115" cy="188" rx="80" ry="6" fill="#A0C8E8" opacity="0.15" filter="url(#lightningGlow)"/>
</svg>