<svg width="233" height="200" viewBox="0 0 233 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- TŁO: JASNY BŁĘKITNY GRADIENT ZANIKAJĄCY DO PRZEZROCZYSTOŚCI -->
   <radialGradient id="bgGlow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#4A9FD8" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#2E7DBC" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1A5A8A" stop-opacity="0"/>
    </radialGradient>

    <!-- CHMURA: JASNA, PUSZYSTA -->
    <radialGradient id="cloudGrad" cx="30%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="45%" stop-color="#F0F4F8"/>
      <stop offset="80%" stop-color="#D0E0EC"/>
      <stop offset="100%" stop-color="#A0B8CC"/>
    </radialGradient>

    <!-- PŁATEK ŚNIEGU -->
    <radialGradient id="snowflake" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#D0E8FF" stop-opacity="0.6"/>
    </radialGradient>

    <!-- FILTRY -->
    <filter id="cloudShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#3A6A8A" flood-opacity="0.3"/>
    </filter>
    <filter id="snowGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
    <filter id="snowShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0.5" dy="0.5" stdDeviation="0.5" flood-color="#1A4A6A" flood-opacity="0.3"/>
    </filter>
  </defs>

  <style>
    .bgLayer {
      animation: bgPulse 8s ease-in-out infinite;
    }
    .cloudMove {
      animation: cloudFloat 6s ease-in-out infinite;
    }
    .snowflake {
      animation: fallLightSnow 4s ease-in-out infinite;
      filter: url(#snowShadow);
    }
    /* Opóźnienia dla rzadkich płatków */
    .s1 { animation-delay: 0s; }
    .s2 { animation-delay: 0.6s; }
    .s3 { animation-delay: 1.2s; }
    .s4 { animation-delay: 1.8s; }
    .s5 { animation-delay: 2.4s; }
    .s6 { animation-delay: 3.0s; }
    .s7 { animation-delay: 0.3s; }
    .s8 { animation-delay: 0.9s; }
    .s9 { animation-delay: 1.5s; }
    .s10 { animation-delay: 2.1s; }
    .s11 { animation-delay: 2.7s; }
    .s12 { animation-delay: 3.3s; }
    .s13 { animation-delay: 0.5s; }
    .s14 { animation-delay: 1.1s; }
    .s15 { animation-delay: 1.7s; }
    .s16 { animation-delay: 2.3s; }
    .s17 { animation-delay: 2.9s; }
    .s18 { animation-delay: 3.5s; }

    @keyframes bgPulse {
      0%,100% { opacity: 0.9; }
      50% { opacity: 1; }
    }
    @keyframes cloudFloat {
      0%,100% { transform: translateX(0) translateY(0); }
      50% { transform: translateX(-3px) translateY(-2px); }
    }
    @keyframes fallLightSnow {
      0% { transform: translateY(-15px) translateX(0) rotate(0deg); opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 0.9; }
      100% { transform: translateY(50px) translateX(-5px) rotate(180deg); opacity: 0; }
    }
  </style>

  <!-- TŁO -->
  <rect width="233" height="200" fill="url(#bgGlow)" class="bgLayer"/>

  <!-- CHMURA (BEZ SŁOŃCA) -->
  <g class="cloudMove" filter="url(#cloudShadow)">
    <path d="M 50,115 
             C 50,95 70,85 85,90 
             C 95,70 125,65 140,80 
             C 155,75 175,85 180,105 
             C 195,105 200,115 195,125 
             C 190,135 170,135 160,130 
             L 70,130 
             C 55,130 45,125 50,115 Z" 
          fill="url(#cloudGrad)"/>
    <path d="M 70,105 C 80,90 105,85 125,93 C 135,88 152,92 158,106 C 165,102 175,108 172,118 C 168,126 148,128 135,124 L 85,126 C 73,127 66,120 70,105 Z" 
          fill="#FFFFFF" opacity="0.5"/>
  </g>

  <!-- PŁATKI ŚNIEGU – LEKKIE, RZADKIE, MAŁE -->
  <g filter="url(#snowGlow)">
    <circle class="snowflake s1" cx="90" cy="138" r="2" fill="url(#snowflake)"/>
    <circle class="snowflake s2" cx="120" cy="142" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s3" cx="145" cy="136" r="2" fill="url(#snowflake)"/>
    <circle class="snowflake s4" cx="105" cy="148" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s5" cx="135" cy="145" r="2" fill="url(#snowflake)"/>
    <circle class="snowflake s6" cx="80" cy="152" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s7" cx="155" cy="150" r="2" fill="url(#snowflake)"/>
    <circle class="snowflake s8" cx="100" cy="160" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s9" cx="125" cy="158" r="2" fill="url(#snowflake)"/>
    <circle class="snowflake s10" cx="150" cy="165" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s11" cx="70" cy="168" r="2" fill="url(#snowflake)"/>
    <circle class="snowflake s12" cx="115" cy="172" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s13" cx="140" cy="170" r="2" fill="url(#snowflake)"/>
    <circle class="snowflake s14" cx="95" cy="178" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s15" cx="130" cy="180" r="2" fill="url(#snowflake)"/>
    <circle class="snowflake s16" cx="160" cy="175" r="2.5" fill="url(#snowflake)"/>
    <circle class="snowflake s17" cx="85" cy="185" r="2" fill="url(#snowflake)"/>
    <circle class="snowflake s18" cx="110" cy="188" r="2.5" fill="url(#snowflake)"/>
  </g>

  <!-- DYSKRETNA ŚNIEŻNA MGIEŁKA PRZY PODŁOŻU -->
  <ellipse cx="115" cy="190" rx="70" ry="5" fill="#C0E0FF" opacity="0.2" filter="url(#snowGlow)"/>
</svg>