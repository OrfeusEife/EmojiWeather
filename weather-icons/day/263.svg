<svg width="233" height="200" viewBox="0 0 233 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- TŁO: RADIALNY GRADIENT ZANIKAJĄCY DO PRZEZROCZYSTOŚCI -->
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#B0E0FF" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#80C0E0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#5F9EA0" stop-opacity="0"/>
    </radialGradient>

    <!-- CHMURA: ZIMOWA, CIĘŻKA, SZARA (MOŻE BYĆ TAKA SAMA) -->
    <radialGradient id="cloudWinter" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FAFAFA"/>
      <stop offset="60%" stop-color="#F1F5F9"/>
      <stop offset="100%" stop-color="#D1D5DC"/>
    </radialGradient>

    <!-- KROPELKI MŻAWKI (ZWYKŁEJ, NIE MARZNĄCEJ): BARDZIEJ PRZEZROCZYSTE -->
    <radialGradient id="rainDrop" cx="30%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#80B0E0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#40A0D0" stop-opacity="0.2"/>
    </radialGradient>

    <!-- FILTRY -->
    <filter id="iceGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
    <!-- Delikatny cień dla kropelek -->
    <filter id="dropShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0.5" dy="0.5" stdDeviation="0.5" flood-color="#2A4A6A" flood-opacity="0.3"/>
    </filter>
    <filter id="cloudShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#2C3E4E" flood-opacity="0.4"/>
    </filter>
  </defs>

  <style>
    .bgLayer {
      animation: bgPulse 8s ease-in-out infinite;
    }
    .cloudMove {
      animation: cloudFloat 6s ease-in-out infinite;
    }
    .drizzleGroup1 {
      animation: fallSlow 2.5s linear infinite;
    }
    .drizzleGroup2 {
      animation: fallSlow 2.8s linear infinite;
      animation-delay: 0.6s;
    }
    .d1 { animation-delay: 0s; }
    .d2 { animation-delay: 0.3s; }
    .d3 { animation-delay: 0.7s; }
    .d4 { animation-delay: 1.1s; }
    .d5 { animation-delay: 0.15s; }
    .d6 { animation-delay: 0.55s; }
    .d7 { animation-delay: 0.9s; }
    .d8 { animation-delay: 1.3s; }
    .d9 { animation-delay: 0.4s; }
    .d10 { animation-delay: 0.8s; }
    .d11 { animation-delay: 1.2s; }
    .d12 { animation-delay: 0.2s; }
    .d13 { animation-delay: 0.6s; }
    .d14 { animation-delay: 1.0s; }
    .d15 { animation-delay: 1.4s; }

    @keyframes bgPulse {
      0%,100% { opacity: 0.85; }
      50% { opacity: 1; }
    }
    @keyframes cloudFloat {
      0%,100% { transform: translateX(0) translateY(0); }
      50% { transform: translateX(-3px) translateY(-2px); }
    }
    @keyframes fallSlow {
      0% { transform: translateY(-20px); opacity: 0; }
      15% { opacity: 1; }
      85% { opacity: 0.8; }
      100% { transform: translateY(45px); opacity: 0; }
    }
  </style>

  <!-- TŁO – RADIALNY GRADIENT -->
  <rect width="233" height="200" fill="url(#bgGlow)" class="bgLayer"/>

  <!-- MGIEŁKA PRZY PODŁOŻU -->
  <ellipse cx="115" cy="188" rx="85" ry="8" fill="#A0C0E0" opacity="0.2" filter="url(#iceGlow)"/>

  <!-- CHMURA -->
  <g class="cloudMove" filter="url(#cloudShadow)">
    <path d="M 40,120 
             C 40,100 60,88 78,92 
             C 88,72 120,65 138,78 
             C 152,70 175,78 182,98 
             C 198,100 205,112 198,124 
             C 192,136 170,138 158,132 
             L 65,134 
             C 48,136 38,130 40,120 Z" 
          fill="url(#cloudWinter)"/>
    <path d="M 70,105 C 80,90 105,85 125,93 C 135,88 152,92 158,106 C 165,102 175,108 172,118 C 168,126 148,128 135,124 L 85,126 C 73,127 66,120 70,105 Z" 
          fill="#A0B8CC" opacity="0.35"/>
  </g>

  <!-- KROPELKI MŻAWKI (ZWYKŁEJ) -->
  <g class="drizzleGroup1" filter="url(#dropShadow)">
    <circle cx="70" cy="130" r="2.5" fill="url(#rainDrop)" class="d1"/>
    <circle cx="95" cy="125" r="2" fill="url(#rainDrop)" class="d2"/>
    <circle cx="120" cy="135" r="2.5" fill="url(#rainDrop)" class="d3"/>
    <circle cx="145" cy="128" r="2" fill="url(#rainDrop)" class="d4"/>
    <circle cx="160" cy="140" r="2" fill="url(#rainDrop)" class="d5"/>
    <circle cx="55" cy="145" r="1.8" fill="url(#rainDrop)" class="d6"/>
    <circle cx="85" cy="150" r="2.2" fill="url(#rainDrop)" class="d7"/>
    <circle cx="110" cy="142" r="2.5" fill="url(#rainDrop)" class="d8"/>
  </g>

  <g class="drizzleGroup2" filter="url(#dropShadow)">
    <circle cx="80" cy="138" r="2" fill="url(#rainDrop)" class="d9"/>
    <circle cx="105" cy="130" r="2.5" fill="url(#rainDrop)" class="d10"/>
    <circle cx="130" cy="145" r="2" fill="url(#rainDrop)" class="d11"/>
    <circle cx="150" cy="132" r="2.2" fill="url(#rainDrop)" class="d12"/>
    <circle cx="65" cy="155" r="1.8" fill="url(#rainDrop)" class="d13"/>
    <circle cx="100" cy="148" r="2.5" fill="url(#rainDrop)" class="d14"/>
    <circle cx="140" cy="152" r="2" fill="url(#rainDrop)" class="d15"/>
    <circle cx="47" cy="135" r="1.5" fill="url(#rainDrop)" class="d1"/>
    <circle cx="175" cy="138" r="1.5" fill="url(#rainDrop)" class="d4"/>
  </g>

  <!-- DROBNE KROPELKI -->
  <g class="drizzleGroup1" opacity="0.6" filter="url(#dropShadow)">
    <circle cx="90" cy="160" r="1" fill="#C0E0FF" class="d2"/>
    <circle cx="115" cy="165" r="1" fill="#C0E0FF" class="d5"/>
    <circle cx="135" cy="158" r="1" fill="#C0E0FF" class="d8"/>
    <circle cx="75" cy="168" r="1" fill="#C0E0FF" class="d11"/>
    <circle cx="155" cy="162" r="1" fill="#C0E0FF" class="d14"/>
  </g>
</svg>