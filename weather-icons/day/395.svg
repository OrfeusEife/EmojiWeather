<svg width="233" height="200" viewBox="0 0 233 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- TŁO: CIEMNE, BURZOWE (śnieżne) -->
    <radialGradient id="bgStorm" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#4A6E8A" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#2E4A6A" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1A2E4A" stop-opacity="0"/>
    </radialGradient>

    <!-- CHMURA: CIEMNA, BURZOWA -->
    <radialGradient id="cloudStorm" cx="30%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#7A8A9A"/>
      <stop offset="45%" stop-color="#5A6A7A"/>
      <stop offset="80%" stop-color="#3A4A5A"/>
      <stop offset="100%" stop-color="#2A3A4A"/>
    </radialGradient>

    <!-- PŁATEK ŚNIEGU (gradient + cień) -->
    <radialGradient id="snowFlake" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C0D8F0" stop-opacity="0.8"/>
    </radialGradient>

    <!-- FILTR CIENIA DLA ŚNIEGU -->
    <filter id="snowShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000000" flood-opacity="0.3"/>
    </filter>

    <filter id="cloudShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0A1A2A" flood-opacity="0.5"/>
    </filter>
    <filter id="lightningGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <style>
    .bgLayer {
      animation: bgPulse 8s ease-in-out infinite;
    }
    .cloudMove {
      animation: cloudFloat 6s ease-in-out infinite;
    }
    /* Błyskawica – szybkie miganie */
    .lightning {
      animation: flash 0.2s steps(2, start) infinite;
    }
    .lightningGlow {
      animation: flashGlow 0.2s steps(2, start) infinite;
    }

    /* PŁATEK ŚNIEGU – WOLNY OPAD Z OBRÓTEM */
    .snowflake {
      animation: fallSnow 4s ease-in-out infinite;
      filter: url(#snowShadow);
    }
    /* Opóźnienia zgodne z Twoją listą (20 sztuk) */
    .s1 { animation-delay: 0s; }
    .s2 { animation-delay: 0.5s; }
    .s3 { animation-delay: 1.0s; }
    .s4 { animation-delay: 1.5s; }
    .s5 { animation-delay: 2.0s; }
    .s6 { animation-delay: 2.5s; }
    .s7 { animation-delay: 3.0s; }
    .s8 { animation-delay: 3.5s; }
    .s9 { animation-delay: 0.8s; }
    .s10 { animation-delay: 1.3s; }
    .s11 { animation-delay: 1.8s; }
    .s12 { animation-delay: 2.3s; }
    .s13 { animation-delay: 2.8s; }
    .s14 { animation-delay: 3.3s; }
    .s15 { animation-delay: 0.2s; }
    .s16 { animation-delay: 0.7s; }
    .s17 { animation-delay: 1.2s; }
    .s18 { animation-delay: 1.7s; }
    .s19 { animation-delay: 2.2s; }
    .s20 { animation-delay: 2.7s; }

    @keyframes bgPulse {
      0%,100% { opacity: 0.9; }
      50% { opacity: 1; }
    }
    @keyframes cloudFloat {
      0%,100% { transform: translateX(0) translateY(0); }
      50% { transform: translateX(-4px) translateY(-2px); }
    }
    @keyframes flash {
      0% { opacity: 1; }
      50% { opacity: 0.3; }
      100% { opacity: 1; }
    }
    @keyframes flashGlow {
      0% { opacity: 0.8; }
      50% { opacity: 0.1; }
      100% { opacity: 0.8; }
    }
    @keyframes fallSnow {
      0% { transform: translateY(-20px) translateX(0) rotate(0deg); opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 0.9; }
      100% { transform: translateY(55px) translateX(-10px) rotate(360deg); opacity: 0; }
    }
  </style>

  <!-- TŁO -->
  <rect width="233" height="200" fill="url(#bgStorm)" class="bgLayer"/>

  <!-- BŁYSKAWICA (SZERSZA) -->
  <g class="lightning">
    <path d="M 115,70 L 128,100 L 105,108 L 135,140 L 100,148 L 140,190" 
          fill="none" stroke="#FFF085" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#lightningGlow)" class="lightningGlow"/>
    <path d="M 115,70 L 128,100 L 105,108 L 135,140 L 100,148 L 140,190" 
          fill="none" stroke="#FFDF20" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 115,70 L 128,100 L 105,108 L 135,140 L 100,148 L 140,190" 
          fill="none" stroke="#FEF9C2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- CHMURA (CIEMNA, BURZOWA) -->
  <g class="cloudMove" filter="url(#cloudShadow)">
    <path d="M 40,115 
             C 40,95 60,82 78,88 
             C 88,68 120,60 138,75 
             C 152,68 175,76 182,96 
             C 198,98 205,110 198,124 
             C 192,136 170,138 158,132 
             L 65,134 
             C 48,136 38,130 40,115 Z" 
          fill="url(#cloudStorm)"/>
    <path d="M 70,105 C 80,88 105,82 125,90 C 135,85 152,90 158,104 C 165,100 175,106 172,118 C 168,126 148,128 135,124 L 85,126 C 73,127 66,120 70,105 Z" 
          fill="#FFFFFF" opacity="0.1"/>
  </g>

  <!-- PŁATKI ŚNIEGU (20 sztuk, z opóźnieniami) -->
  <g>
    <circle cx="60" cy="120" r="3" fill="url(#snowFlake)" class="snowflake s1"/>
    <circle cx="90" cy="115" r="2.5" fill="url(#snowFlake)" class="snowflake s2"/>
    <circle cx="120" cy="125" r="3.5" fill="url(#snowFlake)" class="snowflake s3"/>
    <circle cx="150" cy="118" r="2" fill="url(#snowFlake)" class="snowflake s4"/>
    <circle cx="180" cy="130" r="3" fill="url(#snowFlake)" class="snowflake s5"/>
    <circle cx="70" cy="140" r="2.5" fill="url(#snowFlake)" class="snowflake s6"/>
    <circle cx="100" cy="135" r="3" fill="url(#snowFlake)" class="snowflake s7"/>
    <circle cx="130" cy="145" r="2" fill="url(#snowFlake)" class="snowflake s8"/>
    <circle cx="160" cy="138" r="3.5" fill="url(#snowFlake)" class="snowflake s9"/>
    <circle cx="80" cy="155" r="2.5" fill="url(#snowFlake)" class="snowflake s10"/>
    <circle cx="110" cy="150" r="3" fill="url(#snowFlake)" class="snowflake s11"/>
    <circle cx="140" cy="160" r="2" fill="url(#snowFlake)" class="snowflake s12"/>
    <circle cx="170" cy="148" r="3.5" fill="url(#snowFlake)" class="snowflake s13"/>
    <circle cx="65" cy="165" r="2" fill="url(#snowFlake)" class="snowflake s14"/>
    <circle cx="95" cy="170" r="3" fill="url(#snowFlake)" class="snowflake s15"/>
    <circle cx="125" cy="168" r="2.5" fill="url(#snowFlake)" class="snowflake s16"/>
    <circle cx="155" cy="172" r="3" fill="url(#snowFlake)" class="snowflake s17"/>
    <circle cx="85" cy="180" r="2" fill="url(#snowFlake)" class="snowflake s18"/>
    <circle cx="115" cy="185" r="3.5" fill="url(#snowFlake)" class="snowflake s19"/>
    <circle cx="145" cy="178" r="2.5" fill="url(#snowFlake)" class="snowflake s20"/>
  </g>

  <!-- LEKKIE ZAMGLENIE PRZY PODŁOŻU -->
  <ellipse cx="115" cy="188" rx="80" ry="6" fill="#A0C8E8" opacity="0.2" filter="url(#lightningGlow)"/>
</svg>