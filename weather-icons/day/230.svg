    <rect class="streakSlow st27" x="120" y="146" width="32" height="3" fill="url(#streakGrad)" transform="rotate(-5, 136, 147)"/>
    <rect class="streakSlow st28" x="140" y="168" width="38" height="3" fill="url(#streakGrad)" transform="rotate(-8, 159, 169)"/>
    <rect class="streakSlow st29" x="160" y="152" width="35" height="3" fill="url(#streakGrad)" transform="rotate(-12, 177, 153)"/>
    <rect class="streakSlow st30" x="180" y="178" width="40" height="3" fill="url(#streakGrad)" transform="rotate(-9, 200, 179)"/>

