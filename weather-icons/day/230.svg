    <rect class="streakSlow st36" x="108" y="188" width="40" height="3" fill="url(#streakGrad)" transform="rotate(-5, 128, 189)"/>
    <rect class="streakSlow st37" x="128" y="196" width="32" height="3" fill="url(#streakGrad)" transform="rotate(-11, 144, 197)"/>
    <rect class="streakSlow st38" x="148" y="190" width="38" height="3" fill="url(#streakGrad)" transform="rotate(-8, 167, 191)"/>
