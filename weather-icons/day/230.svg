    <!-- Wolniejsze smugi (grubsze) -->
    <rect class="streakSlow st21" x="0" y="135" width="35" height="3" fill="url(#streakGrad)" transform="rotate(-6, 17, 136)"/>
    <rect class="streakSlow st22" x="20" y="148" width="40" height="3" fill="url(#streakGrad)" transform="rotate(-9, 40, 149)"/>
    <rect class="streakSlow st23" x="40" y="132" width="30" height="3" fill="url(#streakGrad)" transform="rotate(-4, 55, 133)"/>
