  <!-- PŁATKI ŚNIEGU (50 sztuk) -->
  <g filter="url(#snowGlow)">
    <circle class="flurry f1" cx="20" cy="130" r="2.5" fill="url(#snowDot)"/>
    <circle class="flurry f2" cx="45" cy="145" r="2" fill="url(#snowDot)"/>
    <circle class="flurry f3" cx="70" cy="125" r="3" fill="url(#snowDot)"/>
    <circle class="flurry f4" cx="95" cy="140" r="2" fill="url(#snowDot)"/>
    <circle class="flurry f5" cx="120" cy="135" r="2.5" fill="url(#snowDot)"/>
    <circle class="flurry f6" cx="145" cy="150" r="2" fill="url(#snowDot)"/>
    <circle class="flurry f7" cx="170" cy="128" r="3" fill="url(#snowDot)"/>
