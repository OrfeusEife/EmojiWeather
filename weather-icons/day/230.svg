    <rect class="streakFast st12" x="25" y="165" width="28" height="2" fill="url(#streakGrad)" transform="rotate(-5, 39, 166)"/>
    <rect class="streakFast st13" x="45" y="155" width="32" height="2" fill="url(#streakGrad)" transform="rotate(-10, 61, 156)"/>
