<svg width="233" height="200" viewBox="0 0 233 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- TŁO: MOCNY GRADIENT ZANIKAJĄCY DO PRZEZROCZYSTOŚCI -->
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#00BFFF" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#008B8B" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#5F9EA0" stop-opacity="0"/>
    </radialGradient>

    <!-- SŁOŃCE: JASNE, MOCNE ŻÓŁCIE I POMARAŃCZE -->
    <radialGradient id="sunGlowHard" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE566" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#FFB820" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FF8C00" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="sunCoreHard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF176"/>
      <stop offset="100%" stop-color="#FF9800"/>
    </linearGradient>

    <!-- PROMIEŃ SŁONECZNY -->
    <linearGradient id="rayGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE082" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FF8C00" stop-opacity="0.2"/>
    </linearGradient>

    <!-- FILTRY -->
    <filter id="glowHard" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="rayGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <style>
    .bgLayer {
      animation: bgPulse 6s ease-in-out infinite;
    }
    .sunPulseHard {
      animation: pulseHard 3.5s ease-in-out infinite;
      transform-origin: 116px 100px;
    }
    .sunGlowHardAnim {
      animation: glowHardPulse 3.5s ease-in-out infinite;
      transform-origin: 116px 100px;
    }
    .raysRotate {
      animation: rotateRays 16s linear infinite;
      transform-origin: 116px 100px;
    }

    @keyframes bgPulse {
      0%,100% { opacity: 0.85; }
      50% { opacity: 1; }
    }
    @keyframes pulseHard {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.12); }
    }
    @keyframes glowHardPulse {
      0%,100% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.18); opacity: 1; }
    }
    @keyframes rotateRays {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>

  <!-- TŁO -->
  <rect width="233" height="200" fill="url(#bgGlow)" class="bgLayer"/>

  <!-- PROMIENIE (8 sztuk, środek 116,100) -->
  <g class="raysRotate">
    <rect x="113" y="30" width="6" height="48" rx="3" fill="url(#rayGrad)" filter="url(#rayGlow)"/>
    <rect x="113" y="30" width="6" height="48" rx="3" fill="url(#rayGrad)" filter="url(#rayGlow)" transform="rotate(45 116 100)"/>
    <rect x="113" y="30" width="6" height="48" rx="3" fill="url(#rayGrad)" filter="url(#rayGlow)" transform="rotate(90 116 100)"/>
    <rect x="113" y="30" width="6" height="48" rx="3" fill="url(#rayGrad)" filter="url(#rayGlow)" transform="rotate(135 116 100)"/>
    <rect x="113" y="30" width="6" height="48" rx="3" fill="url(#rayGrad)" filter="url(#rayGlow)" transform="rotate(180 116 100)"/>
    <rect x="113" y="30" width="6" height="48" rx="3" fill="url(#rayGrad)" filter="url(#rayGlow)" transform="rotate(225 116 100)"/>
    <rect x="113" y="30" width="6" height="48" rx="3" fill="url(#rayGrad)" filter="url(#rayGlow)" transform="rotate(270 116 100)"/>
    <rect x="113" y="30" width="6" height="48" rx="3" fill="url(#rayGrad)" filter="url(#rayGlow)" transform="rotate(315 116 100)"/>
  </g>

  <!-- SŁOŃCE (większe, centralne) -->
  <circle cx="116" cy="100" r="52" fill="url(#sunGlowHard)" filter="url(#glowHard)" class="sunGlowHardAnim"/>
  <g class="sunPulseHard">
    <circle cx="116" cy="100" r="32" fill="url(#sunCoreHard)" filter="url(#glowHard)" opacity="0.9"/>
    <circle cx="116" cy="100" r="28" fill="url(#sunCoreHard)"/>
    <!-- Ostre akcenty (jasne odblaski) -->
    <circle cx="106" cy="88" r="6" fill="#FFF9C4" opacity="0.9"/>
    <circle cx="126" cy="104" r="5" fill="#FFF9C4" opacity="0.8"/>
    <circle cx="108" cy="112" r="4" fill="#FFF9C4" opacity="0.7"/>
  </g>
</svg>