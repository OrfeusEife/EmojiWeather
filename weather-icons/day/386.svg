<svg width="233" height="200" viewBox="0 0 233 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- TŁO: CIEMNE, BURZOWE -->
    <!-- TŁO: CIEMNE, BURZOWE -->
    <radialGradient id="bgStorm" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#3A5E7A" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#1F3F58" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0F2A3A" stop-opacity="0"/>
    </radialGradient>

    <!-- CHMURA: CIEMNA, BURZOWA -->
    <radialGradient id="cloudStorm" cx="30%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#7A8A9A"/>
      <stop offset="45%" stop-color="#5A6A7A"/>
      <stop offset="80%" stop-color="#3A4A5A"/>
      <stop offset="100%" stop-color="#2A3A4A"/>
    </radialGradient>

    <!-- KROPLA DESZCZU -->
    <linearGradient id="rainDrop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#80D8FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1A73E8" stop-opacity="0.5"/>
    </linearGradient>

    <!-- FILTRY -->
    <filter id="cloudShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0A1A2A" flood-opacity="0.5"/>
    </filter>
    <filter id="lightningGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="rainBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.1"/>
    </filter>
  </defs>

  <style>
    .bgLayer {
      animation: bgPulse 8s ease-in-out infinite;
    }
    .cloudMove {
      animation: cloudFloat 6s ease-in-out infinite;
    }
    /* Błyskawica – szybsze miganie */
    .lightning {
      animation: flash 0.2s steps(2, start) infinite;
    }
    .lightningGlow {
      animation: flashGlow 0.2s steps(2, start) infinite;
    }
    /* Krople deszczu */
    .rainDrop {
      animation: fallRain 2.5s ease-in infinite;
    }
    .r1 { animation-delay: 0.0s; }
    .r2 { animation-delay: 0.8s; }
    .r3 { animation-delay: 1.6s; }
    .r4 { animation-delay: 0.3s; }
    .r5 { animation-delay: 1.1s; }
    .r6 { animation-delay: 1.9s; }

    @keyframes bgPulse {
      0%,100% { opacity: 0.9; }
      50% { opacity: 1; }
    }
    @keyframes cloudFloat {
      0%,100% { transform: translateX(0) translateY(0); }
      50% { transform: translateX(-4px) translateY(-2px); }
    }
    @keyframes flash {
      0% { opacity: 1; }
      50% { opacity: 0.3; }
      100% { opacity: 1; }
    }
    @keyframes flashGlow {
      0% { opacity: 0.8; }
      50% { opacity: 0.1; }
      100% { opacity: 0.8; }
    }
    @keyframes fallRain {
      0% { transform: translateY(-20px) translateX(0); opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 0.8; }
      100% { transform: translateY(50px) translateX(-6px); opacity: 0; }
    }
  </style>

  <!-- TŁO -->
  <rect width="233" height="200" fill="url(#bgStorm)" class="bgLayer"/>

  <!-- BŁYSKAWICA – SZERSZA -->
  <g class="lightning">
    <!-- Poświata -->
    <path d="M 115,70 L 128,100 L 105,108 L 135,140 L 100,148 L 140,190" 
          fill="none" stroke="#FFF085" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#lightningGlow)" class="lightningGlow"/>
    <!-- Główny zygzak -->
    <path d="M 115,70 L 128,100 L 105,108 L 135,140 L 100,148 L 140,190" 
          fill="none" stroke="#FFDF20" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Wewnętrzny błysk -->
    <path d="M 115,70 L 128,100 L 105,108 L 135,140 L 100,148 L 140,190" 
          fill="none" stroke="#FEF9C2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- CHMURA (ciemna, burzowa) -->
  <g class="cloudMove" filter="url(#cloudShadow)">
    <path d="M 40,115 
             C 40,95 60,82 78,88 
             C 88,68 120,60 138,75 
             C 152,68 175,76 182,96 
             C 198,98 205,110 198,124 
             C 192,136 170,138 158,132 
             L 65,134 
             C 48,136 38,130 40,115 Z" 
          fill="url(#cloudStorm)"/>
    <!-- Delikatne rozjaśnienie na krawędzi chmury -->
    <path d="M 70,105 C 80,88 105,82 125,90 C 135,85 152,90 158,104 C 165,100 175,106 172,118 C 168,126 148,128 135,124 L 85,126 C 73,127 66,120 70,105 Z" 
          fill="#FFFFFF" opacity="0.1"/>
  </g>

  <!-- KROPLA DESZCZU (6 sztuk) -->
  <g filter="url(#rainBlur)">
    <path class="rainDrop r1" d="M 90,135 C 90,135 86,142 86,145 C 86,148 88,150 90,150 C 92,150 94,148 94,145 C 94,142 90,135 90,135 Z" fill="url(#rainDrop)"/>
    <path class="rainDrop r2" d="M 120,140 C 120,140 116,147 116,150 C 116,153 118,155 120,155 C 122,155 124,153 124,150 C 124,147 120,140 120,140 Z" fill="url(#rainDrop)"/>
    <path class="rainDrop r3" d="M 150,138 C 150,138 146,145 146,148 C 146,151 148,153 150,153 C 152,153 154,151 154,148 C 154,145 150,138 150,138 Z" fill="url(#rainDrop)"/>
    <path class="rainDrop r4" d="M 105,148 C 105,148 101,155 101,158 C 101,161 103,163 105,163 C 107,163 109,161 109,158 C 109,155 105,148 105,148 Z" fill="url(#rainDrop)"/>
    <path class="rainDrop r5" d="M 135,145 C 135,145 131,152 131,155 C 131,158 133,160 135,160 C 137,160 139,158 139,155 C 139,152 135,145 135,145 Z" fill="url(#rainDrop)"/>
    <path class="rainDrop r6" d="M 80,150 C 80,150 76,157 76,160 C 76,163 78,165 80,165 C 82,165 84,163 84,160 C 84,157 80,150 80,150 Z" fill="url(#rainDrop)"/>
  </g>

  <!-- MGIEŁKA PRZY PODŁOŻU -->
  <ellipse cx="115" cy="188" rx="80" ry="6" fill="#A0C8E8" opacity="0.15" filter="url(#lightningGlow)"/>
</svg>