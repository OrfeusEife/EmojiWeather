<svg width="233" height="200" viewBox="0 0 233 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- TŁO -->
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#B0E0FF" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#80C0E0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#5F9EA0" stop-opacity="0"/>
    </radialGradient>

    <!-- SŁOŃCE -->
    <radialGradient id="sunSoft" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE566" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#FFB820" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FF8C00" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="sunCoreSoft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF9C4" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FF9800" stop-opacity="0.6"/>
    </linearGradient>

    <!-- FILTRY -->
    <filter id="sunGlowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="mistBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <style>
    .bgLayer { animation: bgPulse 6s ease-in-out infinite; }
    .sunPulse {
      animation: sunPulseAnim 4s ease-in-out infinite;
      transform-origin: 116px 100px;
    }
    /* Wspólna animacja dla wszystkich poziomych kresek – ruch w prawo i lewo */
    .horizontalLine {
      animation: moveLeftRight 12s ease-in-out infinite;
    }
    /* Różne prędkości dla poszczególnych linii ustawię przez style="animation-duration: ..." */

    @keyframes bgPulse {
      0%, 100% { opacity: 0.85; }
      50% { opacity: 1; }
    }
    @keyframes sunPulseAnim {
      0% { transform: scale(1); opacity: 0.8; filter: brightness(1); }
      50% { transform: scale(1.08); opacity: 1; filter: brightness(1.3); }
      100% { transform: scale(1); opacity: 0.8; filter: brightness(1); }
    }
    @keyframes moveLeftRight {
      0% { transform: translateX(-20px); }
      50% { transform: translateX(20px); }
      100% { transform: translateX(-20px); }
    }
  </style>

  <!-- TŁO -->
  <rect width="233" height="200" fill="url(#bgGlow)" class="bgLayer"/>

  <!-- SŁOŃCE Z BLASKIEM (pulsuje) -->
  <g class="sunPulse">
    <circle cx="116" cy="100" r="55" fill="url(#sunSoft)" filter="url(#sunGlowFilter)"/>
    <circle cx="116" cy="100" r="32" fill="url(#sunCoreSoft)" filter="url(#sunGlowFilter)"/>
    <circle cx="116" cy="100" r="26" fill="url(#sunCoreSoft)"/>
    <circle cx="107" cy="88" r="5" fill="#FFF9C4" opacity="0.8"/>
    <circle cx="125" cy="107" r="4" fill="#FFF9C4" opacity="0.7"/>
    <circle cx="112" cy="112" r="3" fill="#FFF9C4" opacity="0.6"/>
  </g>


  

  <!-- DŁUGIE POZIOME KRESKI – NIEBIESKIE, POD SŁOŃCEM (długie odcinki, nie kropki) – TERAZ też się przesuwają -->
  <g stroke="#778899" stroke-width="3.5" stroke-dasharray="30 18 20 8" opacity="0.5" >
   
    <line class="horizontalLine" x1="15" y1="160" x2="200" y2="160" style="animation-duration: 8s; animation-delay: -3s;" />
    <line class="horizontalLine" x1="40" y1="170" x2="230" y2="170" style="animation-duration: 4s; animation-delay: -5s;" />
    <line class="horizontalLine" x1="25" y1="180" x2="215" y2="180" style="animation-duration: 6s; animation-delay: -2s;" />
   
  </g>
</svg>