<svg width="233" height="200" viewBox="0 0 233 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- TŁO: RADIALNY GRADIENT ZANIKAJĄCY DO PRZEZROCZYSTOŚCI -->
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#00BFFF" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#008B8B" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#5F9EA0" stop-opacity="0"/>
    </radialGradient>

    <!-- CHMURA: JASNA, PUSZYSTA -->
    <radialGradient id="cloudGrad" cx="30%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="45%" stop-color="#E8F2FA"/>
      <stop offset="80%" stop-color="#B8D4E8"/>
      <stop offset="100%" stop-color="#8EB8D4"/>
    </radialGradient>

    <!-- KROPLA DESZCZU: NIEBIESKA -->
    <linearGradient id="rainDrop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#40C4FF"/>
      <stop offset="100%" stop-color="#1A73E8"/>
    </linearGradient>

    <!-- FILTRY -->
    <filter id="cloudShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#3A5C8C" flood-opacity="0.35"/>
    </filter>
    <filter id="rainBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
  </defs>

  <style>
    .bgLayer {
      animation: bgPulse 6s ease-in-out infinite;
    }
    .cloudMove {
      animation: cloudFloat 5s ease-in-out infinite;
    }
    .rainDrop {
      animation: fallModerate 1.6s linear infinite;
    }
    /* Opóźnienia – ciągły, umiarkowany deszcz */
    .d1 { animation-delay: 0s; }
    .d2 { animation-delay: 0.2s; }
    .d3 { animation-delay: 0.4s; }
    .d4 { animation-delay: 0.6s; }
    .d5 { animation-delay: 0.8s; }
    .d6 { animation-delay: 1.0s; }
    .d7 { animation-delay: 0.1s; }
    .d8 { animation-delay: 0.3s; }
    .d9 { animation-delay: 0.5s; }
    .d10 { animation-delay: 0.7s; }
    .d11 { animation-delay: 0.9s; }
    .d12 { animation-delay: 1.1s; }

    @keyframes bgPulse {
      0%,100% { opacity: 0.85; }
      50% { opacity: 1; }
    }
    @keyframes cloudFloat {
      0%,100% { transform: translateX(0) translateY(0); }
      50% { transform: translateX(-3px) translateY(-2px); }
    }
    @keyframes fallModerate {
      0% { transform: translateY(-20px); opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 0.9; }
      100% { transform: translateY(45px); opacity: 0; }
    }
  </style>

  <!-- TŁO -->
  <rect width="233" height="200" fill="url(#bgGlow)" class="bgLayer"/>

  <!-- CHMURA (BEZ SŁOŃCA) -->
  <g class="cloudMove" filter="url(#cloudShadow)">
    <path d="M 50,115 
             C 50,95 70,85 85,90 
             C 95,70 125,65 140,80 
             C 155,75 175,85 180,105 
             C 195,105 200,115 195,125 
             C 190,135 170,135 160,130 
             L 70,130 
             C 55,130 45,125 50,115 Z" 
          fill="url(#cloudGrad)"/>
    <!-- Jaśniejszy akcent na chmurze -->
    <path d="M 70,105 C 80,90 105,85 125,93 C 135,88 152,92 158,106 C 165,102 175,108 172,118 C 168,126 148,128 135,124 L 85,126 C 73,127 66,120 70,105 Z" 
          fill="#FFFFFF" opacity="0.4"/>
  </g>

  <!-- KROPLE DESZCZU (UMIARKOWANY DESZCZ – 12 KROPLI) -->
  <g filter="url(#rainBlur)">
    <path class="rainDrop d1" d="M85 135 C85 135 81 142 81 145 C81 148 83 150 85 150 C87 150 89 148 89 145 C89 142 85 135 85 135Z" fill="url(#rainDrop)"/>
    <path class="rainDrop d2" d="M110 132 C110 132 106 139 106 142 C106 145 108 147 110 147 C112 147 114 145 114 142 C114 139 110 132 110 132Z" fill="url(#rainDrop)"/>
    <path class="rainDrop d3" d="M135 130 C135 130 131 137 131 140 C131 143 133 145 135 145 C137 145 139 143 139 140 C139 137 135 130 135 130Z" fill="url(#rainDrop)"/>
    <path class="rainDrop d4" d="M160 135 C160 135 156 142 156 145 C156 148 158 150 160 150 C162 150 164 148 164 145 C164 142 160 135 160 135Z" fill="url(#rainDrop)"/>
    <path class="rainDrop d5" d="M95 140 C95 140 91 147 91 150 C91 153 93 155 95 155 C97 155 99 153 99 150 C99 147 95 140 95 140Z" fill="url(#rainDrop)"/>
    <path class="rainDrop d6" d="M120 138 C120 138 116 145 116 148 C116 151 118 153 120 153 C122 153 124 151 124 148 C124 145 120 138 120 138Z" fill="url(#rainDrop)"/>
    <path class="rainDrop d7" d="M145 140 C145 140 141 147 141 150 C141 153 143 155 145 155 C147 155 149 153 149 150 C149 147 145 140 145 140Z" fill="url(#rainDrop)"/>
    <path class="rainDrop d8" d="M75 145 C75 145 71 152 71 155 C71 158 73 160 75 160 C77 160 79 158 79 155 C79 152 75 145 75 145Z" fill="url(#rainDrop)"/>
    <path class="rainDrop d9" d="M100 148 C100 148 96 155 96 158 C96 161 98 163 100 163 C102 163 104 161 104 158 C104 155 100 148 100 148Z" fill="url(#rainDrop)"/>
    <path class="rainDrop d10" d="M125 145 C125 145 121 152 121 155 C121 158 123 160 125 160 C127 160 129 158 129 155 C129 152 125 145 125 145Z" fill="url(#rainDrop)"/>
    <path class="rainDrop d11" d="M150 148 C150 148 146 155 146 158 C146 161 148 163 150 163 C152 163 154 161 154 158 C154 155 150 148 150 148Z" fill="url(#rainDrop)"/>
    <path class="rainDrop d12" d="M105 152 C105 152 101 159 101 162 C101 165 103 167 105 167 C107 167 109 165 109 162 C109 159 105 152 105 152Z" fill="url(#rainDrop)"/>
  </g>

  <!-- WILGOTNE ODBLYSKI NA DOLE -->
  <ellipse cx="115" cy="186" rx="70" ry="5" fill="#40C4FF" opacity="0.2" filter="url(#cloudShadow)"/>
</svg>