<svg width="233" height="200" viewBox="0 0 233 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- TŁO: RADIALNY GRADIENT ZANIKAJĄCY DO PRZEZROCZYSTOŚCI -->
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#00BFFF" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#008B8B" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#5F9EA0" stop-opacity="0"/>
    </radialGradient>

    <!-- CHMURA: JASNA, PUSZYSTA -->
    <radialGradient id="cloudGrad" cx="30%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="45%" stop-color="#E8F2FA"/>
      <stop offset="80%" stop-color="#B8D4E8"/>
      <stop offset="100%" stop-color="#8EB8D4"/>
    </radialGradient>

    <!-- DESZCZ: NIEBIESKI -->
    <linearGradient id="rainHard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#40C4FF"/>
      <stop offset="100%" stop-color="#1A73E8"/>
    </linearGradient>

    <!-- FILTRY -->
    <filter id="cloudShadowHard" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#3A5C8C" flood-opacity="0.35"/>
    </filter>
  </defs>

  <style>
    .bgLayer {
      animation: bgPulse 6s ease-in-out infinite;
    }
    .cloudMoveHard {
      animation: cloudMove 5s ease-in-out infinite;
    }
    .rainDrop {
      animation: fallLight 3s linear infinite;
    }
    /* Długie opóźnienia – krople padają rzadko, "od czasu do czasu" */
    .d1 { animation-delay: 0s; }
    .d2 { animation-delay: 1.2s; }
    .d3 { animation-delay: 2.4s; }
    .d4 { animation-delay: 0.8s; }
    .d5 { animation-delay: 2.0s; }
    .d6 { animation-delay: 3.2s; }

    @keyframes bgPulse {
      0%,100% { opacity: 0.85; }
      50% { opacity: 1; }
    }
    @keyframes cloudMove {
      0%,100% { transform: translateX(0) translateY(0); }
      50% { transform: translateX(-3px) translateY(-2px); }
    }
    @keyframes fallLight {
      0% { transform: translateY(-25px); opacity: 0; }
      20% { opacity: 0.9; }
      80% { opacity: 0.8; }
      100% { transform: translateY(50px); opacity: 0; }
    }
  </style>

  <!-- TŁO -->
  <rect width="233" height="200" fill="url(#bgGlow)" class="bgLayer"/>

  <!-- CHMURA -->
  <path class="cloudMoveHard" filter="url(#cloudShadowHard)"
        d="M 50,115 
           C 50,95 70,85 85,90 
           C 95,70 125,65 140,80 
           C 155,75 175,85 180,105 
           C 195,105 200,115 195,125 
           C 190,135 170,135 160,130 
           L 70,130 
           C 55,130 45,125 50,115 Z"
        fill="url(#cloudGrad)"/>

  <!-- KROPLE DESZCZU – MAŁE, RZADKIE, MIEJSCOWE -->
  <g>
    <!-- Każda kropla jest mniejsza – zmienione współrzędne (skala ok. 0.6 oryginału) -->
    <path class="rainDrop d1" d="M85 135 C85 135 82.5 140 82.5 142 C82.5 144 83.5 145 85 145 C86.5 145 87.5 144 87.5 142 C87.5 140 85 135 85 135Z" fill="url(#rainHard)"/>
    <path class="rainDrop d2" d="M110 132 C110 132 107.5 137 107.5 139 C107.5 141 108.5 142 110 142 C111.5 142 112.5 141 112.5 139 C112.5 137 110 132 110 132Z" fill="url(#rainHard)"/>
    <path class="rainDrop d3" d="M135 130 C135 130 132.5 135 132.5 137 C132.5 139 133.5 140 135 140 C136.5 140 137.5 139 137.5 137 C137.5 135 135 130 135 130Z" fill="url(#rainHard)"/>
    <path class="rainDrop d4" d="M100 140 C100 140 97.5 145 97.5 147 C97.5 149 98.5 150 100 150 C101.5 150 102.5 149 102.5 147 C102.5 145 100 140 100 140Z" fill="url(#rainHard)"/>
    <path class="rainDrop d5" d="M155 135 C155 135 152.5 140 152.5 142 C152.5 144 153.5 145 155 145 C156.5 145 157.5 144 157.5 142 C157.5 140 155 135 155 135Z" fill="url(#rainHard)"/>
    <path class="rainDrop d6" d="M125 145 C125 145 122.5 150 122.5 152 C122.5 154 123.5 155 125 155 C126.5 155 127.5 154 127.5 152 C127.5 150 125 145 125 145Z" fill="url(#rainHard)"/>
  </g>

  <!-- WILGOTNA MGIEŁKA NA DOLE -->
  <ellipse cx="115" cy="186" rx="70" ry="5" fill="#40C4FF" opacity="0.2" filter="url(#cloudShadowHard)"/>
</svg>