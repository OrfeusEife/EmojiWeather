<svg width="233" height="200" viewBox="0 0 233 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- TŁO: NOCNY RADIALNY GRADIENT ZANIKAJĄCY DO PRZEZROCZYSTOŚCI -->
    <radialGradient id="bgNight" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#0D1B2A" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#1A237E" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#283593" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#64B5F6" stop-opacity="0"/>
    </radialGradient>

    <!-- KSIĘŻYC: SREBRZYSTA POŚWIATA -->
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E3F2FD" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#90CAF9" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1A237E" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="moonCore" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#B0BEC5"/>
    </linearGradient>

    <!-- CHMURA NOCNA: CIEMNIEJSZA, SREBRZYSTO-GRANATOWA -->
    <radialGradient id="cloudNight" cx="30%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#E0E7FF"/>
      <stop offset="45%" stop-color="#9FABC9"/>
      <stop offset="80%" stop-color="#5C6A92"/>
      <stop offset="100%" stop-color="#2C3A5E"/>
    </radialGradient>

    <!-- PŁATEK ŚNIEGU NOCNY – BIAŁY Z NIEBIESKIM CIENIEM -->
    <radialGradient id="snowflakeNight" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="70%" stop-color="#D0E8FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#A0C8F0" stop-opacity="0.6"/>
    </radialGradient>

    <!-- FILTRY -->
    <filter id="moonGlowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="cloudShadowNight" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0A1128" flood-opacity="0.5"/>
    </filter>
    <filter id="snowGlowNight" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
    <filter id="snowShadowNight" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0.5" dy="0.8" stdDeviation="0.8" flood-color="#0A1128" flood-opacity="0.8"/>
    </filter>
  </defs>

  <style>
    .bgLayerNight {
      animation: bgPulseNight 8s ease-in-out infinite;
    }
    .moonMove {
      animation: slideBehindCloudNight 12s ease-in-out infinite alternate;
      transform-origin: 75px 70px;
    }
    .cloudMoveNight {
      animation: cloudFloatNight 7s ease-in-out infinite;
    }
    .snowflakeNight {
      animation: fallSnowNight 4s ease-in-out infinite;
      filter: url(#snowShadowNight);
    }
    .twinkleStar { animation: twinkle 3s ease-in-out infinite; }
    .twinkleStarSlow { animation: twinkle 5s ease-in-out infinite; }

    .s1 { animation-delay: 0s; }
    .s2 { animation-delay: 0.5s; }
    .s3 { animation-delay: 1.0s; }
    .s4 { animation-delay: 1.5s; }
    .s5 { animation-delay: 2.0s; }
    .s6 { animation-delay: 2.5s; }
    .s7 { animation-delay: 3.0s; }
    .s8 { animation-delay: 3.5s; }
    .s9 { animation-delay: 0.8s; }
    .s10 { animation-delay: 1.3s; }
    .s11 { animation-delay: 1.8s; }
    .s12 { animation-delay: 2.3s; }
    .s13 { animation-delay: 2.8s; }
    .s14 { animation-delay: 3.3s; }
    .s15 { animation-delay: 0.2s; }
    .s16 { animation-delay: 0.7s; }
    .s17 { animation-delay: 1.2s; }
    .s18 { animation-delay: 1.7s; }
    .s19 { animation-delay: 2.2s; }
    .s20 { animation-delay: 2.7s; }

    @keyframes bgPulseNight {
      0%,100% { opacity: 0.85; }
      50% { opacity: 1; }
    }
    @keyframes slideBehindCloudNight {
      0% { transform: translateX(0); }
      100% { transform: translateX(75px); }
    }
    @keyframes cloudFloatNight {
      0%,100% { transform: translateX(0) translateY(0); }
      50% { transform: translateX(-4px) translateY(-2px); }
    }
    @keyframes fallSnowNight {
      0% { transform: translateY(-20px) translateX(0) rotate(0deg); opacity: 0; }
      20% { opacity: 0.9; }
      80% { opacity: 0.8; }
      100% { transform: translateY(55px) translateX(-10px) rotate(360deg); opacity: 0; }
    }
    @keyframes twinkle {
      0%,100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }
  </style>

  <!-- TŁO NOCNE -->
  <rect width="233" height="200" fill="url(#bgNight)" class="bgLayerNight"/>

  <!-- GWIAZDY -->
  <g fill="#FFFFFF">
    <circle cx="25" cy="30" r="1.2" class="twinkleStar" style="animation-delay: 0s"/>
    <circle cx="60" cy="15" r="0.8" class="twinkleStarSlow" style="animation-delay: 0.5s"/>
    <circle cx="100" cy="45" r="1" class="twinkleStar" style="animation-delay: 1.2s"/>
    <circle cx="160" cy="20" r="1.3" class="twinkleStar" style="animation-delay: 2s"/>
    <circle cx="210" cy="30" r="0.9" class="twinkleStarSlow" style="animation-delay: 0.8s"/>
    <circle cx="195" cy="65" r="1.1" class="twinkleStar" style="animation-delay: 1.5s"/>
    <circle cx="35" cy="80" r="0.7" class="twinkleStar" style="animation-delay: 2.5s"/>
    <circle cx="15" cy="130" r="1" class="twinkleStarSlow" style="animation-delay: 0.3s"/>
    <circle cx="50" cy="170" r="0.9" class="twinkleStar" style="animation-delay: 1.8s"/>
    <circle cx="90" cy="185" r="1.2" class="twinkleStar" style="animation-delay: 2.2s"/>
    <circle cx="140" cy="170" r="0.8" class="twinkleStarSlow" style="animation-delay: 0.6s"/>
    <circle cx="180" cy="185" r="1" class="twinkleStar" style="animation-delay: 1.1s"/>
    <circle cx="215" cy="140" r="1.3" class="twinkleStar" style="animation-delay: 2.8s"/>
    <circle cx="175" cy="105" r="0.9" class="twinkleStarSlow" style="animation-delay: 1.4s"/>
    <circle cx="55" cy="105" r="0.6" class="twinkleStar" style="animation-delay: 3s"/>
    <circle cx="135" cy="55" r="1.1" class="twinkleStar" style="animation-delay: 0.9s"/>
    <circle cx="80" cy="65" r="0.8" class="twinkleStarSlow" style="animation-delay: 1.7s"/>
    <circle cx="200" cy="95" r="0.7" class="twinkleStar" style="animation-delay: 2.3s"/>
  </g>

  <!-- KSIĘŻYC -->
  <g class="moonMove">
    <circle cx="75" cy="70" r="38" fill="url(#moonGlow)" filter="url(#moonGlowFilter)"/>
    <circle cx="75" cy="70" r="24" fill="url(#moonCore)" filter="url(#moonGlowFilter)" opacity="0.95"/>
    <circle cx="75" cy="70" r="20" fill="url(#moonCore)"/>
    <!-- Kratery -->
    <circle cx="68" cy="64" r="4" fill="#CFD8DC" opacity="0.35"/>
    <circle cx="82" cy="72" r="3.5" fill="#CFD8DC" opacity="0.3"/>
    <circle cx="73" cy="78" r="2.5" fill="#CFD8DC" opacity="0.4"/>
    <!-- Odblaski -->
    <circle cx="68" cy="63" r="3" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="82" cy="68" r="2" fill="#FFFFFF" opacity="0.5"/>
    <circle cx="72" cy="78" r="1.5" fill="#FFFFFF" opacity="0.4"/>
  </g>

  <!-- CHMURA NOCNA -->
  <g class="cloudMoveNight" filter="url(#cloudShadowNight)">
    <path d="M 50,115 
             C 50,95 70,85 85,90 
             C 95,70 125,65 140,80 
             C 155,75 175,85 180,105 
             C 195,105 200,115 195,125 
             C 190,135 170,135 160,130 
             L 70,130 
             C 55,130 45,125 50,115 Z" 
          fill="url(#cloudNight)"/>
    <path d="M 70,105 C 80,90 105,85 125,93 C 135,88 152,92 158,106 C 165,102 175,108 172,118 C 168,126 148,128 135,124 L 85,126 C 73,127 66,120 70,105 Z" 
          fill="#D0D8F0" opacity="0.25"/>
  </g>

  <!-- PŁATKI NOCNEGO ŚNIEGU – Z CIENIEM I BLASKIEM -->
  <g filter="url(#snowGlowNight)">
    <circle class="snowflakeNight s1" cx="90" cy="138" r="3" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s2" cx="115" cy="142" r="2.5" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s3" cx="140" cy="136" r="3" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s4" cx="165" cy="140" r="2.5" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s5" cx="105" cy="148" r="3" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s6" cx="130" cy="145" r="2.5" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s7" cx="155" cy="150" r="3" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s8" cx="80" cy="152" r="2.5" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s9" cx="100" cy="155" r="3" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s10" cx="125" cy="158" r="2.5" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s11" cx="150" cy="160" r="3" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s12" cx="170" cy="155" r="2.5" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s13" cx="95" cy="162" r="3" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s14" cx="120" cy="165" r="2.5" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s15" cx="145" cy="168" r="3" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s16" cx="75" cy="168" r="2.5" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s17" cx="110" cy="170" r="3" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s18" cx="135" cy="172" r="2.5" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s19" cx="160" cy="165" r="3" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s20" cx="85" cy="175" r="2.5" fill="url(#snowflakeNight)"/>
  </g>

  <!-- ŚNIEŻNA MGIEŁKA NOCNA PRZY PODŁOŻU -->
  <ellipse cx="115" cy="188" rx="80" ry="6" fill="#90CAF9" opacity="0.15" filter="url(#moonGlowFilter)"/>
  <ellipse cx="115" cy="193" rx="55" ry="3" fill="#B0D0F0" opacity="0.1" filter="url(#moonGlowFilter)"/>
</svg>