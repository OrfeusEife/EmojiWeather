<svg width="233" height="200" viewBox="0 0 233 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- TŁO: NOCNY RADIALNY GRADIENT ZANIKAJĄCY DO PRZEZROCZYSTOŚCI -->
    <radialGradient id="bgNight" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#0D1B2A" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#1A237E" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#283593" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#64B5F6" stop-opacity="0"/>
    </radialGradient>

    <!-- CHMURA NOCNA: CIEMNIEJSZA, SREBRZYSTO-GRANATOWA -->
    <radialGradient id="cloudNight" cx="30%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#E0E7FF"/>
      <stop offset="45%" stop-color="#9FABC9"/>
      <stop offset="80%" stop-color="#5C6A92"/>
      <stop offset="100%" stop-color="#2C3A5E"/>
    </radialGradient>

    <!-- KRYSTYDEK LODU (RÓMB) – NOCNY, BIAŁO-NIEBIESKI -->
    <linearGradient id="iceDiamondNight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#C0D8F0"/>
      <stop offset="100%" stop-color="#8098C0"/>
    </linearGradient>

    <!-- FILTRY -->
    <filter id="cloudShadowNight" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0A1128" flood-opacity="0.6"/>
    </filter>
    <filter id="iceGlowNight" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.2"/>
    </filter>
  </defs>

  <style>
    .bgLayerNight {
      animation: bgPulseNight 8s ease-in-out infinite;
    }
    .cloudMoveNight {
      animation: cloudFloatNight 6s ease-in-out infinite;
    }
    .twinkleStar { animation: twinkle 3s ease-in-out infinite; }
    .twinkleStarSlow { animation: twinkle 5s ease-in-out infinite; }
    
    /* Animacje dla kropel gradu – każda ma własną ścieżkę (opacity nieco przyciemnione) */
    .ice1 { animation: fallIce1Night 3.2s ease-in-out infinite; }
    .ice2 { animation: fallIce2Night 3.5s ease-in-out infinite; animation-delay: 0.6s; }
    .ice3 { animation: fallIce3Night 3.0s ease-in-out infinite; animation-delay: 1.2s; }
    .ice4 { animation: fallIce4Night 3.8s ease-in-out infinite; animation-delay: 0.2s; }
    .ice5 { animation: fallIce5Night 3.3s ease-in-out infinite; animation-delay: 1.8s; }
    .ice6 { animation: fallIce6Night 2.9s ease-in-out infinite; animation-delay: 0.9s; }
    .ice7 { animation: fallIce7Night 3.6s ease-in-out infinite; animation-delay: 2.1s; }
    .ice8 { animation: fallIce8Night 3.1s ease-in-out infinite; animation-delay: 1.5s; }
    .ice9 { animation: fallIce9Night 3.4s ease-in-out infinite; animation-delay: 0.4s; }
    .ice10 { animation: fallIce10Night 3.7s ease-in-out infinite; animation-delay: 2.4s; }

    @keyframes bgPulseNight {
      0%,100% { opacity: 0.85; }
      50% { opacity: 1; }
    }
    @keyframes cloudFloatNight {
      0%,100% { transform: translateX(0) translateY(0); }
      50% { transform: translateX(-3px) translateY(-2px); }
    }
    @keyframes twinkle {
      0%,100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    /* Nocne wersje klatek kluczowych – maksymalna przezroczystość 0.8 */
    @keyframes fallIce1Night {
      0% { transform: translate(0px, -20px); opacity: 0; }
      20% { opacity: 0.8; }
      80% { opacity: 0.7; }
      100% { transform: translate(8px, 50px); opacity: 0; }
    }
    @keyframes fallIce2Night {
      0% { transform: translate(0px, -25px); opacity: 0; }
      20% { opacity: 0.8; }
      80% { opacity: 0.7; }
      100% { transform: translate(-5px, 55px); opacity: 0; }
    }
    @keyframes fallIce3Night {
      0% { transform: translate(0px, -15px); opacity: 0; }
      20% { opacity: 0.8; }
      80% { opacity: 0.7; }
      100% { transform: translate(12px, 45px); opacity: 0; }
    }
    @keyframes fallIce4Night {
      0% { transform: translate(0px, -30px); opacity: 0; }
      20% { opacity: 0.8; }
      80% { opacity: 0.7; }
      100% { transform: translate(-8px, 60px); opacity: 0; }
    }
    @keyframes fallIce5Night {
      0% { transform: translate(0px, -18px); opacity: 0; }
      20% { opacity: 0.8; }
      80% { opacity: 0.7; }
      100% { transform: translate(5px, 48px); opacity: 0; }
    }
    @keyframes fallIce6Night {
      0% { transform: translate(0px, -22px); opacity: 0; }
      20% { opacity: 0.8; }
      80% { opacity: 0.7; }
      100% { transform: translate(-10px, 52px); opacity: 0; }
    }
    @keyframes fallIce7Night {
      0% { transform: translate(0px, -28px); opacity: 0; }
      20% { opacity: 0.8; }
      80% { opacity: 0.7; }
      100% { transform: translate(6px, 58px); opacity: 0; }
    }
    @keyframes fallIce8Night {
      0% { transform: translate(0px, -16px); opacity: 0; }
      20% { opacity: 0.8; }
      80% { opacity: 0.7; }
      100% { transform: translate(-6px, 46px); opacity: 0; }
    }
    @keyframes fallIce9Night {
      0% { transform: translate(0px, -26px); opacity: 0; }
      20% { opacity: 0.8; }
      80% { opacity: 0.7; }
      100% { transform: translate(10px, 56px); opacity: 0; }
    }
    @keyframes fallIce10Night {
      0% { transform: translate(0px, -32px); opacity: 0; }
      20% { opacity: 0.8; }
      80% { opacity: 0.7; }
      100% { transform: translate(-4px, 62px); opacity: 0; }
    }
  </style>

  <!-- TŁO NOCNE -->
  <rect width="233" height="200" fill="url(#bgNight)" class="bgLayerNight"/>

  <!-- GWIAZDY -->
  <g fill="#FFFFFF">
    <circle cx="25" cy="30" r="1.2" class="twinkleStar" style="animation-delay: 0s"/>
    <circle cx="60" cy="15" r="0.8" class="twinkleStarSlow" style="animation-delay: 0.5s"/>
    <circle cx="100" cy="45" r="1" class="twinkleStar" style="animation-delay: 1.2s"/>
    <circle cx="160" cy="20" r="1.3" class="twinkleStar" style="animation-delay: 2s"/>
    <circle cx="210" cy="30" r="0.9" class="twinkleStarSlow" style="animation-delay: 0.8s"/>
    <circle cx="195" cy="65" r="1.1" class="twinkleStar" style="animation-delay: 1.5s"/>
    <circle cx="35" cy="80" r="0.7" class="twinkleStar" style="animation-delay: 2.5s"/>
    <circle cx="15" cy="130" r="1" class="twinkleStarSlow" style="animation-delay: 0.3s"/>
    <circle cx="50" cy="170" r="0.9" class="twinkleStar" style="animation-delay: 1.8s"/>
    <circle cx="90" cy="185" r="1.2" class="twinkleStar" style="animation-delay: 2.2s"/>
    <circle cx="140" cy="170" r="0.8" class="twinkleStarSlow" style="animation-delay: 0.6s"/>
    <circle cx="180" cy="185" r="1" class="twinkleStar" style="animation-delay: 1.1s"/>
    <circle cx="215" cy="140" r="1.3" class="twinkleStar" style="animation-delay: 2.8s"/>
    <circle cx="175" cy="105" r="0.9" class="twinkleStarSlow" style="animation-delay: 1.4s"/>
    <circle cx="55" cy="105" r="0.6" class="twinkleStar" style="animation-delay: 3s"/>
    <circle cx="135" cy="55" r="1.1" class="twinkleStar" style="animation-delay: 0.9s"/>
    <circle cx="80" cy="65" r="0.8" class="twinkleStarSlow" style="animation-delay: 1.7s"/>
    <circle cx="200" cy="95" r="0.7" class="twinkleStar" style="animation-delay: 2.3s"/>
  </g>

  <!-- CHMURA NOCNA -->
  <g class="cloudMoveNight" filter="url(#cloudShadowNight)">
    <path d="M 50,115 
             C 50,95 70,85 85,90 
             C 95,70 125,65 140,80 
             C 155,75 175,85 180,105 
             C 195,105 200,115 195,125 
             C 190,135 170,135 160,130 
             L 70,130 
             C 55,130 45,125 50,115 Z" 
          fill="url(#cloudNight)"/>
    <path d="M 70,105 C 80,90 105,85 125,93 C 135,88 152,92 158,106 C 165,102 175,108 172,118 C 168,126 148,128 135,124 L 85,126 C 73,127 66,120 70,105 Z" 
          fill="#D0D8F0" opacity="0.3"/>
  </g>

  <!-- KROPLE MARZNĄCEGO DESZCZU – ROMBY, ROZMIESZCZONE POD CHMURĄ -->
  <g filter="url(#iceGlowNight)">
    <polygon points="95,134 100,140 95,146 90,140" fill="url(#iceDiamondNight)" class="ice1" style="transform-origin: 95px 140px;"/>
    <polygon points="120,138 125,144 120,150 115,144" fill="url(#iceDiamondNight)" class="ice2" style="transform-origin: 120px 144px;"/>
    <polygon points="145,132 150,138 145,144 140,138" fill="url(#iceDiamondNight)" class="ice3" style="transform-origin: 145px 138px;"/>
    <polygon points="105,144 110,150 105,156 100,150" fill="url(#iceDiamondNight)" class="ice4" style="transform-origin: 105px 150px;"/>
    <polygon points="135,141 140,147 135,153 130,147" fill="url(#iceDiamondNight)" class="ice5" style="transform-origin: 135px 147px;"/>
    <polygon points="85,146 90,152 85,158 80,152" fill="url(#iceDiamondNight)" class="ice6" style="transform-origin: 85px 152px;"/>
    <polygon points="155,136 160,142 155,148 150,142" fill="url(#iceDiamondNight)" class="ice7" style="transform-origin: 155px 142px;"/>
    <polygon points="110,151 115,157 110,163 105,157" fill="url(#iceDiamondNight)" class="ice8" style="transform-origin: 110px 157px;"/>
    <polygon points="130,128 135,134 130,140 125,134" fill="url(#iceDiamondNight)" class="ice9" style="transform-origin: 130px 134px;"/>
    <polygon points="100,156 105,162 100,168 95,162" fill="url(#iceDiamondNight)" class="ice10" style="transform-origin: 100px 162px;"/>
  </g>

  <!-- SZADŹ / LODOWA MGIEŁKA NOCNA PRZY PODŁOŻU -->
  <ellipse cx="115" cy="188" rx="80" ry="6" fill="#90CAF9" opacity="0.15" filter="url(#iceGlowNight)"/>
  <ellipse cx="115" cy="193" rx="55" ry="3" fill="#FFFFFF" opacity="0.1" filter="url(#iceGlowNight)"/>
</svg>