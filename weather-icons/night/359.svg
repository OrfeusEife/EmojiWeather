  <g>
    <rect class="streakNight s1" x="80" y="130" width="2" height="18" fill="url(#rainStreakNight)" transform="rotate(15, 81, 139)"/>
    <rect class="streakNight s2" x="100" y="125" width="2" height="20" fill="url(#rainStreakNight)" transform="rotate(12, 101, 135)"/>
    <rect class="streakNight s3" x="120" y="135" width="2" height="16" fill="url(#rainStreakNight)" transform="rotate(18, 121, 143)"/>
    <rect class="streakNight s4" x="140" y="128" width="2" height="19" fill="url(#rainStreakNight)" transform="rotate(10, 141, 137)"/>
    <rect class="streakNight s5" x="160" y="132" width="2" height="17" fill="url(#rainStreakNight)" transform="rotate(14, 161, 140)"/>
    <rect class="streakNight s6" x="90" y="140" width="2" height="18" fill="url(#rainStreakNight)" transform="rotate(16, 91, 149)"/>
    <rect class="streakNight s7" x="110" y="138" width="2" height="20" fill="url(#rainStreakNight)" transform="rotate(11, 111, 148)"/>
    <rect class="streakNight s8" x="130" y="142" width="2" height="16" fill="url(#rainStreakNight)" transform="rotate(13, 131, 150)"/>
    <rect class="streakNight s9" x="150" y="136" width="2" height="19" fill="url(#rainStreakNight)" transform="rotate(17, 151, 145)"/>
    <rect class="streakNight s10" x="170" y="145" width="2" height="17" fill="url(#rainStreakNight)" transform="rotate(12, 171, 153)"/>

    <rect class="streakNight s11" x="75" y="150" width="2" height="18" fill="url(#rainStreakNight)" transform="rotate(14, 76, 159)"/>
    <rect class="streakNight s12" x="95" y="148" width="2" height="20" fill="url(#rainStreakNight)" transform="rotate(15, 96, 158)"/>
    <rect class="streakNight s13" x="115" y="152" width="2" height="16" fill="url(#rainStreakNight)" transform="rotate(11, 116, 160)"/>
    <rect class="streakNight s14" x="135" y="147" width="2" height="19" fill="url(#rainStreakNight)" transform="rotate(18, 136, 156)"/>
    <rect class="streakNight s15" x="155" y="155" width="2" height="17" fill="url(#rainStreakNight)" transform="rotate(13, 156, 163)"/>
    <rect class="streakNight s16" x="175" y="150" width="2" height="18" fill="url(#rainStreakNight)" transform="rotate(16, 176, 159)"/>
    <rect class="streakNight s17" x="85" y="158" width="2" height="20" fill="url(#rainStreakNight)" transform="rotate(12, 86, 168)"/>
    <rect class="streakNight s18" x="105" y="160" width="2" height="16" fill="url(#rainStreakNight)" transform="rotate(15, 106, 168)"/>
    <rect class="streakNight s19" x="125" y="155" width="2" height="19" fill="url(#rainStreakNight)" transform="rotate(14, 126, 164)"/>
    <rect class="streakNight s20" x="145" y="162" width="2" height="17" fill="url(#rainStreakNight)" transform="rotate(17, 146, 170)"/>

    <rect class="streakNight s21" x="82" y="135" width="2" height="18" fill="url(#rainStreakNight)" transform="rotate(13, 83, 144)"/>
    <rect class="streakNight s22" x="102" y="130" width="2" height="20" fill="url(#rainStreakNight)" transform="rotate(16, 103, 140)"/>
    <rect class="streakNight s23" x="122" y="140" width="2" height="16" fill="url(#rainStreakNight)" transform="rotate(11, 123, 148)"/>
    <rect class="streakNight s24" x="142" y="133" width="2" height="19" fill="url(#rainStreakNight)" transform="rotate(15, 143, 142)"/>
    <rect class="streakNight s25" x="162" y="138" width="2" height="17" fill="url(#rainStreakNight)" transform="rotate(14, 163, 146)"/>
    <rect class="streakNight s26" x="92" y="145" width="2" height="18" fill="url(#rainStreakNight)" transform="rotate(17, 93, 154)"/>
    <rect class="streakNight s27" x="112" y="143" width="2" height="20" fill="url(#rainStreakNight)" transform="rotate(12, 113, 153)"/>
    <rect class="streakNight s28" x="132" y="148" width="2" height="16" fill="url(#rainStreakNight)" transform="rotate(16, 133, 156)"/>
    <rect class="streakNight s29" x="152" y="140" width="2" height="19" fill="url(#rainStreakNight)" transform="rotate(13, 153, 149)"/>
    <rect class="streakNight s30" x="172" y="147" width="2" height="17" fill="url(#rainStreakNight)" transform="rotate(15, 173, 155)"/>
  </g>

  <!-- KROPLE NOCNEGO DESZCZU – 15 sztuk -->
  <g>
    <path class="dropNight d1" d="M88 138 C88 138 84 145 84 148 C84 151 86 153 88 153 C90 153 92 151 92 148 C92 145 88 138 88 138Z" fill="url(#rainDropNight)"/>
    <path class="dropNight d2" d="M108 142 C108 142 104 149 104 152 C104 155 106 157 108 157 C110 157 112 155 112 152 C112 149 108 142 108 142Z" fill="url(#rainDropNight)"/>
    <path class="dropNight d3" d="M128 136 C128 136 124 143 124 146 C124 149 126 151 128 151 C130 151 132 149 132 146 C132 143 128 136 128 136Z" fill="url(#rainDropNight)"/>
    <path class="dropNight d4" d="M148 140 C148 140 144 147 144 150 C144 153 146 155 148 155 C150 155 152 153 152 150 C152 147 148 140 148 140Z" fill="url(#rainDropNight)"/>
    <path class="dropNight d5" d="M168 144 C168 144 164 151 164 154 C164 157 166 159 168 159 C170 159 172 157 172 154 C172 151 168 144 168 144Z" fill="url(#rainDropNight)"/>
    <path class="dropNight d6" d="M98 148 C98 148 94 155 94 158 C94 161 96 163 98 163 C100 163 102 161 102 158 C102 155 98 148 98 148Z" fill="url(#rainDropNight)"/>
    <path class="dropNight d7" d="M118 152 C118 152 114 159 114 162 C114 165 116 167 118 167 C120 167 122 165 122 162 C122 159 118 152 118 152Z" fill="url(#rainDropNight)"/>
    <path class="dropNight d8" d="M138 146 C138 146 134 153 134 156 C134 159 136 161 138 161 C140 161 142 159 142 156 C142 153 138 146 138 146Z" fill="url(#rainDropNight)"/>
    <path class="dropNight d9" d="M158 150 C158 150 154 157 154 160 C154 163 156 165 158 165 C160 165 162 163 162 160 C162 157 158 150 158 150Z" fill="url(#rainDropNight)"/>
    <path class="dropNight d10" d="M78 145 C78 145 74 152 74 155 C74 158 76 160 78 160 C80 160 82 158 82 155 C82 152 78 145 78 145Z" fill="url(#rainDropNight)"/>
    <path class="dropNight d11" d="M178 148 C178 148 174 155 174 158 C174 161 176 163 178 163 C180 163 182 161 182 158 C182 155 178 148 178 148Z" fill="url(#rainDropNight)"/>
    <path class="dropNight d12" d="M103 155 C103 155 99 162 99 165 C99 168 101 170 103 170 C105 170 107 168 107 165 C107 162 103 155 103 155Z" fill="url(#rainDropNight)"/>
    <path class="dropNight d13" d="M123 158 C123 158 119 165 119 168 C119 171 121 173 123 173 C125 173 127 171 127 168 C127 165 123 158 123 158Z" fill="url(#rainDropNight)"/>
    <path class="dropNight d14" d="M143 162 C143 162 139 169 139 172 C139 175 141 177 143 177 C145 177 147 175 147 172 C147 169 143 162 143 162Z" fill="url(#rainDropNight)"/>
    <path class="dropNight d15" d="M163 158 C163 158 159 165 159 168 C159 171 161 173 163 173 C165 173 167 171 167 168 C167 165 163 158 163 158Z" fill="url(#rainDropNight)"/>
  </g>

  <!-- ROZPYLONA WODA / MGIEŁKA NOCNA PRZY PODŁOŻU -->
  <ellipse cx="115" cy="188" rx="95" ry="8" fill="#90CAF9" opacity="0.2" filter="url(#cloudShadowNight)"/>
  <ellipse cx="115" cy="193" rx="70" ry="5" fill="#B0C4DE" opacity="0.15" filter="url(#cloudShadowNight)"/>
</svg>