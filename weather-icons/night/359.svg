<svg width="233" height="200" viewBox="0 0 233 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- TŁO: NOCNY RADIALNY GRADIENT ZANIKAJĄCY DO PRZEZROCZYSTOŚCI -->
    <radialGradient id="bgNight" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#0D1B2A" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#1A237E" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#283593" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#64B5F6" stop-opacity="0"/>
    </radialGradient>

    <!-- CHMURA NOCNA: CIEMNIEJSZA, SREBRZYSTO-GRANATOWA -->
    <radialGradient id="cloudNight" cx="30%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#E0E7FF"/>
      <stop offset="45%" stop-color="#9FABC9"/>
      <stop offset="80%" stop-color="#5C6A92"/>
      <stop offset="100%" stop-color="#2C3A5E"/>
    </radialGradient>

    <!-- SMUGA DESZCZU NOCNA (DŁUGA, PRZEŹROCZYSTA) -->
    <linearGradient id="rainStreakNight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B0C4DE" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#607D8B" stop-opacity="0.2"/>
    </linearGradient>

    <!-- KROPLA DESZCZU NOCNA -->
    <linearGradient id="rainDropNight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B0C4DE"/>
      <stop offset="100%" stop-color="#607D8B"/>
    </linearGradient>

    <!-- FILTRY -->
    <filter id="cloudShadowNight" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0A1128" flood-opacity="0.6"/>
    </filter>
    <filter id="motionBlurNight" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0 3"/>
    </filter>
  </defs>

  <style>
    .bgLayerNight {
      animation: bgPulseNight 4s ease-in-out infinite;
    }
    .cloudMoveNight {
      animation: cloudFloatNight 4s ease-in-out infinite;
    }
    /* Smugi – bardzo szybkie, z rozmyciem */
    .streakNight {
      animation: streakFallNight 0.8s linear infinite;
      filter: url(#motionBlurNight);
    }
    /* Krople – nieco wolniejsze */
    .dropNight {
      animation: dropFallNight 1.0s linear infinite;
    }
    .twinkleStar { animation: twinkle 3s ease-in-out infinite; }
    .twinkleStarSlow { animation: twinkle 5s ease-in-out infinite; }

    /* Opóźnienia dla smug (30 smug) – zachowane */
    .s1 { animation-delay: 0.00s; }
    .s2 { animation-delay: 0.05s; }
    .s3 { animation-delay: 0.10s; }
    .s4 { animation-delay: 0.15s; }
    .s5 { animation-delay: 0.20s; }
    .s6 { animation-delay: 0.25s; }
    .s7 { animation-delay: 0.30s; }
    .s8 { animation-delay: 0.35s; }
    .s9 { animation-delay: 0.40s; }
    .s10 { animation-delay: 0.45s; }
    .s11 { animation-delay: 0.50s; }
    .s12 { animation-delay: 0.55s; }
    .s13 { animation-delay: 0.60s; }
    .s14 { animation-delay: 0.65s; }
    .s15 { animation-delay: 0.70s; }
    .s16 { animation-delay: 0.75s; }
    .s17 { animation-delay: 0.02s; }
    .s18 { animation-delay: 0.07s; }
    .s19 { animation-delay: 0.12s; }
    .s20 { animation-delay: 0.17s; }
    .s21 { animation-delay: 0.22s; }
    .s22 { animation-delay: 0.27s; }
    .s23 { animation-delay: 0.32s; }
    .s24 { animation-delay: 0.37s; }
    .s25 { animation-delay: 0.42s; }
    .s26 { animation-delay: 0.47s; }
    .s27 { animation-delay: 0.52s; }
    .s28 { animation-delay: 0.57s; }
    .s29 { animation-delay: 0.62s; }
    .s30 { animation-delay: 0.67s; }
    /* Opóźnienia dla kropel (15 kropel) */
    .d1 { animation-delay: 0.03s; }
    .d2 { animation-delay: 0.13s; }
    .d3 { animation-delay: 0.23s; }
    .d4 { animation-delay: 0.33s; }
    .d5 { animation-delay: 0.43s; }
    .d6 { animation-delay: 0.53s; }
    .d7 { animation-delay: 0.63s; }
    .d8 { animation-delay: 0.73s; }
    .d9 { animation-delay: 0.08s; }
    .d10 { animation-delay: 0.18s; }
    .d11 { animation-delay: 0.28s; }
    .d12 { animation-delay: 0.38s; }
    .d13 { animation-delay: 0.48s; }
    .d14 { animation-delay: 0.58s; }
    .d15 { animation-delay: 0.68s; }

    @keyframes bgPulseNight {
      0%,100% { opacity: 0.85; }
      50% { opacity: 1; }
    }
    @keyframes cloudFloatNight {
      0%,100% { transform: translateX(0) translateY(0); }
      50% { transform: translateX(-5px) translateY(-3px); }
    }
    @keyframes streakFallNight {
      0% { transform: translateY(-40px) translateX(0); opacity: 0; }
      20% { opacity: 0.8; }
      80% { opacity: 0.6; }
      100% { transform: translateY(60px) translateX(-15px); opacity: 0; }
    }
    @keyframes dropFallNight {
      0% { transform: translateY(-30px) translateX(0); opacity: 0; }
      20% { opacity: 0.7; }
      80% { opacity: 0.6; }
      100% { transform: translateY(55px) translateX(-8px); opacity: 0; }
    }
    @keyframes twinkle {
      0%,100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }
  </style>

  <!-- TŁO NOCNE -->
  <rect width="233" height="200" fill="url(#bgNight)" class="bgLayerNight"/>

  <!-- GWIAZDY -->
  <g fill="#FFFFFF">
    <circle cx="25" cy="30" r="1.2" class="twinkleStar" style="animation-delay: 0s"/>
    <circle cx="60" cy="15" r="0.8" class="twinkleStarSlow" style="animation-delay: 0.5s"/>
    <circle cx="100" cy="45" r="1" class="twinkleStar" style="animation-delay: 1.2s"/>
    <circle cx="160" cy="20" r="1.3" class="twinkleStar" style="animation-delay: 2s"/>
    <circle cx="210" cy="30" r="0.9" class="twinkleStarSlow" style="animation-delay: 0.8s"/>
    <circle cx="195" cy="65" r="1.1" class="twinkleStar" style="animation-delay: 1.5s"/>
    <circle cx="35" cy="80" r="0.7" class="twinkleStar" style="animation-delay: 2.5s"/>
    <circle cx="15" cy="130" r="1" class="twinkleStarSlow" style="animation-delay: 0.3s"/>
    <circle cx="50" cy="170" r="0.9" class="twinkleStar" style="animation-delay: 1.8s"/>
    <circle cx="90" cy="185" r="1.2" class="twinkleStar" style="animation-delay: 2.2s"/>
    <circle cx="140" cy="170" r="0.8" class="twinkleStarSlow" style="animation-delay: 0.6s"/>
    <circle cx="180" cy="185" r="1" class="twinkleStar" style="animation-delay: 1.1s"/>
    <circle cx="215" cy="140" r="1.3" class="twinkleStar" style="animation-delay: 2.8s"/>
    <circle cx="175" cy="105" r="0.9" class="twinkleStarSlow" style="animation-delay: 1.4s"/>
    <circle cx="55" cy="105" r="0.6" class="twinkleStar" style="animation-delay: 3s"/>
    <circle cx="135" cy="55" r="1.1" class="twinkleStar" style="animation-delay: 0.9s"/>
    <circle cx="80" cy="65" r="0.8" class="twinkleStarSlow" style="animation-delay: 1.7s"/>
    <circle cx="200" cy="95" r="0.7" class="twinkleStar" style="animation-delay: 2.3s"/>
  </g>

  <!-- CHMURA NOCNA – CIEMNA, BURZOWA, BEZ KSIĘŻYCA -->
  <g class="cloudMoveNight" filter="url(#cloudShadowNight)">
    <path d="M 40,115 
             C 40,95 60,82 78,88 
             C 88,68 120,60 138,75 
             C 152,68 175,76 182,96 
             C 198,98 205,110 198,124 
             C 192,136 170,138 158,132 
             L 65,134 
             C 48,136 38,130 40,115 Z" 
          fill="url(#cloudNight)"/>
    <path d="M 70,105 C 80,88 105,82 125,90 C 135,85 152,90 158,104 C 165,100 175,106 172,118 C 168,126 148,128 135,124 L 85,126 C 73,127 66,120 70,105 Z" 
          fill="#D0D8F0" opacity="0.2"/>
  </g>

