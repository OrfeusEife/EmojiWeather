<svg width="233" height="200" viewBox="0 0 233 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- TŁO: NOCNY RADIALNY GRADIENT Z PRZEZROCZYSTOŚCIĄ -->
    <radialGradient id="bgNight" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#0D1B2A" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#1A237E" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#283593" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#64B5F6" stop-opacity="0"/>
    </radialGradient>

    <!-- CIEMNA CHMURA NOCNA (głęboki granat) -->
    <radialGradient id="darkCloudNight" cx="30%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#6C7A9E"/>
      <stop offset="40%" stop-color="#4A5A82"/>
      <stop offset="80%" stop-color="#2C3A5E"/>
      <stop offset="100%" stop-color="#1A253C"/>
    </radialGradient>

    <!-- JASNA CHMURA NOCNA (srebrzysto-granatowa) -->
    <radialGradient id="lightCloudNight" cx="30%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#D0D8F0"/>
      <stop offset="45%" stop-color="#A8B4D4"/>
      <stop offset="80%" stop-color="#7080A8"/>
      <stop offset="100%" stop-color="#506090"/>
    </radialGradient>

    <!-- FILTRY NOCNE (ciemniejsze cienie) -->
    <filter id="cloudShadowDarkNight" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0A1128" flood-opacity="0.7"/>
    </filter>
    <filter id="cloudShadowLightNight" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0A1128" flood-opacity="0.5"/>
    </filter>
  </defs>

  <style>
    .bgLayerNight { animation: bgPulseNight 8s ease-in-out infinite; }
    .darkCloudNight { animation: darkCloudMoveNight 8s ease-in-out infinite; }
    .lightCloudLeftNight { animation: lightCloudMove1Night 7s ease-in-out infinite; }
    .lightCloudRightNight { animation: lightCloudMove2Night 6s ease-in-out infinite; }
    .twinkleStar { animation: twinkle 3s ease-in-out infinite; }
    .twinkleStarSlow { animation: twinkle 5s ease-in-out infinite; }

    @keyframes bgPulseNight { 0%,100% { opacity: 0.85; } 50% { opacity: 1; } }
    @keyframes darkCloudMoveNight { 0%,100% { transform: translateX(0) translateY(0); } 50% { transform: translateX(-5px) translateY(-3px); } }
    @keyframes lightCloudMove1Night { 0%,100% { transform: translateX(0) translateY(0); } 50% { transform: translateX(-3px) translateY(-2px); } }
    @keyframes lightCloudMove2Night { 0%,100% { transform: translateX(0) translateY(0); } 50% { transform: translateX(4px) translateY(-2px); } }
    @keyframes twinkle { 0%,100% { opacity: 0.2; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }
  </style>

  <!-- TŁO NOCNE -->
  <rect width="233" height="200" fill="url(#bgNight)" class="bgLayerNight"/>

  <!-- GWIAZDY -->
  <g fill="#FFFFFF">
    <circle cx="25" cy="30" r="1.2" class="twinkleStar" style="animation-delay: 0s"/>
    <circle cx="60" cy="15" r="0.8" class="twinkleStarSlow" style="animation-delay: 0.5s"/>
    <circle cx="100" cy="45" r="1" class="twinkleStar" style="animation-delay: 1.2s"/>
    <circle cx="160" cy="20" r="1.3" class="twinkleStar" style="animation-delay: 2s"/>
    <circle cx="210" cy="30" r="0.9" class="twinkleStarSlow" style="animation-delay: 0.8s"/>
    <circle cx="195" cy="65" r="1.1" class="twinkleStar" style="animation-delay: 1.5s"/>
    <circle cx="35" cy="80" r="0.7" class="twinkleStar" style="animation-delay: 2.5s"/>
    <circle cx="15" cy="130" r="1" class="twinkleStarSlow" style="animation-delay: 0.3s"/>
    <circle cx="50" cy="170" r="0.9" class="twinkleStar" style="animation-delay: 1.8s"/>
    <circle cx="90" cy="185" r="1.2" class="twinkleStar" style="animation-delay: 2.2s"/>
    <circle cx="140" cy="170" r="0.8" class="twinkleStarSlow" style="animation-delay: 0.6s"/>
    <circle cx="180" cy="185" r="1" class="twinkleStar" style="animation-delay: 1.1s"/>
    <circle cx="215" cy="140" r="1.3" class="twinkleStar" style="animation-delay: 2.8s"/>
    <circle cx="175" cy="105" r="0.9" class="twinkleStarSlow" style="animation-delay: 1.4s"/>
    <circle cx="55" cy="105" r="0.6" class="twinkleStar" style="animation-delay: 3s"/>
    <circle cx="135" cy="55" r="1.1" class="twinkleStar" style="animation-delay: 0.9s"/>
    <circle cx="80" cy="65" r="0.8" class="twinkleStarSlow" style="animation-delay: 1.7s"/>
    <circle cx="200" cy="95" r="0.7" class="twinkleStar" style="animation-delay: 2.3s"/>
  </g>

  <!-- DUŻA CIEMNA CHMURA (wersja nocna) -->
  <g class="darkCloudNight" filter="url(#cloudShadowDarkNight)">
    <path d="M 40,115 C 40,90 70,75 95,82 C 115,65 155,60 175,78 C 195,72 220,85 222,108 C 225,118 220,135 208,140 C 195,148 160,145 140,138 L 60,138 C 45,138 35,130 40,115 Z" fill="url(#darkCloudNight)"/>
  </g>

  <!-- LEWA JASNA CHMURKA (wersja nocna) -->
  <g class="lightCloudLeftNight" filter="url(#cloudShadowLightNight)">
    <path d="M 20,102 C 20,90 33,82 45,86 C 55,75 70,73 80,81 C 89,77 99,84 101,95 C 105,101 103,111 95,115 C 87,119 75,117 65,114 L 30,114 C 23,114 20,108 20,102 Z" fill="url(#lightCloudNight)"/>
  </g>

  <!-- PRAWA JASNA CHMURKA (wersja nocna) -->
  <g class="lightCloudRightNight" filter="url(#cloudShadowLightNight)">
    <path d="M 145,138 C 145,125 158,117 170,121 C 180,110 195,108 205,115 C 212,118 215,126 212,132 C 208,137 198,136 188,134 L 155,134 C 147,134 145,130 145,138 Z" fill="url(#lightCloudNight)"/>
  </g>
</svg>