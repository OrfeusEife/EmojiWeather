<svg width="233" height="200" viewBox="0 0 233 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- TŁO: NOCNY RADIALNY GRADIENT ZANIKAJĄCY DO PRZEZROCZYSTOŚCI -->
    <radialGradient id="bgNight" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#0D1B2A" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#1A237E" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#283593" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#64B5F6" stop-opacity="0"/>
    </radialGradient>

    <!-- KSIĘŻYC Z POŚWIATĄ -->
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E3F2FD" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#90CAF9" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1A237E" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="moonCore" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#B0BEC5"/>
    </linearGradient>

    <!-- CHMURA NOCNA: CIEMNIEJSZA, SREBRZYSTO-GRANATOWA -->
    <radialGradient id="cloudNight" cx="30%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#E0E7FF"/>
      <stop offset="45%" stop-color="#9FABC9"/>
      <stop offset="80%" stop-color="#5C6A92"/>
      <stop offset="100%" stop-color="#2C3A5E"/>
    </radialGradient>

    <!-- DESZCZ NOCNY: SREBRZYSTO-NIEBIESKI -->
    <linearGradient id="rainNight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B0C4DE"/>
      <stop offset="100%" stop-color="#607D8B"/>
    </linearGradient>

    <!-- FILTRY -->
    <filter id="moonGlowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="cloudShadowNight" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0A1128" flood-opacity="0.6"/>
    </filter>
    <filter id="rainBlurNight" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
  </defs>

  <style>
    .bgLayerNight {
      animation: bgPulseNight 8s ease-in-out infinite;
    }
    .moonMove {
      animation: slideBehindCloudNight 10s ease-in-out infinite alternate;
      transform-origin: 55px 60px;
    }
    .cloudMoveNight {
      animation: cloudFloatNight 5s ease-in-out infinite;
    }
    .rainDropNight {
      animation: fallHeavyNight 1.2s linear infinite;
    }
    .twinkleStar { animation: twinkle 3s ease-in-out infinite; }
    .twinkleStarSlow { animation: twinkle 5s ease-in-out infinite; }
    
    /* Opóźnienia dla kropel – ulewny deszcz (zachowane) */
    .d1 { animation-delay: 0s; }
    .d2 { animation-delay: 0.08s; }
    .d3 { animation-delay: 0.16s; }
    .d4 { animation-delay: 0.24s; }
    .d5 { animation-delay: 0.32s; }
    .d6 { animation-delay: 0.40s; }
    .d7 { animation-delay: 0.48s; }
    .d8 { animation-delay: 0.56s; }
    .d9 { animation-delay: 0.64s; }
    .d10 { animation-delay: 0.72s; }
    .d11 { animation-delay: 0.80s; }
    .d12 { animation-delay: 0.88s; }
    .d13 { animation-delay: 0.96s; }
    .d14 { animation-delay: 1.04s; }
    .d15 { animation-delay: 0.04s; }
    .d16 { animation-delay: 0.12s; }
    .d17 { animation-delay: 0.20s; }
    .d18 { animation-delay: 0.28s; }
    .d19 { animation-delay: 0.36s; }
    .d20 { animation-delay: 0.44s; }
    .d21 { animation-delay: 0.52s; }
    .d22 { animation-delay: 0.60s; }
    .d23 { animation-delay: 0.68s; }
    .d24 { animation-delay: 0.76s; }
    .d25 { animation-delay: 0.84s; }
    .d26 { animation-delay: 0.92s; }
    .d27 { animation-delay: 1.00s; }
    .d28 { animation-delay: 1.08s; }

    @keyframes bgPulseNight {
      0%,100% { opacity: 0.85; }
      50% { opacity: 1; }
    }
    @keyframes slideBehindCloudNight {
      0% { transform: translateX(0); }
      100% { transform: translateX(85px); }
    }
    @keyframes cloudFloatNight {
      0%,100% { transform: translateX(0) translateY(0); }
      50% { transform: translateX(-3px) translateY(-2px); }
    }
    @keyframes fallHeavyNight {
      0% { transform: translateY(-25px); opacity: 0; }
      15% { opacity: 0.7; }
      85% { opacity: 0.6; }
      100% { transform: translateY(48px); opacity: 0; }
    }
    @keyframes twinkle {
      0%,100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }
  </style>

  <!-- TŁO NOCNE -->
  <rect width="233" height="200" fill="url(#bgNight)" class="bgLayerNight"/>

  <!-- GWIAZDY -->
  <g fill="#FFFFFF">
    <circle cx="25" cy="30" r="1.2" class="twinkleStar" style="animation-delay: 0s"/>
    <circle cx="60" cy="15" r="0.8" class="twinkleStarSlow" style="animation-delay: 0.5s"/>
    <circle cx="100" cy="45" r="1" class="twinkleStar" style="animation-delay: 1.2s"/>
    <circle cx="160" cy="20" r="1.3" class="twinkleStar" style="animation-delay: 2s"/>
    <circle cx="210" cy="30" r="0.9" class="twinkleStarSlow" style="animation-delay: 0.8s"/>
    <circle cx="195" cy="65" r="1.1" class="twinkleStar" style="animation-delay: 1.5s"/>
    <circle cx="35" cy="80" r="0.7" class="twinkleStar" style="animation-delay: 2.5s"/>
    <circle cx="15" cy="130" r="1" class="twinkleStarSlow" style="animation-delay: 0.3s"/>
    <circle cx="50" cy="170" r="0.9" class="twinkleStar" style="animation-delay: 1.8s"/>
    <circle cx="90" cy="185" r="1.2" class="twinkleStar" style="animation-delay: 2.2s"/>
    <circle cx="140" cy="170" r="0.8" class="twinkleStarSlow" style="animation-delay: 0.6s"/>
    <circle cx="180" cy="185" r="1" class="twinkleStar" style="animation-delay: 1.1s"/>
    <circle cx="215" cy="140" r="1.3" class="twinkleStar" style="animation-delay: 2.8s"/>
    <circle cx="175" cy="105" r="0.9" class="twinkleStarSlow" style="animation-delay: 1.4s"/>
    <circle cx="55" cy="105" r="0.6" class="twinkleStar" style="animation-delay: 3s"/>
    <circle cx="135" cy="55" r="1.1" class="twinkleStar" style="animation-delay: 0.9s"/>
    <circle cx="80" cy="65" r="0.8" class="twinkleStarSlow" style="animation-delay: 1.7s"/>
    <circle cx="200" cy="95" r="0.7" class="twinkleStar" style="animation-delay: 2.3s"/>
  </g>

  <!-- KSIĘŻYC – RUCHOMY, CHOWA SIĘ ZA CHMURĄ -->
  <g class="moonMove">
    <circle cx="55" cy="60" r="38" fill="url(#moonGlow)" filter="url(#moonGlowFilter)"/>
    <circle cx="55" cy="60" r="24" fill="url(#moonCore)" filter="url(#moonGlowFilter)" opacity="0.95"/>
    <circle cx="55" cy="60" r="20" fill="url(#moonCore)"/>
    <!-- Kratery -->
    <circle cx="48" cy="53" r="4" fill="#CFD8DC" opacity="0.35"/>
    <circle cx="62" cy="62" r="3.5" fill="#CFD8DC" opacity="0.3"/>
    <circle cx="52" cy="68" r="2.5" fill="#CFD8DC" opacity="0.4"/>
    <!-- Odblaski -->
    <circle cx="48" cy="53" r="2.5" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="62" cy="58" r="2" fill="#FFFFFF" opacity="0.5"/>
    <circle cx="52" cy="68" r="1.5" fill="#FFFFFF" opacity="0.4"/>
  </g>

  <!-- CHMURA NOCNA – RYSOWANA PO KSIĘŻYCU, BY GO ZASŁANIAĆ -->
  <g class="cloudMoveNight" filter="url(#cloudShadowNight)">
    <path d="M 60,115 
             C 60,95 80,85 95,90 
             C 105,70 135,65 150,80 
             C 165,75 185,85 190,105 
             C 205,105 210,115 205,125 
             C 200,135 180,135 170,130 
             L 80,130 
             C 65,130 55,125 60,115 Z" 
          fill="url(#cloudNight)"/>
    <path d="M 80,105 C 90,90 115,85 135,93 C 145,88 162,92 168,106 C 175,102 185,108 182,118 C 178,126 158,128 145,124 L 95,126 C 83,127 76,120 80,105 Z" 
          fill="#D0D8F0" opacity="0.3"/>
  </g>

  <!-- KROPLE NOCNEGO DESZCZU – ULEWNY DESZCZ (28 KROPLI) -->
  <g filter="url(#rainBlurNight)">
    <path class="rainDropNight d1" d="M85 135 C85 135 81 142 81 145 C81 148 83 150 85 150 C87 150 89 148 89 145 C89 142 85 135 85 135Z" fill="url(#rainNight)"/>
    <path class="rainDropNight d2" d="M100 132 C100 132 96 139 96 142 C96 145 98 147 100 147 C102 147 104 145 104 142 C104 139 100 132 100 132Z" fill="url(#rainNight)"/>
    <path class="rainDropNight d3" d="M115 130 C115 130 111 137 111 140 C111 143 113 145 115 145 C117 145 119 143 119 140 C119 137 115 130 115 130Z" fill="url(#rainNight)"/>
    <path class="rainDropNight d4" d="M130 132 C130 132 126 139 126 142 C126 145 128 147 130 147 C132 147 134 145 134 142 C134 139 130 132 130 132Z" fill="url(#rainNight)"/>
    <path class="rainDropNight d5" d="M145 135 C145 135 141 142 141 145 C141 148 143 150 145 150 C147 150 149 148 149 145 C149 142 145 135 145 135Z" fill="url(#rainNight)"/>
    <path class="rainDropNight d6" d="M160 130 C160 130 156 137 156 140 C156 143 158 145 160 145 C162 145 164 143 164 140 C164 137 160 130 160 130Z" fill="url(#rainNight)"/>
    <path class="rainDropNight d7" d="M175 138 C175 138 171 145 171 148 C171 151 173 153 175 153 C177 153 179 151 179 148 C179 145 175 138 175 138Z" fill="url(#rainNight)"/>
    <path class="rainDropNight d8" d="M90 140 C90 140 86 147 86 150 C86 153 88 155 90 155 C92 155 94 153 94 150 C94 147 90 140 90 140Z" fill="url(#rainNight)"/>
    <path class="rainDropNight d9" d="M105 142 C105 142 101 149 101 152 C101 155 103 157 105 157 C107 157 109 155 109 152 C109 149 105 142 105 142Z" fill="url(#rainNight)"/>
    <path class="rainDropNight d10" d="M120 138 C120 138 116 145 116 148 C116 151 118 153 120 153 C122 153 124 151 124 148 C124 145 120 138 120 138Z" fill="url(#rainNight)"/>
    <path class="rainDropNight d11" d="M135 140 C135 140 131 147 131 150 C131 153 133 155 135 155 C137 155 139 153 139 150 C139 147 135 140 135 140Z" fill="url(#rainNight)"/>
    <path class="rainDropNight d12" d="M150 142 C150 142 146 149 146 152 C146 155 148 157 150 157 C152 157 154 155 154 152 C154 149 150 142 150 142Z" fill="url(#rainNight)"/>
    <path class="rainDropNight d13" d="M165 145 C165 145 161 152 161 155 C161 158 163 160 165 160 C167 160 169 158 169 155 C169 152 165 145 165 145Z" fill="url(#rainNight)"/>
    <path class="rainDropNight d14" d="M80 148 C80 148 76 155 76 158 C76 161 78 163 80 163 C82 163 84 161 84 158 C84 155 80 148 80 148Z" fill="url(#rainNight)"/>
    <path class="rainDropNight d15" d="M95 150 C95 150 91 157 91 160 C91 163 93 165 95 165 C97 165 99 163 99 160 C99 157 95 150 95 150Z" fill="url(#rainNight)"/>
    <path class="rainDropNight d16" d="M110 148 C110 148 106 155 106 158 C106 161 108 163 110 163 C112 163 114 161 114 158 C114 155 110 148 110 148Z" fill="url(#rainNight)"/>
    <path class="rainDropNight d17" d="M125 150 C125 150 121 157 121 160 C121 163 123 165 125 165 C127 165 129 163 129 160 C129 157 125 150 125 150Z" fill="url(#rainNight)"/>
    <path class="rainDropNight d18" d="M140 152 C140 152 136 159 136 162 C136 165 138 167 140 167 C142 167 144 165 144 162 C144 159 140 152 140 152Z" fill="url(#rainNight)"/>
    <path class="rainDropNight d19" d="M155 150 C155 150 151 157 151 160 C151 163 153 165 155 165 C157 165 159 163 159 160 C159 157 155 150 155 150Z" fill="url(#rainNight)"/>
    <path class="rainDropNight d20" d="M170 155 C170 155 166 162 166 165 C166 168 168 170 170 170 C172 170 174 168 174 165 C174 162 170 155 170 155Z" fill="url(#rainNight)"/>
    <path class="rainDropNight d21" d="M88 145 C88 145 84 152 84 155 C84 158 86 160 88 160 C90 160 92 158 92 155 C92 152 88 145 88 145Z" fill="url(#rainNight)"/>
    <path class="rainDropNight d22" d="M108 135 C108 135 104 142 104 145 C104 148 106 150 108 150 C110 150 112 148 112 145 C112 142 108 135 108 135Z" fill="url(#rainNight)"/>
    <path class="rainDropNight d23" d="M128 143 C128 143 124 150 124 153 C124 156 126 158 128 158 C130 158 132 156 132 153 C132 150 128 143 128 143Z" fill="url(#rainNight)"/>
    <path class="rainDropNight d24" d="M148 138 C148 138 144 145 144 148 C144 151 146 153 148 153 C150 153 152 151 152 148 C152 145 148 138 148 138Z" fill="url(#rainNight)"/>
    <path class="rainDropNight d25" d="M168 148 C168 148 164 155 164 158 C164 161 166 163 168 163 C170 163 172 161 172 158 C172 155 168 148 168 148Z" fill="url(#rainNight)"/>
    <path class="rainDropNight d26" d="M98 158 C98 158 94 165 94 168 C94 171 96 173 98 173 C100 173 102 171 102 168 C102 165 98 158 98 158Z" fill="url(#rainNight)"/>
    <path class="rainDropNight d27" d="M118 155 C118 155 114 162 114 165 C114 168 116 170 118 170 C120 170 122 168 122 165 C122 162 118 155 118 155Z" fill="url(#rainNight)"/>
    <path class="rainDropNight d28" d="M138 160 C138 160 134 167 134 170 C134 173 136 175 138 175 C140 175 142 173 142 170 C142 167 138 160 138 160Z" fill="url(#rainNight)"/>
  </g>

  <!-- WILGOTNE ODBLYSKI I ROZPYLONA MGIEŁKA (ULEWA NOCNA) -->
  <ellipse cx="115" cy="186" rx="80" ry="6" fill="#90CAF9" opacity="0.2" filter="url(#moonGlowFilter)"/>
  <ellipse cx="115" cy="190" rx="60" ry="4" fill="#B0C4DE" opacity="0.15" filter="url(#moonGlowFilter)"/>
</svg>