<svg width="233" height="200" viewBox="0 0 233 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- TŁO: NOCNY, BURZOWY GRADIENT Z PRZEZROCZYSTOŚCIĄ -->
    <radialGradient id="bgStormNight" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#0D1B2A" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#1A237E" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#283593" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#64B5F6" stop-opacity="0"/>
    </radialGradient>

    <!-- KSIĘŻYC ZA CHMURĄ -->
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E3F2FD" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#90CAF9" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1A237E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="moonCore" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#B0BEC5"/>
    </linearGradient>

    <!-- CHMURA NOCNA: CIEMNA, BURZOWA, GRANATOWA -->
    <radialGradient id="cloudStormNight" cx="30%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#5A6A82"/>
      <stop offset="45%" stop-color="#3A4A62"/>
      <stop offset="80%" stop-color="#2A3A52"/>
      <stop offset="100%" stop-color="#1A2A3A"/>
    </radialGradient>

    <!-- PŁATEK ŚNIEGU NOCNY -->
    <radialGradient id="snowFlakeNight" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#C0D8F0" stop-opacity="0.6"/>
    </radialGradient>

    <!-- FILTRY -->
    <filter id="moonGlowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="cloudShadowNight" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0A1128" flood-opacity="0.7"/>
    </filter>
    <filter id="lightningGlowNight" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="snowBlurNight" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.3"/>
    </filter>
  </defs>

  <style>
    .bgLayerNight {
      animation: bgPulseNight 8s ease-in-out infinite;
    }
    /* Księżyc – wolny ruch za chmurą */
    .moonMove {
      animation: slideMoon 20s ease-in-out infinite alternate;
    }
    .cloudMoveNight {
      animation: cloudFloatNight 6s ease-in-out infinite;
    }
    /* Błyskawica */
    .lightningNight {
      animation: flashNight 0.2s steps(2, start) infinite;
    }
    .lightningGlowNight {
      animation: flashGlowNight 0.2s steps(2, start) infinite;
    }
    /* Śnieg – opad z kołysaniem */
    .snowNight {
      animation: fallSnowNight 4s ease-in-out infinite;
    }
    .twinkleStar { animation: twinkle 3s ease-in-out infinite; }
    .twinkleStarSlow { animation: twinkle 5s ease-in-out infinite; }

    /* Opóźnienia dla płatków śniegu (15 sztuk) – zachowane */
    .s1 { animation-delay: 0.0s; }
    .s2 { animation-delay: 0.3s; }
    .s3 { animation-delay: 0.7s; }
    .s4 { animation-delay: 1.0s; }
    .s5 { animation-delay: 1.4s; }
    .s6 { animation-delay: 1.8s; }
    .s7 { animation-delay: 2.1s; }
    .s8 { animation-delay: 2.5s; }
    .s9 { animation-delay: 2.9s; }
    .s10 { animation-delay: 3.2s; }
    .s11 { animation-delay: 3.6s; }
    .s12 { animation-delay: 4.0s; }
    .s13 { animation-delay: 4.3s; }
    .s14 { animation-delay: 4.7s; }
    .s15 { animation-delay: 5.0s; }

    @keyframes bgPulseNight {
      0%,100% { opacity: 0.85; }
      50% { opacity: 1; }
    }
    @keyframes slideMoon {
      0% { transform: translateX(0); }
      50% { transform: translateX(100px); }
      100% { transform: translateX(0); }
    }
    @keyframes cloudFloatNight {
      0%,100% { transform: translateX(0) translateY(0); }
      50% { transform: translateX(-4px) translateY(-2px); }
    }
    @keyframes flashNight {
      0% { opacity: 1; }
      50% { opacity: 0.2; }
      100% { opacity: 1; }
    }
    @keyframes flashGlowNight {
      0% { opacity: 0.7; }
      50% { opacity: 0.05; }
      100% { opacity: 0.7; }
    }
    @keyframes fallSnowNight {
      0% { transform: translateY(-20px) translateX(0px); opacity: 0; }
      20% { opacity: 0.9; }
      80% { opacity: 0.7; }
      100% { transform: translateY(70px) translateX(12px); opacity: 0; }
    }
    @keyframes twinkle {
      0%,100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }
  </style>

  <!-- TŁO NOCNE -->
  <rect width="233" height="200" fill="url(#bgStormNight)" class="bgLayerNight"/>

  <!-- GWIAZDY -->
  <g fill="#FFFFFF">
    <circle cx="25" cy="30" r="1.2" class="twinkleStar" style="animation-delay: 0s"/>
    <circle cx="60" cy="15" r="0.8" class="twinkleStarSlow" style="animation-delay: 0.5s"/>
    <circle cx="100" cy="45" r="1" class="twinkleStar" style="animation-delay: 1.2s"/>
    <circle cx="160" cy="20" r="1.3" class="twinkleStar" style="animation-delay: 2s"/>
    <circle cx="210" cy="30" r="0.9" class="twinkleStarSlow" style="animation-delay: 0.8s"/>
    <circle cx="195" cy="65" r="1.1" class="twinkleStar" style="animation-delay: 1.5s"/>
    <circle cx="35" cy="80" r="0.7" class="twinkleStar" style="animation-delay: 2.5s"/>
    <circle cx="15" cy="130" r="1" class="twinkleStarSlow" style="animation-delay: 0.3s"/>
    <circle cx="50" cy="170" r="0.9" class="twinkleStar" style="animation-delay: 1.8s"/>
    <circle cx="90" cy="185" r="1.2" class="twinkleStar" style="animation-delay: 2.2s"/>
    <circle cx="140" cy="170" r="0.8" class="twinkleStarSlow" style="animation-delay: 0.6s"/>
    <circle cx="180" cy="185" r="1" class="twinkleStar" style="animation-delay: 1.1s"/>
    <circle cx="215" cy="140" r="1.3" class="twinkleStar" style="animation-delay: 2.8s"/>
    <circle cx="175" cy="105" r="0.9" class="twinkleStarSlow" style="animation-delay: 1.4s"/>
    <circle cx="55" cy="105" r="0.6" class="twinkleStar" style="animation-delay: 3s"/>
    <circle cx="135" cy="55" r="1.1" class="twinkleStar" style="animation-delay: 0.9s"/>
    <circle cx="80" cy="65" r="0.8" class="twinkleStarSlow" style="animation-delay: 1.7s"/>
    <circle cx="200" cy="95" r="0.7" class="twinkleStar" style="animation-delay: 2.3s"/>
  </g>

  <!-- KSIĘŻYC ZA CHMURĄ (przelotne przejaśnienie) -->
  <g class="moonMove">
    <circle cx="50" cy="65" r="32" fill="url(#moonGlow)" filter="url(#moonGlowFilter)"/>
    <circle cx="50" cy="65" r="20" fill="url(#moonCore)" filter="url(#moonGlowFilter)" opacity="0.95"/>
    <circle cx="50" cy="65" r="16" fill="url(#moonCore)"/>
    <!-- Kratery -->
    <circle cx="44" cy="59" r="3" fill="#CFD8DC" opacity="0.4"/>
    <circle cx="56" cy="67" r="2.5" fill="#CFD8DC" opacity="0.35"/>
    <circle cx="48" cy="72" r="2" fill="#CFD8DC" opacity="0.45"/>
    <!-- Odblaski -->
    <circle cx="44" cy="59" r="2" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="56" cy="63" r="1.5" fill="#FFFFFF" opacity="0.5"/>
    <circle cx="48" cy="72" r="1.5" fill="#FFFFFF" opacity="0.4"/>
  </g>

  <!-- BŁYSKAWICA NOCNA (ochłodzona, biało-niebieska) -->
  <g class="lightningNight">
    <path d="M 115,70 L 128,100 L 105,108 L 135,140 L 100,148 L 140,190" 
          fill="none" stroke="#A0D0FF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#lightningGlowNight)" class="lightningGlowNight"/>
    <path d="M 115,70 L 128,100 L 105,108 L 135,140 L 100,148 L 140,190" 
          fill="none" stroke="#80B0F0" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 115,70 L 128,100 L 105,108 L 135,140 L 100,148 L 140,190" 
          fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- CHMURA NOCNA (ciemna, burzowa) -->
  <g class="cloudMoveNight" filter="url(#cloudShadowNight)">
    <path d="M 40,115 
             C 40,95 60,82 78,88 
             C 88,68 120,60 138,75 
             C 152,68 175,76 182,96 
             C 198,98 205,110 198,124 
             C 192,136 170,138 158,132 
             L 65,134 
             C 48,136 38,130 40,115 Z" 
          fill="url(#cloudStormNight)"/>
    <!-- Subtelne rozjaśnienie krawędzi -->
    <path d="M 70,105 C 80,88 105,82 125,90 C 135,85 152,90 158,104 C 165,100 175,106 172,118 C 168,126 148,128 135,124 L 85,126 C 73,127 66,120 70,105 Z" 
          fill="#D0D8F0" opacity="0.08"/>
  </g>

  <!-- PŁATKI NOCNEGO ŚNIEGU – PRZELOTNE, LEKKIE (15 sztuk) -->
  <g filter="url(#snowBlurNight)">
    <circle cx="60" cy="130" r="3" fill="url(#snowFlakeNight)" class="snowNight s1"/>
    <circle cx="85" cy="125" r="2.5" fill="url(#snowFlakeNight)" class="snowNight s2"/>
    <circle cx="110" cy="135" r="3.5" fill="url(#snowFlakeNight)" class="snowNight s3"/>
    <circle cx="135" cy="128" r="2" fill="url(#snowFlakeNight)" class="snowNight s4"/>
    <circle cx="160" cy="132" r="3" fill="url(#snowFlakeNight)" class="snowNight s5"/>
    <circle cx="75" cy="145" r="2.5" fill="url(#snowFlakeNight)" class="snowNight s6"/>
    <circle cx="100" cy="140" r="3" fill="url(#snowFlakeNight)" class="snowNight s7"/>
    <circle cx="125" cy="148" r="2" fill="url(#snowFlakeNight)" class="snowNight s8"/>
    <circle cx="150" cy="142" r="3.5" fill="url(#snowFlakeNight)" class="snowNight s9"/>
    <circle cx="175" cy="138" r="2.5" fill="url(#snowFlakeNight)" class="snowNight s10"/>
    <circle cx="70" cy="155" r="2" fill="url(#snowFlakeNight)" class="snowNight s11"/>
    <circle cx="95" cy="160" r="3" fill="url(#snowFlakeNight)" class="snowNight s12"/>
    <circle cx="120" cy="152" r="2.5" fill="url(#snowFlakeNight)" class="snowNight s13"/>
    <circle cx="145" cy="158" r="3" fill="url(#snowFlakeNight)" class="snowNight s14"/>
    <circle cx="165" cy="150" r="2" fill="url(#snowFlakeNight)" class="snowNight s15"/>
  </g>

  <!-- LEKKIE ZAMGLENIE NOCNE PRZY PODŁOŻU -->
  <ellipse cx="115" cy="188" rx="80" ry="6" fill="#90CAF9" opacity="0.1" filter="url(#lightningGlowNight)"/>
</svg>