<svg width="233" height="200" viewBox="0 0 233 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- TŁO: NOCNY RADIALNY GRADIENT ZANIKAJĄCY DO PRZEZROCZYSTOŚCI -->
    <radialGradient id="bgNight" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#0D1B2A" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#1A237E" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#283593" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#64B5F6" stop-opacity="0"/>
    </radialGradient>

    <!-- CHMURA NOCNA: CIEMNIEJSZA, SREBRZYSTO-GRANATOWA -->
    <radialGradient id="cloudNight" cx="30%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#E0E7FF"/>
      <stop offset="45%" stop-color="#9FABC9"/>
      <stop offset="80%" stop-color="#5C6A92"/>
      <stop offset="100%" stop-color="#2C3A5E"/>
    </radialGradient>

    <!-- PŁATEK ŚNIEGU NOCNY – BIAŁY Z NIEBIESKIM CIENIEM -->
    <radialGradient id="snowflakeNight" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C0D8F0" stop-opacity="0.6"/>
    </radialGradient>

    <!-- FILTRY -->
    <filter id="cloudShadowNight" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0A1128" flood-opacity="0.5"/>
    </filter>
    <filter id="snowGlowNight" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
    <filter id="snowShadowNight" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0.5" dy="0.5" stdDeviation="0.5" flood-color="#0A1128" flood-opacity="0.5"/>
    </filter>
  </defs>

  <style>
    .bgLayerNight {
      animation: bgPulseNight 8s ease-in-out infinite;
    }
    .cloudMoveNight {
      animation: cloudFloatNight 5s ease-in-out infinite;
    }
    .snowflakeNight {
      animation: fallHeavySnowNight 2.8s ease-in-out infinite;
      filter: url(#snowShadowNight);
    }
    .twinkleStar { animation: twinkle 3s ease-in-out infinite; }
    .twinkleStarSlow { animation: twinkle 5s ease-in-out infinite; }
    
    /* Opóźnienia dla dużej liczby płatków – gęsto, co ~0,1–0,15s (zachowane) */
    .s1 { animation-delay: 0.00s; }
    .s2 { animation-delay: 0.10s; }
    .s3 { animation-delay: 0.20s; }
    .s4 { animation-delay: 0.30s; }
    .s5 { animation-delay: 0.40s; }
    .s6 { animation-delay: 0.50s; }
    .s7 { animation-delay: 0.60s; }
    .s8 { animation-delay: 0.70s; }
    .s9 { animation-delay: 0.80s; }
    .s10 { animation-delay: 0.90s; }
    .s11 { animation-delay: 1.00s; }
    .s12 { animation-delay: 1.10s; }
    .s13 { animation-delay: 1.20s; }
    .s14 { animation-delay: 1.30s; }
    .s15 { animation-delay: 1.40s; }
    .s16 { animation-delay: 1.50s; }
    .s17 { animation-delay: 1.60s; }
    .s18 { animation-delay: 1.70s; }
    .s19 { animation-delay: 1.80s; }
    .s20 { animation-delay: 1.90s; }
    .s21 { animation-delay: 2.00s; }
    .s22 { animation-delay: 2.10s; }
    .s23 { animation-delay: 2.20s; }
    .s24 { animation-delay: 2.30s; }
    .s25 { animation-delay: 2.40s; }
    .s26 { animation-delay: 2.50s; }
    .s27 { animation-delay: 0.05s; }
    .s28 { animation-delay: 0.15s; }
    .s29 { animation-delay: 0.25s; }
    .s30 { animation-delay: 0.35s; }
    .s31 { animation-delay: 0.45s; }
    .s32 { animation-delay: 0.55s; }
    .s33 { animation-delay: 0.65s; }
    .s34 { animation-delay: 0.75s; }
    .s35 { animation-delay: 0.85s; }
    .s36 { animation-delay: 0.95s; }
    .s37 { animation-delay: 1.05s; }
    .s38 { animation-delay: 1.15s; }
    .s39 { animation-delay: 1.25s; }
    .s40 { animation-delay: 1.35s; }
    .s41 { animation-delay: 1.45s; }
    .s42 { animation-delay: 1.55s; }
    .s43 { animation-delay: 1.65s; }
    .s44 { animation-delay: 1.75s; }
    .s45 { animation-delay: 1.85s; }
    .s46 { animation-delay: 1.95s; }
    .s47 { animation-delay: 2.05s; }
    .s48 { animation-delay: 2.15s; }
    .s49 { animation-delay: 2.25s; }
    .s50 { animation-delay: 2.35s; }

    @keyframes bgPulseNight {
      0%,100% { opacity: 0.85; }
      50% { opacity: 1; }
    }
    @keyframes cloudFloatNight {
      0%,100% { transform: translateX(0) translateY(0); }
      50% { transform: translateX(-4px) translateY(-3px); }
    }
    @keyframes fallHeavySnowNight {
      0% { transform: translateY(-20px) translateX(0) rotate(0deg); opacity: 0; }
      20% { opacity: 0.9; }
      80% { opacity: 0.7; }
      100% { transform: translateY(60px) translateX(-10px) rotate(540deg); opacity: 0; }
    }
    @keyframes twinkle {
      0%,100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }
  </style>

  <!-- TŁO NOCNE -->
  <rect width="233" height="200" fill="url(#bgNight)" class="bgLayerNight"/>

  <!-- GWIAZDY -->
  <g fill="#FFFFFF">
    <circle cx="25" cy="30" r="1.2" class="twinkleStar" style="animation-delay: 0s"/>
    <circle cx="60" cy="15" r="0.8" class="twinkleStarSlow" style="animation-delay: 0.5s"/>
    <circle cx="100" cy="45" r="1" class="twinkleStar" style="animation-delay: 1.2s"/>
    <circle cx="160" cy="20" r="1.3" class="twinkleStar" style="animation-delay: 2s"/>
    <circle cx="210" cy="30" r="0.9" class="twinkleStarSlow" style="animation-delay: 0.8s"/>
    <circle cx="195" cy="65" r="1.1" class="twinkleStar" style="animation-delay: 1.5s"/>
    <circle cx="35" cy="80" r="0.7" class="twinkleStar" style="animation-delay: 2.5s"/>
    <circle cx="15" cy="130" r="1" class="twinkleStarSlow" style="animation-delay: 0.3s"/>
    <circle cx="50" cy="170" r="0.9" class="twinkleStar" style="animation-delay: 1.8s"/>
    <circle cx="90" cy="185" r="1.2" class="twinkleStar" style="animation-delay: 2.2s"/>
    <circle cx="140" cy="170" r="0.8" class="twinkleStarSlow" style="animation-delay: 0.6s"/>
    <circle cx="180" cy="185" r="1" class="twinkleStar" style="animation-delay: 1.1s"/>
    <circle cx="215" cy="140" r="1.3" class="twinkleStar" style="animation-delay: 2.8s"/>
    <circle cx="175" cy="105" r="0.9" class="twinkleStarSlow" style="animation-delay: 1.4s"/>
    <circle cx="55" cy="105" r="0.6" class="twinkleStar" style="animation-delay: 3s"/>
    <circle cx="135" cy="55" r="1.1" class="twinkleStar" style="animation-delay: 0.9s"/>
    <circle cx="80" cy="65" r="0.8" class="twinkleStarSlow" style="animation-delay: 1.7s"/>
    <circle cx="200" cy="95" r="0.7" class="twinkleStar" style="animation-delay: 2.3s"/>
  </g>

  <!-- CHMURA NOCNA -->
  <g class="cloudMoveNight" filter="url(#cloudShadowNight)">
    <path d="M 50,115 
             C 50,95 70,85 85,90 
             C 95,70 125,65 140,80 
             C 155,75 175,85 180,105 
             C 195,105 200,115 195,125 
             C 190,135 170,135 160,130 
             L 70,130 
             C 55,130 45,125 50,115 Z" 
          fill="url(#cloudNight)"/>
    <path d="M 70,105 C 80,90 105,85 125,93 C 135,88 152,92 158,106 C 165,102 175,108 172,118 C 168,126 148,128 135,124 L 85,126 C 73,127 66,120 70,105 Z" 
          fill="#D0D8F0" opacity="0.3"/>
  </g>

  <!-- PŁATKI NOCNEGO ŚNIEGU – OBFTE OPADY (50 sztuk, różne rozmiary) -->
  <g filter="url(#snowGlowNight)">
    <!-- Warstwa 1: duże płatki (r=3-3.5) -->
    <circle class="snowflakeNight s1" cx="80" cy="138" r="3.5" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s2" cx="110" cy="142" r="3" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s3" cx="140" cy="136" r="3.5" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s4" cx="170" cy="140" r="3" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s5" cx="100" cy="148" r="3.5" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s6" cx="130" cy="145" r="3" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s7" cx="160" cy="150" r="3.5" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s8" cx="90" cy="155" r="3" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s9" cx="120" cy="158" r="3.5" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s10" cx="150" cy="162" r="3" fill="url(#snowflakeNight)"/>

    <!-- Warstwa 2: średnie płatki (r=2.5) -->
    <circle class="snowflakeNight s11" cx="75" cy="165" r="2.5" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s12" cx="105" cy="170" r="2.5" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s13" cx="135" cy="168" r="2.5" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s14" cx="165" cy="175" r="2.5" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s15" cx="85" cy="178" r="2.5" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s16" cx="115" cy="182" r="2.5" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s17" cx="145" cy="180" r="2.5" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s18" cx="95" cy="185" r="2.5" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s19" cx="125" cy="188" r="2.5" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s20" cx="155" cy="190" r="2.5" fill="url(#snowflakeNight)"/>

    <!-- Warstwa 3: małe płatki (r=2) oraz dodatkowe -->
    <circle class="snowflakeNight s21" cx="70" cy="148" r="2" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s22" cx="95" cy="140" r="2" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s23" cx="125" cy="152" r="2" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s24" cx="155" cy="145" r="2" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s25" cx="80" cy="172" r="2" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s26" cx="110" cy="175" r="2" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s27" cx="140" cy="178" r="2" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s28" cx="170" cy="168" r="2" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s29" cx="100" cy="190" r="2" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s30" cx="130" cy="192" r="2" fill="url(#snowflakeNight)"/>

    <!-- Dodatkowe płatki dla większego zagęszczenia (20 sztuk) -->
    <circle class="snowflakeNight s31" cx="78" cy="135" r="2.5" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s32" cx="108" cy="133" r="3" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s33" cx="138" cy="140" r="2" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s34" cx="168" cy="138" r="3" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s35" cx="88" cy="145" r="2" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s36" cx="118" cy="148" r="3.5" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s37" cx="148" cy="155" r="2" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s38" cx="73" cy="160" r="3" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s39" cx="103" cy="163" r="2.5" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s40" cx="133" cy="166" r="2" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s41" cx="163" cy="172" r="3" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s42" cx="93" cy="180" r="2.5" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s43" cx="123" cy="185" r="2" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s44" cx="153" cy="188" r="3" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s45" cx="83" cy="190" r="2" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s46" cx="113" cy="193" r="2.5" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s47" cx="143" cy="195" r="2" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s48" cx="173" cy="185" r="3" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s49" cx="98" cy="195" r="2.5" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s50" cx="128" cy="198" r="2" fill="url(#snowflakeNight)"/>
  </g>

  <!-- GRUBA WARSTWA ŚNIEGU NOCNEGO PRZY PODŁOŻU (rozmyta) -->
  <ellipse cx="115" cy="190" rx="90" ry="8" fill="#90CAF9" opacity="0.2" filter="url(#snowGlowNight)"/>
  <ellipse cx="115" cy="196" rx="65" ry="5" fill="#B0C4DE" opacity="0.15" filter="url(#snowGlowNight)"/>
</svg>