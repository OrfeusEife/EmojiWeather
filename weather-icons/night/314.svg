<svg width="233" height="200" viewBox="0 0 233 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- TŁO: NOCNY RADIALNY GRADIENT ZANIKAJĄCY DO PRZEZROCZYSTOŚCI -->
    <radialGradient id="bgNight" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#0D1B2A" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#1A237E" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#283593" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#64B5F6" stop-opacity="0"/>
    </radialGradient>

    <!-- CHMURA NOCNA: CIEMNIEJSZA, SREBRZYSTO-GRANATOWA -->
    <radialGradient id="cloudNight" cx="30%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#E0E7FF"/>
      <stop offset="45%" stop-color="#9FABC9"/>
      <stop offset="80%" stop-color="#5C6A92"/>
      <stop offset="100%" stop-color="#2C3A5E"/>
    </radialGradient>

    <!-- KRYSTYDEK LODU (RÓMB) – NOCNY, BIAŁO-NIEBIESKI -->
    <linearGradient id="iceDiamondNight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#C0D8F0"/>
      <stop offset="100%" stop-color="#8098C0"/>
    </linearGradient>

    <!-- FILTRY -->
    <filter id="cloudShadowNight" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0A1128" flood-opacity="0.6"/>
    </filter>
    <filter id="iceGlowNight" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.2"/>
    </filter>
  </defs>

  <style>
    .bgLayerNight {
      animation: bgPulseNight 8s ease-in-out infinite;
    }
    .cloudMoveNight {
      animation: cloudFloatNight 5s ease-in-out infinite;
    }
    .twinkleStar { animation: twinkle 3s ease-in-out infinite; }
    .twinkleStarSlow { animation: twinkle 5s ease-in-out infinite; }
    
    /* Trzy rodzaje animacji – różne kierunki przesunięcia (nocne, nieco mniejsza jasność) */
    .iceLeft {
      animation: fallIceLeftNight 2.2s linear infinite;
    }
    .iceStraight {
      animation: fallIceStraightNight 2.0s linear infinite;
    }
    .iceRight {
      animation: fallIceRightNight 2.4s linear infinite;
    }
    /* Opóźnienia zachowane */
    .d1 { animation-delay: 0s; }
    .d2 { animation-delay: 0.1s; }
    .d3 { animation-delay: 0.2s; }
    .d4 { animation-delay: 0.3s; }
    .d5 { animation-delay: 0.4s; }
    .d6 { animation-delay: 0.5s; }
    .d7 { animation-delay: 0.6s; }
    .d8 { animation-delay: 0.7s; }
    .d9 { animation-delay: 0.8s; }
    .d10 { animation-delay: 0.9s; }
    .d11 { animation-delay: 1.0s; }
    .d12 { animation-delay: 1.1s; }
    .d13 { animation-delay: 1.2s; }
    .d14 { animation-delay: 1.3s; }
    .d15 { animation-delay: 1.4s; }
    .d16 { animation-delay: 1.5s; }
    .d17 { animation-delay: 1.6s; }
    .d18 { animation-delay: 1.7s; }
    .d19 { animation-delay: 1.8s; }
    .d20 { animation-delay: 1.9s; }

    @keyframes bgPulseNight {
      0%,100% { opacity: 0.85; }
      50% { opacity: 1; }
    }
    @keyframes cloudFloatNight {
      0%,100% { transform: translateX(0) translateY(0); }
      50% { transform: translateX(-3px) translateY(-2px); }
    }
    @keyframes twinkle {
      0%,100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }
    
    /* Nocne wersje animacji – niższa maksymalna przezroczystość */
    @keyframes fallIceLeftNight {
      0% { transform: translate(0px, -25px); opacity: 0; }
      20% { opacity: 0.8; }
      80% { opacity: 0.7; }
      100% { transform: translate(-12px, 55px); opacity: 0; }
    }
    @keyframes fallIceStraightNight {
      0% { transform: translate(0px, -20px); opacity: 0; }
      20% { opacity: 0.8; }
      80% { opacity: 0.7; }
      100% { transform: translate(0px, 50px); opacity: 0; }
    }
    @keyframes fallIceRightNight {
      0% { transform: translate(0px, -30px); opacity: 0; }
      20% { opacity: 0.8; }
      80% { opacity: 0.7; }
      100% { transform: translate(12px, 60px); opacity: 0; }
    }
  </style>

  <!-- TŁO NOCNE -->
  <rect width="233" height="200" fill="url(#bgNight)" class="bgLayerNight"/>

  <!-- GWIAZDY -->
  <g fill="#FFFFFF">
    <circle cx="25" cy="30" r="1.2" class="twinkleStar" style="animation-delay: 0s"/>
    <circle cx="60" cy="15" r="0.8" class="twinkleStarSlow" style="animation-delay: 0.5s"/>
    <circle cx="100" cy="45" r="1" class="twinkleStar" style="animation-delay: 1.2s"/>
    <circle cx="160" cy="20" r="1.3" class="twinkleStar" style="animation-delay: 2s"/>
    <circle cx="210" cy="30" r="0.9" class="twinkleStarSlow" style="animation-delay: 0.8s"/>
    <circle cx="195" cy="65" r="1.1" class="twinkleStar" style="animation-delay: 1.5s"/>
    <circle cx="35" cy="80" r="0.7" class="twinkleStar" style="animation-delay: 2.5s"/>
    <circle cx="15" cy="130" r="1" class="twinkleStarSlow" style="animation-delay: 0.3s"/>
    <circle cx="50" cy="170" r="0.9" class="twinkleStar" style="animation-delay: 1.8s"/>
    <circle cx="90" cy="185" r="1.2" class="twinkleStar" style="animation-delay: 2.2s"/>
    <circle cx="140" cy="170" r="0.8" class="twinkleStarSlow" style="animation-delay: 0.6s"/>
    <circle cx="180" cy="185" r="1" class="twinkleStar" style="animation-delay: 1.1s"/>
    <circle cx="215" cy="140" r="1.3" class="twinkleStar" style="animation-delay: 2.8s"/>
    <circle cx="175" cy="105" r="0.9" class="twinkleStarSlow" style="animation-delay: 1.4s"/>
    <circle cx="55" cy="105" r="0.6" class="twinkleStar" style="animation-delay: 3s"/>
    <circle cx="135" cy="55" r="1.1" class="twinkleStar" style="animation-delay: 0.9s"/>
    <circle cx="80" cy="65" r="0.8" class="twinkleStarSlow" style="animation-delay: 1.7s"/>
    <circle cx="200" cy="95" r="0.7" class="twinkleStar" style="animation-delay: 2.3s"/>
  </g>

  <!-- CHMURA NOCNA -->
  <g class="cloudMoveNight" filter="url(#cloudShadowNight)">
    <path d="M 50,115 
             C 50,95 70,85 85,90 
             C 95,70 125,65 140,80 
             C 155,75 175,85 180,105 
             C 195,105 200,115 195,125 
             C 190,135 170,135 160,130 
             L 70,130 
             C 55,130 45,125 50,115 Z" 
          fill="url(#cloudNight)"/>
    <path d="M 70,105 C 80,90 105,85 125,93 C 135,88 152,92 158,106 C 165,102 175,108 172,118 C 168,126 148,128 135,124 L 85,126 C 73,127 66,120 70,105 Z" 
          fill="#D0D8F0" opacity="0.3"/>
  </g>

  <!-- KROPLE MARZNĄCEGO DESZCZU – ROMBY, UMIARKOWANE/MOCNE (20 SZTUK), NOCNE -->
  <g filter="url(#iceGlowNight)">
    <!-- iceLeft -->
    <polygon points="85,136 90,142 85,148 80,142" fill="url(#iceDiamondNight)" class="iceLeft d1"/>
    <polygon points="115,140 120,146 115,152 110,146" fill="url(#iceDiamondNight)" class="iceLeft d6"/>
    <polygon points="145,134 150,140 145,146 140,140" fill="url(#iceDiamondNight)" class="iceLeft d11"/>
    <polygon points="170,142 175,148 170,154 165,148" fill="url(#iceDiamondNight)" class="iceLeft d16"/>
    <polygon points="95,150 100,156 95,162 90,156" fill="url(#iceDiamondNight)" class="iceLeft d4"/>
    <polygon points="130,148 135,154 130,160 125,154" fill="url(#iceDiamondNight)" class="iceLeft d9"/>
    <polygon points="160,138 165,144 160,150 155,144" fill="url(#iceDiamondNight)" class="iceLeft d14"/>

    <!-- iceStraight -->
    <polygon points="100,134 105,140 100,146 95,140" fill="url(#iceDiamondNight)" class="iceStraight d2"/>
    <polygon points="125,138 130,144 125,150 120,144" fill="url(#iceDiamondNight)" class="iceStraight d7"/>
    <polygon points="150,142 155,148 150,154 145,148" fill="url(#iceDiamondNight)" class="iceStraight d12"/>
    <polygon points="80,146 85,152 80,158 75,152" fill="url(#iceDiamondNight)" class="iceStraight d17"/>
    <polygon points="110,152 115,158 110,164 105,158" fill="url(#iceDiamondNight)" class="iceStraight d5"/>
    <polygon points="140,150 145,156 140,162 135,156" fill="url(#iceDiamondNight)" class="iceStraight d10"/>
    <polygon points="165,148 170,154 165,160 160,154" fill="url(#iceDiamondNight)" class="iceStraight d15"/>

    <!-- iceRight -->
    <polygon points="90,138 95,144 90,150 85,144" fill="url(#iceDiamondNight)" class="iceRight d3"/>
    <polygon points="120,132 125,138 120,144 115,138" fill="url(#iceDiamondNight)" class="iceRight d8"/>
    <polygon points="155,140 160,146 155,152 150,146" fill="url(#iceDiamondNight)" class="iceRight d13"/>
    <polygon points="105,144 110,150 105,156 100,150" fill="url(#iceDiamondNight)" class="iceRight d18"/>
    <polygon points="135,146 140,152 135,158 130,152" fill="url(#iceDiamondNight)" class="iceRight d5"/>
    <polygon points="165,152 170,158 165,164 160,158" fill="url(#iceDiamondNight)" class="iceRight d20"/>
    <polygon points="80,154 85,160 80,166 75,160" fill="url(#iceDiamondNight)" class="iceRight d19"/>
  </g>

  <!-- INTENSYWNA SZADŹ / LODOWA MGIEŁKA NOCNA PRZY PODŁOŻU -->
  <ellipse cx="115" cy="188" rx="90" ry="7" fill="#90CAF9" opacity="0.2" filter="url(#iceGlowNight)"/>
  <ellipse cx="115" cy="193" rx="65" ry="4" fill="#FFFFFF" opacity="0.1" filter="url(#iceGlowNight)"/>
  <ellipse cx="115" cy="196" rx="40" ry="2" fill="#B0C4DE" opacity="0.15" filter="url(#iceGlowNight)"/>
</svg>