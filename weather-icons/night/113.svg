<svg width="233" height="200" viewBox="0 0 233 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- TŁO: NOCNY GRADIENT ZANIKAJĄCY DO PRZEZROCZYSTOŚCI -->
    <radialGradient id="bgNightGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0D1B2A" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#1A237E" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#283593" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#64B5F6" stop-opacity="0"/>
    </radialGradient>

    <!-- KSIĘŻYC: SREBRZYSTA POŚWIATA -->
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E3F2FD" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#90CAF9" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1A237E" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="moonCore" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#B0BEC5"/>
    </linearGradient>

    <!-- FILTRY -->
    <filter id="moonGlowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0"/>
    </filter>
  </defs>

  <style>
    .moonPulse {
      animation: moonPulseNight 4s ease-in-out infinite;
      transform-origin: 116px 100px;
    }
    .twinkleStar {
      animation: twinkle 3s ease-in-out infinite;
    }
    .twinkleStarSlow {
      animation: twinkle 5s ease-in-out infinite;
    }

    @keyframes moonPulseNight {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes twinkle {
      0%,100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }
  </style>

  <!-- TŁO NOCNE Z PRZEZROCZYSTYMI KRAWĘDZIAMI -->
  <rect width="233" height="200" fill="url(#bgNightGlow)"/>

  <!-- GWIAZDY TŁA (ROZPROSZONE) -->
  <g fill="#FFFFFF">
    <circle cx="25" cy="30" r="1" class="twinkleStar" style="animation-delay: 0s"/>
    <circle cx="55" cy="15" r="0.8" class="twinkleStarSlow" style="animation-delay: 0.5s"/>
    <circle cx="90" cy="40" r="1.2" class="twinkleStar" style="animation-delay: 1.2s"/>
    <circle cx="150" cy="20" r="1" class="twinkleStar" style="animation-delay: 2s"/>
    <circle cx="200" cy="35" r="1.3" class="twinkleStarSlow" style="animation-delay: 0.8s"/>
    <circle cx="215" cy="70" r="0.9" class="twinkleStar" style="animation-delay: 1.5s"/>
    <circle cx="30" cy="80" r="1.1" class="twinkleStar" style="animation-delay: 2.5s"/>
    <circle cx="15" cy="130" r="0.8" class="twinkleStarSlow" style="animation-delay: 0.3s"/>
    <circle cx="45" cy="170" r="1" class="twinkleStar" style="animation-delay: 1.8s"/>
    <circle cx="80" cy="185" r="0.9" class="twinkleStar" style="animation-delay: 2.2s"/>
    <circle cx="130" cy="175" r="1.2" class="twinkleStarSlow" style="animation-delay: 0.6s"/>
    <circle cx="170" cy="190" r="0.7" class="twinkleStar" style="animation-delay: 1.1s"/>
    <circle cx="210" cy="160" r="1" class="twinkleStar" style="animation-delay: 2.8s"/>
    <circle cx="195" cy="120" r="0.8" class="twinkleStarSlow" style="animation-delay: 1.4s"/>
    <circle cx="65" cy="110" r="0.6" class="twinkleStar" style="animation-delay: 3s"/>
    <circle cx="180" cy="80" r="1.1" class="twinkleStar" style="animation-delay: 0.9s"/>
  </g>

  <!-- POŚWIATA KSIĘŻYCA -->
  <circle cx="116" cy="100" r="55" fill="url(#moonGlow)" filter="url(#moonGlowFilter)"/>

  <!-- KSIĘŻYC -->
  <g class="moonPulse">
    <circle cx="116" cy="100" r="30" fill="url(#moonCore)" filter="url(#moonGlowFilter)" opacity="0.95"/>
    <circle cx="116" cy="100" r="26" fill="url(#moonCore)"/>

    <!-- KRATERY -->
    <circle cx="106" cy="90" r="5" fill="#CFD8DC" opacity="0.35"/>
    <circle cx="124" cy="108" r="4.5" fill="#CFD8DC" opacity="0.3"/>
    <circle cx="112" cy="115" r="3" fill="#CFD8DC" opacity="0.4"/>
    <circle cx="130" cy="86" r="2.5" fill="#CFD8DC" opacity="0.25"/>
    <circle cx="100" cy="108" r="2" fill="#CFD8DC" opacity="0.35"/>
    <circle cx="120" cy="92" r="2" fill="#CFD8DC" opacity="0.3"/>

    <!-- ODBLASKI -->
    <circle cx="103" cy="94" r="3" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="125" cy="100" r="2.5" fill="#FFFFFF" opacity="0.4"/>
    <circle cx="114" cy="84" r="2" fill="#FFFFFF" opacity="0.5"/>
  </g>

  <!-- JASKRAWE GWIAZDY PIERWSZEGO PLANU -->
  <g fill="#FFFFFF" opacity="0.9">
    <path d="M40,50 L41.5,55 L46.5,55 L42.5,58 L44,63 L40,60 L36,63 L37.5,58 L33.5,55 L38.5,55 Z" class="twinkleStar" style="animation-delay: 0.4s"/>
    <path d="M190,145 L191.5,150 L196.5,150 L192.5,153 L194,158 L190,155 L186,158 L187.5,153 L183.5,150 L188.5,150 Z" class="twinkleStarSlow" style="animation-delay: 1.6s"/>
    <path d="M70,170 L71.5,175 L76.5,175 L72.5,178 L74,183 L70,180 L66,183 L67.5,178 L63.5,175 L68.5,175 Z" class="twinkleStar" style="animation-delay: 2.3s"/>
    <path d="M205,50 L206.5,55 L211.5,55 L207.5,58 L209,63 L205,60 L201,63 L202.5,58 L198.5,55 L203.5,55 Z" class="twinkleStar" style="animation-delay: 1s"/>
    <path d="M145,30 L146,33 L149,33 L147,35 L148,38 L145,36 L142,38 L143,35 L141,33 L144,33 Z" class="twinkleStarSlow" style="animation-delay: 2.7s"/>
  </g>
</svg>