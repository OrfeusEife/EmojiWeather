<svg width="233" height="200" viewBox="0 0 233 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- TŁO: NOCNY RADIALNY GRADIENT ZANIKAJĄCY DO PRZEZROCZYSTOŚCI -->
    <radialGradient id="bgNight" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#0D1B2A" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#1A237E" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#283593" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#64B5F6" stop-opacity="0"/>
    </radialGradient>

    <!-- KSIĘŻYC: SREBRZYSTA POŚWIATA -->
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E3F2FD" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#90CAF9" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1A237E" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="moonCore" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#B0BEC5"/>
    </linearGradient>

    <!-- CHMURA NOCNA: CIEMNIEJSZA, SREBRZYSTO-GRANATOWA -->
    <radialGradient id="cloudNight" cx="30%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#E0E7FF"/>
      <stop offset="45%" stop-color="#9FABC9"/>
      <stop offset="80%" stop-color="#5C6A92"/>
      <stop offset="100%" stop-color="#2C3A5E"/>
    </radialGradient>

    <!-- KROPLA DESZCZU NOCNA (srebrzysto-niebieska) -->
    <linearGradient id="rainNight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B0C4DE"/>
      <stop offset="100%" stop-color="#607D8B"/>
    </linearGradient>

    <!-- PŁATEK ŚNIEGU NOCNY (chłodny, z lekkim błękitem) -->
    <radialGradient id="snowflakeNight" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C0D8F0" stop-opacity="0.6"/>
    </radialGradient>

    <!-- FILTRY -->
    <filter id="moonGlowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="cloudShadowNight" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0A1128" flood-opacity="0.5"/>
    </filter>
    <filter id="snowGlowNight" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
    <filter id="snowShadowNight" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0.5" dy="0.5" stdDeviation="0.5" flood-color="#0A1128" flood-opacity="0.5"/>
    </filter>
  </defs>

  <style>
    .bgLayerNight {
      animation: bgPulseNight 8s ease-in-out infinite;
    }
    /* KSIĘŻYC – WYCHODZI I CHOWA SIĘ ZA CHMURĄ */
    .moonMove {
      animation: slideBehindCloudNight 10s ease-in-out infinite alternate;
      transform-origin: 75px 70px;
    }
    .cloudMoveNight {
      animation: cloudFloatNight 6s ease-in-out infinite;
    }
    /* KROPLA DESZCZU (szybsza) */
    .rainNight {
      animation: fallRainNight 1.8s ease-in infinite;
    }
    /* PŁATEK ŚNIEGU (wolniejszy, z wirowaniem) */
    .snowflakeNight {
      animation: fallSnowNight 3.5s ease-in-out infinite;
      filter: url(#snowShadowNight);
    }
    .twinkleStar { animation: twinkle 3s ease-in-out infinite; }
    .twinkleStarSlow { animation: twinkle 5s ease-in-out infinite; }

    /* Opóźnienia dla deszczu (10 kropli) */
    .r1 { animation-delay: 0.0s; }
    .r2 { animation-delay: 0.2s; }
    .r3 { animation-delay: 0.4s; }
    .r4 { animation-delay: 0.6s; }
    .r5 { animation-delay: 0.8s; }
    .r6 { animation-delay: 1.0s; }
    .r7 { animation-delay: 1.2s; }
    .r8 { animation-delay: 1.4s; }
    .r9 { animation-delay: 0.1s; }
    .r10 { animation-delay: 0.5s; }

    /* Opóźnienia dla śniegu (15 płatków) */
    .s1 { animation-delay: 0.0s; }
    .s2 { animation-delay: 0.3s; }
    .s3 { animation-delay: 0.6s; }
    .s4 { animation-delay: 0.9s; }
    .s5 { animation-delay: 1.2s; }
    .s6 { animation-delay: 1.5s; }
    .s7 { animation-delay: 1.8s; }
    .s8 { animation-delay: 2.1s; }
    .s9 { animation-delay: 2.4s; }
    .s10 { animation-delay: 2.7s; }
    .s11 { animation-delay: 0.15s; }
    .s12 { animation-delay: 0.45s; }
    .s13 { animation-delay: 0.75s; }
    .s14 { animation-delay: 1.05s; }
    .s15 { animation-delay: 1.35s; }

    @keyframes bgPulseNight {
      0%,100% { opacity: 0.85; }
      50% { opacity: 1; }
    }
    @keyframes slideBehindCloudNight {
      0% { transform: translateX(0); }
      100% { transform: translateX(75px); }
    }
    @keyframes cloudFloatNight {
      0%,100% { transform: translateX(0) translateY(0); }
      50% { transform: translateX(-3px) translateY(-2px); }
    }
    @keyframes fallRainNight {
      0% { transform: translateY(-25px) translateX(0); opacity: 0; }
      20% { opacity: 0.7; }
      80% { opacity: 0.8; }
      100% { transform: translateY(55px) translateX(-8px); opacity: 0; }
    }
    @keyframes fallSnowNight {
      0% { transform: translateY(-20px) translateX(0) rotate(0deg); opacity: 0; }
      20% { opacity: 0.9; }
      80% { opacity: 0.8; }
      100% { transform: translateY(50px) translateX(-6px) rotate(360deg); opacity: 0; }
    }
    @keyframes twinkle {
      0%,100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }
  </style>

  <!-- TŁO NOCNE -->
  <rect width="233" height="200" fill="url(#bgNight)" class="bgLayerNight"/>

  <!-- GWIAZDY -->
  <g fill="#FFFFFF">
    <circle cx="25" cy="30" r="1.2" class="twinkleStar" style="animation-delay: 0s"/>
    <circle cx="60" cy="15" r="0.8" class="twinkleStarSlow" style="animation-delay: 0.5s"/>
    <circle cx="100" cy="45" r="1" class="twinkleStar" style="animation-delay: 1.2s"/>
    <circle cx="160" cy="20" r="1.3" class="twinkleStar" style="animation-delay: 2s"/>
    <circle cx="210" cy="30" r="0.9" class="twinkleStarSlow" style="animation-delay: 0.8s"/>
    <circle cx="195" cy="65" r="1.1" class="twinkleStar" style="animation-delay: 1.5s"/>
    <circle cx="35" cy="80" r="0.7" class="twinkleStar" style="animation-delay: 2.5s"/>
    <circle cx="15" cy="130" r="1" class="twinkleStarSlow" style="animation-delay: 0.3s"/>
    <circle cx="50" cy="170" r="0.9" class="twinkleStar" style="animation-delay: 1.8s"/>
    <circle cx="90" cy="185" r="1.2" class="twinkleStar" style="animation-delay: 2.2s"/>
    <circle cx="140" cy="170" r="0.8" class="twinkleStarSlow" style="animation-delay: 0.6s"/>
    <circle cx="180" cy="185" r="1" class="twinkleStar" style="animation-delay: 1.1s"/>
    <circle cx="215" cy="140" r="1.3" class="twinkleStar" style="animation-delay: 2.8s"/>
    <circle cx="175" cy="105" r="0.9" class="twinkleStarSlow" style="animation-delay: 1.4s"/>
    <circle cx="55" cy="105" r="0.6" class="twinkleStar" style="animation-delay: 3s"/>
    <circle cx="135" cy="55" r="1.1" class="twinkleStar" style="animation-delay: 0.9s"/>
    <circle cx="80" cy="65" r="0.8" class="twinkleStarSlow" style="animation-delay: 1.7s"/>
    <circle cx="200" cy="95" r="0.7" class="twinkleStar" style="animation-delay: 2.3s"/>
  </g>

  <!-- KSIĘŻYC (RUCHOMY, CHOWA SIĘ ZA CHMURĄ) -->
  <g class="moonMove">
    <circle cx="75" cy="70" r="38" fill="url(#moonGlow)" filter="url(#moonGlowFilter)"/>
    <circle cx="75" cy="70" r="24" fill="url(#moonCore)" filter="url(#moonGlowFilter)" opacity="0.95"/>
    <circle cx="75" cy="70" r="20" fill="url(#moonCore)"/>
    <!-- Kratery -->
    <circle cx="68" cy="64" r="3.5" fill="#CFD8DC" opacity="0.35"/>
    <circle cx="82" cy="72" r="3" fill="#CFD8DC" opacity="0.3"/>
    <circle cx="73" cy="78" r="2.5" fill="#CFD8DC" opacity="0.4"/>
    <!-- Odblaski -->
    <circle cx="68" cy="63" r="3" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="82" cy="68" r="2.5" fill="#FFFFFF" opacity="0.5"/>
    <circle cx="72" cy="78" r="2" fill="#FFFFFF" opacity="0.4"/>
  </g>

  <!-- CHMURA NOCNA – RYSOWANA PO KSIĘŻYCU, BY GO ZASŁANIAĆ -->
  <g class="cloudMoveNight" filter="url(#cloudShadowNight)">
    <path d="M 50,115 
             C 50,95 70,85 85,90 
             C 95,70 125,65 140,80 
             C 155,75 175,85 180,105 
             C 195,105 200,115 195,125 
             C 190,135 170,135 160,130 
             L 70,130 
             C 55,130 45,125 50,115 Z" 
          fill="url(#cloudNight)"/>
    <path d="M 70,105 C 80,90 105,85 125,93 C 135,88 152,92 158,106 C 165,102 175,108 172,118 C 168,126 148,128 135,124 L 85,126 C 73,127 66,120 70,105 Z" 
          fill="#D0D8F0" opacity="0.3"/>
  </g>

  <!-- KROPLE NOCNEGO DESZCZU (10 sztuk) -->
  <g>
    <path class="rainNight r1" d="M 90 138 C 90 138 86 145 86 148 C 86 151 88 153 90 153 C 92 153 94 151 94 148 C 94 145 90 138 90 138 Z" fill="url(#rainNight)"/>
    <path class="rainNight r2" d="M 115 142 C 115 142 111 149 111 152 C 111 155 113 157 115 157 C 117 157 119 155 119 152 C 119 149 115 142 115 142 Z" fill="url(#rainNight)"/>
    <path class="rainNight r3" d="M 140 136 C 140 136 136 143 136 146 C 136 149 138 151 140 151 C 142 151 144 149 144 146 C 144 143 140 136 140 136 Z" fill="url(#rainNight)"/>
    <path class="rainNight r8" d="M 80 152 C 80 152 76 159 76 162 C 76 165 78 167 80 167 C 82 167 84 165 84 162 C 84 159 80 152 80 152 Z" fill="url(#rainNight)"/>
    <path class="rainNight r9" d="M 120 155 C 120 155 116 162 116 165 C 116 168 118 170 120 170 C 122 170 124 168 124 165 C 124 162 120 155 120 155 Z" fill="url(#rainNight)"/>
    <path class="rainNight r10" d="M 145 160 C 145 160 141 167 141 170 C 141 173 143 175 145 175 C 147 175 149 173 149 170 C 149 167 145 160 145 160 Z" fill="url(#rainNight)"/>
  </g>

  <!-- PŁATKI NOCNEGO ŚNIEGU (15 sztuk) -->
  <g filter="url(#snowGlowNight)">
    <circle class="snowflakeNight s1" cx="95" cy="140" r="2.5" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s2" cx="120" cy="144" r="2" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s3" cx="145" cy="138" r="2.5" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s4" cx="170" cy="142" r="2" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s5" cx="100" cy="150" r="2.5" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s6" cx="125" cy="148" r="2" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s7" cx="150" cy="152" r="2.5" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s8" cx="85" cy="155" r="2" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s9" cx="110" cy="158" r="2.5" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s10" cx="135" cy="162" r="2" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s11" cx="160" cy="165" r="2.5" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s12" cx="90" cy="168" r="2" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s13" cx="115" cy="172" r="2.5" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s14" cx="140" cy="170" r="2" fill="url(#snowflakeNight)"/>
    <circle class="snowflakeNight s15" cx="165" cy="175" r="2.5" fill="url(#snowflakeNight)"/>
  </g>

  <!-- MGIEŁKA NOCNA PRZY PODŁOŻU -->
  <ellipse cx="115" cy="188" rx="80" ry="6" fill="#90CAF9" opacity="0.15" filter="url(#moonGlowFilter)"/>
</svg>