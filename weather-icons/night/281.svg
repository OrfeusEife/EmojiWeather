<svg width="233" height="200" viewBox="0 0 233 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- TŁO: NOCNY RADIALNY GRADIENT ZANIKAJĄCY DO PRZEZROCZYSTOŚCI -->
    <radialGradient id="bgNight" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#0D1B2A" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#1A237E" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#283593" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#64B5F6" stop-opacity="0"/>
    </radialGradient>

    <!-- CHMURA NOCNA: CIEMNIEJSZA, SREBRZYSTO-GRANATOWA -->
    <radialGradient id="cloudWinterNight" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#6C7A9E"/>
      <stop offset="60%" stop-color="#4A5A82"/>
      <stop offset="100%" stop-color="#2C3A5E"/>
    </radialGradient>

    <!-- KROPELKI MŻAWKI NOCNEJ (lodowate, srebrzysto-niebieskie) -->
    <radialGradient id="iceDropNight" cx="30%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#C0D8F0"/>
      <stop offset="100%" stop-color="#8098C0"/>
    </radialGradient>

    <!-- FILTRY -->
    <filter id="iceGlowNight" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
    <filter id="dropShadowNight" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0.5" dy="0.5" stdDeviation="0.5" flood-color="#0A1128" flood-opacity="0.6"/>
    </filter>
    <filter id="cloudShadowNight" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#0A1128" flood-opacity="0.6"/>
    </filter>
  </defs>

  <style>
    .bgLayerNight {
      animation: bgPulseNight 8s ease-in-out infinite;
    }
    .cloudMoveNight {
      animation: cloudFloatNight 6s ease-in-out infinite;
    }
    .drizzleGroup1Night {
      animation: fallSlowNight 2.5s linear infinite;
    }
    .drizzleGroup2Night {
      animation: fallSlowNight 2.8s linear infinite;
      animation-delay: 0.6s;
    }
    .twinkleStar { animation: twinkle 3s ease-in-out infinite; }
    .twinkleStarSlow { animation: twinkle 5s ease-in-out infinite; }
    
    /* Opóźnienia dla kropel – zachowane oryginalne klasy */
    .d1 { animation-delay: 0s; }
    .d2 { animation-delay: 0.3s; }
    .d3 { animation-delay: 0.7s; }
    .d4 { animation-delay: 1.1s; }
    .d5 { animation-delay: 0.15s; }
    .d6 { animation-delay: 0.55s; }
    .d7 { animation-delay: 0.9s; }
    .d8 { animation-delay: 1.3s; }
    .d9 { animation-delay: 0.4s; }
    .d10 { animation-delay: 0.8s; }
    .d11 { animation-delay: 1.2s; }
    .d12 { animation-delay: 0.2s; }
    .d13 { animation-delay: 0.6s; }
    .d14 { animation-delay: 1.0s; }
    .d15 { animation-delay: 1.4s; }

    @keyframes bgPulseNight {
      0%,100% { opacity: 0.85; }
      50% { opacity: 1; }
    }
    @keyframes cloudFloatNight {
      0%,100% { transform: translateX(0) translateY(0); }
      50% { transform: translateX(-3px) translateY(-2px); }
    }
    @keyframes fallSlowNight {
      0% { transform: translateY(-20px); opacity: 0; }
      15% { opacity: 0.8; }
      85% { opacity: 0.7; }
      100% { transform: translateY(45px); opacity: 0; }
    }
    @keyframes twinkle {
      0%,100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }
  </style>

  <!-- TŁO NOCNE -->
  <rect width="233" height="200" fill="url(#bgNight)" class="bgLayerNight"/>

  <!-- GWIAZDY -->
  <g fill="#FFFFFF">
    <circle cx="25" cy="30" r="1.2" class="twinkleStar" style="animation-delay: 0s"/>
    <circle cx="60" cy="15" r="0.8" class="twinkleStarSlow" style="animation-delay: 0.5s"/>
    <circle cx="100" cy="45" r="1" class="twinkleStar" style="animation-delay: 1.2s"/>
    <circle cx="160" cy="20" r="1.3" class="twinkleStar" style="animation-delay: 2s"/>
    <circle cx="210" cy="30" r="0.9" class="twinkleStarSlow" style="animation-delay: 0.8s"/>
    <circle cx="195" cy="65" r="1.1" class="twinkleStar" style="animation-delay: 1.5s"/>
    <circle cx="35" cy="80" r="0.7" class="twinkleStar" style="animation-delay: 2.5s"/>
    <circle cx="15" cy="130" r="1" class="twinkleStarSlow" style="animation-delay: 0.3s"/>
    <circle cx="50" cy="170" r="0.9" class="twinkleStar" style="animation-delay: 1.8s"/>
    <circle cx="90" cy="185" r="1.2" class="twinkleStar" style="animation-delay: 2.2s"/>
    <circle cx="140" cy="170" r="0.8" class="twinkleStarSlow" style="animation-delay: 0.6s"/>
    <circle cx="180" cy="185" r="1" class="twinkleStar" style="animation-delay: 1.1s"/>
    <circle cx="215" cy="140" r="1.3" class="twinkleStar" style="animation-delay: 2.8s"/>
    <circle cx="175" cy="105" r="0.9" class="twinkleStarSlow" style="animation-delay: 1.4s"/>
    <circle cx="55" cy="105" r="0.6" class="twinkleStar" style="animation-delay: 3s"/>
    <circle cx="135" cy="55" r="1.1" class="twinkleStar" style="animation-delay: 0.9s"/>
    <circle cx="80" cy="65" r="0.8" class="twinkleStarSlow" style="animation-delay: 1.7s"/>
    <circle cx="200" cy="95" r="0.7" class="twinkleStar" style="animation-delay: 2.3s"/>
  </g>

  <!-- ŚLADY LODOWEJ MGIEŁKI NOCNEJ PRZY PODŁOŻU -->
  <ellipse cx="115" cy="188" rx="85" ry="8" fill="#90CAF9" opacity="0.15" filter="url(#iceGlowNight)"/>

  <!-- CHMURA NOCNA – ZIMOWA, PONURA, BEZ KSIĘŻYCA -->
  <g class="cloudMoveNight" filter="url(#cloudShadowNight)">
    <path d="M 40,120 
             C 40,100 60,88 78,92 
             C 88,72 120,65 138,78 
             C 152,70 175,78 182,98 
             C 198,100 205,112 198,124 
             C 192,136 170,138 158,132 
             L 65,134 
             C 48,136 38,130 40,120 Z" 
          fill="url(#cloudWinterNight)"/>
    <!-- JAŚNIEJSZY AKCENT NA CHMURZE (nocny) -->
    <path d="M 70,105 C 80,90 105,85 125,93 C 135,88 152,92 158,106 C 165,102 175,108 172,118 C 168,126 148,128 135,124 L 85,126 C 73,127 66,120 70,105 Z" 
          fill="#A0B8CC" opacity="0.25"/>
  </g>

  <!-- KROPELKI NOCNEJ MŻAWKI – Z CIENIEM -->
  <!-- Grupa 1 -->
  <g class="drizzleGroup1Night" filter="url(#dropShadowNight)">
    <circle cx="70" cy="130" r="2.5" fill="url(#iceDropNight)" class="d1"/>
    <circle cx="95" cy="125" r="2" fill="url(#iceDropNight)" class="d2"/>
    <circle cx="120" cy="135" r="2.5" fill="url(#iceDropNight)" class="d3"/>
    <circle cx="145" cy="128" r="2" fill="url(#iceDropNight)" class="d4"/>
    <circle cx="160" cy="140" r="2" fill="url(#iceDropNight)" class="d5"/>
    <circle cx="55" cy="145" r="1.8" fill="url(#iceDropNight)" class="d6"/>
    <circle cx="85" cy="150" r="2.2" fill="url(#iceDropNight)" class="d7"/>
    <circle cx="110" cy="142" r="2.5" fill="url(#iceDropNight)" class="d8"/>
  </g>

  <!-- Grupa 2 -->
  <g class="drizzleGroup2Night" filter="url(#dropShadowNight)">
    <circle cx="80" cy="138" r="2" fill="url(#iceDropNight)" class="d9"/>
    <circle cx="105" cy="130" r="2.5" fill="url(#iceDropNight)" class="d10"/>
    <circle cx="130" cy="145" r="2" fill="url(#iceDropNight)" class="d11"/>
    <circle cx="150" cy="132" r="2.2" fill="url(#iceDropNight)" class="d12"/>
    <circle cx="65" cy="155" r="1.8" fill="url(#iceDropNight)" class="d13"/>
    <circle cx="100" cy="148" r="2.5" fill="url(#iceDropNight)" class="d14"/>
    <circle cx="140" cy="152" r="2" fill="url(#iceDropNight)" class="d15"/>
    <circle cx="47" cy="135" r="1.5" fill="url(#iceDropNight)" class="d1"/>
    <circle cx="175" cy="138" r="1.5" fill="url(#iceDropNight)" class="d4"/>
  </g>

  <!-- BARDZO DROBNE KROPELKI (gęsta nocna mżawka) -->
  <g class="drizzleGroup1Night" opacity="0.6" filter="url(#dropShadowNight)">
    <circle cx="90" cy="160" r="1" fill="#FFFFFF" class="d2"/>
    <circle cx="115" cy="165" r="1" fill="#FFFFFF" class="d5"/>
    <circle cx="135" cy="158" r="1" fill="#FFFFFF" class="d8"/>
    <circle cx="75" cy="168" r="1" fill="#FFFFFF" class="d11"/>
    <circle cx="155" cy="162" r="1" fill="#FFFFFF" class="d14"/>
  </g>
</svg>