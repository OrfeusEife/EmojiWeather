<svg width="233" height="200" viewBox="0 0 233 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- TŁO: NOCNY, GRANATOWY GRADIENT ZANIKAJĄCY DO PRZEZROCZYSTOŚCI -->
    <radialGradient id="bgNight" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#0D1B2A" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#1A237E" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#283593" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#64B5F6" stop-opacity="0"/>
    </radialGradient>

    <!-- FILTR DO PŁATKÓW (miękka poświata nocna) -->
    <filter id="snowGlowNight" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- SYMBOL PŁATKA ŚNIEGU NOCNEGO (środek w 0,0) – jaśniejszy, niebieskawy -->
    <g id="snowflakeNight" fill="none" stroke="#C0D8F0" stroke-width="1.8" stroke-linecap="round">
      <!-- 6 ramion (co 60°) -->
      <g>
        <line x1="0" y1="0" x2="0" y2="-38" />
        <line x1="0" y1="-25" x2="-6" y2="-32" />
        <line x1="0" y1="-25" x2="6" y2="-32" />
        <line x1="0" y1="-12" x2="-6" y2="-15" />
        <line x1="0" y1="-12" x2="6" y2="-15" />
      </g>
      <g transform="rotate(60)">
        <line x1="0" y1="0" x2="0" y2="-38" />
        <line x1="0" y1="-25" x2="-6" y2="-32" />
        <line x1="0" y1="-25" x2="6" y2="-32" />
        <line x1="0" y1="-12" x2="-6" y2="-15" />
        <line x1="0" y1="-12" x2="6" y2="-15" />
      </g>
      <g transform="rotate(120)">
        <line x1="0" y1="0" x2="0" y2="-38" />
        <line x1="0" y1="-25" x2="-6" y2="-32" />
        <line x1="0" y1="-25" x2="6" y2="-32" />
        <line x1="0" y1="-12" x2="-6" y2="-15" />
        <line x1="0" y1="-12" x2="6" y2="-15" />
      </g>
      <g transform="rotate(180)">
        <line x1="0" y1="0" x2="0" y2="-38" />
        <line x1="0" y1="-25" x2="-6" y2="-32" />
        <line x1="0" y1="-25" x2="6" y2="-32" />
        <line x1="0" y1="-12" x2="-6" y2="-15" />
        <line x1="0" y1="-12" x2="6" y2="-15" />
      </g>
      <g transform="rotate(240)">
        <line x1="0" y1="0" x2="0" y2="-38" />
        <line x1="0" y1="-25" x2="-6" y2="-32" />
        <line x1="0" y1="-25" x2="6" y2="-32" />
        <line x1="0" y1="-12" x2="-6" y2="-15" />
        <line x1="0" y1="-12" x2="6" y2="-15" />
      </g>
      <g transform="rotate(300)">
        <line x1="0" y1="0" x2="0" y2="-38" />
        <line x1="0" y1="-25" x2="-6" y2="-32" />
        <line x1="0" y1="-25" x2="6" y2="-32" />
        <line x1="0" y1="-12" x2="-6" y2="-15" />
        <line x1="0" y1="-12" x2="6" y2="-15" />
      </g>
      <!-- Środkowa kropka i akcenty (jaśniejsze) -->
      <circle cx="0" cy="0" r="2.5" fill="#FFFFFF" stroke="none"/>
      <circle cx="0" cy="-32" r="1.5" fill="#FFFFFF" stroke="none"/>
      <circle cx="0" cy="-18" r="1" fill="#FFFFFF" stroke="none"/>
    </g>
  </defs>

  <style>
    .bgLayerNight { animation: bgPulseNight 8s ease-in-out infinite; }
    .horizontalLineNight { animation: moveLeftRightNight 12s ease-in-out infinite; }
    .twinkleStar { animation: twinkle 3s ease-in-out infinite; }
    .twinkleStarSlow { animation: twinkle 5s ease-in-out infinite; }
    
    /* Animacje dla płatków – każdy ma inny czas i opóźnienie (zachowane) */
    .sf1 { animation: rotateSnowNight 6s linear infinite; }
    .sf2 { animation: rotateSnowNight 5s linear infinite; }
    .sf3 { animation: rotateSnowNight 4s linear infinite; }
    .sf4 { animation: rotateSnowNight 7s linear infinite; }
    
    @keyframes bgPulseNight {
      0%,100% { opacity: 0.85; }
      50% { opacity: 1; }
    }
    @keyframes moveLeftRightNight {
      0% { transform: translateX(-20px); }
      50% { transform: translateX(20px); }
      100% { transform: translateX(-20px); }
    }
    @keyframes rotateSnowNight {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes twinkle {
      0%,100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }
  </style>

  <!-- TŁO NOCNE -->
  <rect width="233" height="200" fill="url(#bgNight)" class="bgLayerNight"/>

  <!-- GWIAZDY -->
  <g fill="#FFFFFF">
    <circle cx="25" cy="30" r="1.2" class="twinkleStar" style="animation-delay: 0s"/>
    <circle cx="60" cy="15" r="0.8" class="twinkleStarSlow" style="animation-delay: 0.5s"/>
    <circle cx="100" cy="45" r="1" class="twinkleStar" style="animation-delay: 1.2s"/>
    <circle cx="160" cy="20" r="1.3" class="twinkleStar" style="animation-delay: 2s"/>
    <circle cx="210" cy="30" r="0.9" class="twinkleStarSlow" style="animation-delay: 0.8s"/>
    <circle cx="195" cy="65" r="1.1" class="twinkleStar" style="animation-delay: 1.5s"/>
    <circle cx="35" cy="80" r="0.7" class="twinkleStar" style="animation-delay: 2.5s"/>
    <circle cx="15" cy="130" r="1" class="twinkleStarSlow" style="animation-delay: 0.3s"/>
    <circle cx="50" cy="170" r="0.9" class="twinkleStar" style="animation-delay: 1.8s"/>
    <circle cx="90" cy="185" r="1.2" class="twinkleStar" style="animation-delay: 2.2s"/>
    <circle cx="140" cy="170" r="0.8" class="twinkleStarSlow" style="animation-delay: 0.6s"/>
    <circle cx="180" cy="185" r="1" class="twinkleStar" style="animation-delay: 1.1s"/>
    <circle cx="215" cy="140" r="1.3" class="twinkleStar" style="animation-delay: 2.8s"/>
    <circle cx="175" cy="105" r="0.9" class="twinkleStarSlow" style="animation-delay: 1.4s"/>
    <circle cx="55" cy="105" r="0.6" class="twinkleStar" style="animation-delay: 3s"/>
    <circle cx="135" cy="55" r="1.1" class="twinkleStar" style="animation-delay: 0.9s"/>
    <circle cx="80" cy="65" r="0.8" class="twinkleStarSlow" style="animation-delay: 1.7s"/>
    <circle cx="200" cy="95" r="0.7" class="twinkleStar" style="animation-delay: 2.3s"/>
  </g>

  <!-- PŁATKI ŚNIEGU NOCNE -->
  <!-- Duży płatek centralnie (w miejscu głównej chmury) -->
  <g transform="translate(116, 100)">
    <g class="sf1" filter="url(#snowGlowNight)">
      <use href="#snowflakeNight" transform="scale(1.3)"/>
    </g>
  </g>

  

  <!-- POZIOME KRESKI NOCNE (symbolizujące wiatr lub śnieg) – SREBRZYSTO-NIEBIESKIE -->
  <g stroke="#90CAF9" stroke-width="2.5" stroke-dasharray="30 18 20 8" opacity="0.4">
    <line class="horizontalLineNight" x1="30" y1="155" x2="220" y2="155" style="animation-duration: 4s; animation-delay: -5s;" />
    <line class="horizontalLineNight" x1="40" y1="170" x2="230" y2="170" style="animation-duration: 6s; animation-delay: -2s;" />
    <line class="horizontalLineNight" x1="25" y1="185" x2="215" y2="185" style="animation-duration: 9s; animation-delay: -1s;" />
  </g>
</svg>