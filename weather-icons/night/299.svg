<svg width="233" height="200" viewBox="0 0 233 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- TŁO: NOCNY RADIALNY GRADIENT ZANIKAJĄCY DO PRZEZROCZYSTOŚCI -->
    <radialGradient id="bgNight" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#0D1B2A" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#1A237E" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#283593" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#64B5F6" stop-opacity="0"/>
    </radialGradient>

    <!-- KSIĘŻYC Z POŚWIATĄ -->
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E3F2FD" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#90CAF9" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1A237E" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="moonCore" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#B0BEC5"/>
    </linearGradient>

    <!-- CHMURA NOCNA: CIEMNIEJSZA, SREBRZYSTO-GRANATOWA -->
    <radialGradient id="cloudNight" cx="30%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#E0E7FF"/>
      <stop offset="45%" stop-color="#9FABC9"/>
      <stop offset="80%" stop-color="#5C6A92"/>
      <stop offset="100%" stop-color="#2C3A5E"/>
    </radialGradient>

    <!-- DESZCZ NOCNY: SREBRZYSTO-NIEBIESKI -->
    <linearGradient id="rainNight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B0C4DE"/>
      <stop offset="100%" stop-color="#607D8B"/>
    </linearGradient>

    <!-- FILTRY -->
    <filter id="moonGlowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="cloudShadowNight" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0A1128" flood-opacity="0.6"/>
    </filter>
    <filter id="rainBlurNight" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
  </defs>

  <style>
    .bgLayerNight {
      animation: bgPulseNight 8s ease-in-out infinite;
    }
    .moonMove {
      animation: moonGlideNight 10s ease-in-out infinite alternate;
      transform-origin: 65px 65px;
    }
    .cloudMoveNight {
      animation: cloudFloatNight 5s ease-in-out infinite;
    }
    .rainDropNight {
      animation: fallModerateNight 1.6s linear infinite;
    }
    .twinkleStar { animation: twinkle 3s ease-in-out infinite; }
    .twinkleStarSlow { animation: twinkle 5s ease-in-out infinite; }
    
    /* Opóźnienia dla kropel – tworzą ciągły, umiarkowany deszcz */
    .d1 { animation-delay: 0s; }
    .d2 { animation-delay: 0.2s; }
    .d3 { animation-delay: 0.4s; }
    .d4 { animation-delay: 0.6s; }
    .d5 { animation-delay: 0.8s; }
    .d6 { animation-delay: 1.0s; }
    .d7 { animation-delay: 0.1s; }
    .d8 { animation-delay: 0.3s; }
    .d9 { animation-delay: 0.5s; }
    .d10 { animation-delay: 0.7s; }
    .d11 { animation-delay: 0.9s; }
    .d12 { animation-delay: 1.1s; }

    @keyframes bgPulseNight {
      0%,100% { opacity: 0.85; }
      50% { opacity: 1; }
    }
    @keyframes moonGlideNight {
      0% { transform: translateX(0) translateY(0); }
      100% { transform: translateX(15px) translateY(-5px); }
    }
    @keyframes cloudFloatNight {
      0%,100% { transform: translateX(0) translateY(0); }
      50% { transform: translateX(-3px) translateY(-2px); }
    }
    @keyframes fallModerateNight {
      0% { transform: translateY(-20px); opacity: 0; }
      20% { opacity: 0.7; }
      80% { opacity: 0.6; }
      100% { transform: translateY(45px); opacity: 0; }
    }
    @keyframes twinkle {
      0%,100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }
  </style>

  <!-- TŁO NOCNE -->
  <rect width="233" height="200" fill="url(#bgNight)" class="bgLayerNight"/>

  <!-- GWIAZDY -->
  <g fill="#FFFFFF">
    <circle cx="25" cy="30" r="1.2" class="twinkleStar" style="animation-delay: 0s"/>
    <circle cx="60" cy="15" r="0.8" class="twinkleStarSlow" style="animation-delay: 0.5s"/>
    <circle cx="100" cy="45" r="1" class="twinkleStar" style="animation-delay: 1.2s"/>
    <circle cx="160" cy="20" r="1.3" class="twinkleStar" style="animation-delay: 2s"/>
    <circle cx="210" cy="30" r="0.9" class="twinkleStarSlow" style="animation-delay: 0.8s"/>
    <circle cx="195" cy="65" r="1.1" class="twinkleStar" style="animation-delay: 1.5s"/>
    <circle cx="35" cy="80" r="0.7" class="twinkleStar" style="animation-delay: 2.5s"/>
    <circle cx="15" cy="130" r="1" class="twinkleStarSlow" style="animation-delay: 0.3s"/>
    <circle cx="50" cy="170" r="0.9" class="twinkleStar" style="animation-delay: 1.8s"/>
    <circle cx="90" cy="185" r="1.2" class="twinkleStar" style="animation-delay: 2.2s"/>
    <circle cx="140" cy="170" r="0.8" class="twinkleStarSlow" style="animation-delay: 0.6s"/>
    <circle cx="180" cy="185" r="1" class="twinkleStar" style="animation-delay: 1.1s"/>
    <circle cx="215" cy="140" r="1.3" class="twinkleStar" style="animation-delay: 2.8s"/>
    <circle cx="175" cy="105" r="0.9" class="twinkleStarSlow" style="animation-delay: 1.4s"/>
    <circle cx="55" cy="105" r="0.6" class="twinkleStar" style="animation-delay: 3s"/>
    <circle cx="135" cy="55" r="1.1" class="twinkleStar" style="animation-delay: 0.9s"/>
    <circle cx="80" cy="65" r="0.8" class="twinkleStarSlow" style="animation-delay: 1.7s"/>
    <circle cx="200" cy="95" r="0.7" class="twinkleStar" style="animation-delay: 2.3s"/>
  </g>

  <!-- KSIĘŻYC Z PRZEJAŚNIENIAMI (WIDOCZNY Z LEWEJ STRONY) -->
  <g class="moonMove">
    <circle cx="65" cy="65" r="38" fill="url(#moonGlow)" filter="url(#moonGlowFilter)"/>
    <circle cx="65" cy="65" r="24" fill="url(#moonCore)" filter="url(#moonGlowFilter)" opacity="0.95"/>
    <circle cx="65" cy="65" r="20" fill="url(#moonCore)"/>
    <!-- Kratery -->
    <circle cx="58" cy="58" r="4" fill="#CFD8DC" opacity="0.35"/>
    <circle cx="72" cy="66" r="3.5" fill="#CFD8DC" opacity="0.3"/>
    <circle cx="63" cy="73" r="2.5" fill="#CFD8DC" opacity="0.4"/>
    <!-- Odblaski -->
    <circle cx="58" cy="58" r="2.5" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="72" cy="62" r="2" fill="#FFFFFF" opacity="0.5"/>
    <circle cx="62" cy="73" r="1.5" fill="#FFFFFF" opacity="0.4"/>
  </g>

  <!-- CHMURA NOCNA – PRZESUNIĘTA NIEZNACZNIE W PRAWO, BY KSIĘŻYC BYŁ WIDOCZNY -->
  <g class="cloudMoveNight" filter="url(#cloudShadowNight)">
    <path d="M 60,115 
             C 60,95 80,85 95,90 
             C 105,70 135,65 150,80 
             C 165,75 185,85 190,105 
             C 205,105 210,115 205,125 
             C 200,135 180,135 170,130 
             L 80,130 
             C 65,130 55,125 60,115 Z" 
          fill="url(#cloudNight)"/>
    <path d="M 80,105 C 90,90 115,85 135,93 C 145,88 162,92 168,106 C 175,102 185,108 182,118 C 178,126 158,128 145,124 L 95,126 C 83,127 76,120 80,105 Z" 
          fill="#D0D8F0" opacity="0.3"/>
  </g>

  <!-- KROPLE NOCNEGO DESZCZU (UMIARKOWANY DESZCZ – 12 KROPLI) -->
  <g filter="url(#rainBlurNight)">
    <path class="rainDropNight d1" d="M90 135 C90 135 86 142 86 145 C86 148 88 150 90 150 C92 150 94 148 94 145 C94 142 90 135 90 135Z" fill="url(#rainNight)"/>
    <path class="rainDropNight d2" d="M115 132 C115 132 111 139 111 142 C111 145 113 147 115 147 C117 147 119 145 119 142 C119 139 115 132 115 132Z" fill="url(#rainNight)"/>
    <path class="rainDropNight d3" d="M140 130 C140 130 136 137 136 140 C136 143 138 145 140 145 C142 145 144 143 144 140 C144 137 140 130 140 130Z" fill="url(#rainNight)"/>
    <path class="rainDropNight d4" d="M165 135 C165 135 161 142 161 145 C161 148 163 150 165 150 C167 150 169 148 169 145 C169 142 165 135 165 135Z" fill="url(#rainNight)"/>
    <path class="rainDropNight d5" d="M105 140 C105 140 101 147 101 150 C101 153 103 155 105 155 C107 155 109 153 109 150 C109 147 105 140 105 140Z" fill="url(#rainNight)"/>
    <path class="rainDropNight d6" d="M130 138 C130 138 126 145 126 148 C126 151 128 153 130 153 C132 153 134 151 134 148 C134 145 130 138 130 138Z" fill="url(#rainNight)"/>
    <path class="rainDropNight d7" d="M100 145 C100 145 96 152 96 155 C96 158 98 160 100 160 C102 160 104 158 104 155 C104 152 100 145 100 145Z" fill="url(#rainNight)"/>
    <path class="rainDropNight d8" d="M125 142 C125 142 121 149 121 152 C121 155 123 157 125 157 C127 157 129 155 129 152 C129 149 125 142 125 142Z" fill="url(#rainNight)"/>
    <path class="rainDropNight d9" d="M150 140 C150 140 146 147 146 150 C146 153 148 155 150 155 C152 155 154 153 154 150 C154 147 150 140 150 140Z" fill="url(#rainNight)"/>
    <path class="rainDropNight d10" d="M80 148 C80 148 76 155 76 158 C76 161 78 163 80 163 C82 163 84 161 84 158 C84 155 80 148 80 148Z" fill="url(#rainNight)"/>
    <path class="rainDropNight d11" d="M155 145 C155 145 151 152 151 155 C151 158 153 160 155 160 C157 160 159 158 159 155 C159 152 155 145 155 145Z" fill="url(#rainNight)"/>
    <path class="rainDropNight d12" d="M110 150 C110 150 106 157 106 160 C106 163 108 165 110 165 C112 165 114 163 114 160 C114 157 110 150 110 150Z" fill="url(#rainNight)"/>
  </g>

  <!-- WILGOTNE ODBLYSKI NOCNE NA DOLE -->
  <ellipse cx="115" cy="186" rx="70" ry="5" fill="#90CAF9" opacity="0.15" filter="url(#moonGlowFilter)"/>
</svg>