<svg width="233" height="200" viewBox="0 0 233 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- TŁO: NOCNY BURZOWY GRADIENT Z PRZEZROCZYSTOŚCIĄ -->
    <radialGradient id="bgNight" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#0D1B2A" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#1A237E" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#283593" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#64B5F6" stop-opacity="0"/>
    </radialGradient>

    <!-- CHMURA NOCNA: CIEMNA, ZIMOWA, GRANATOWA -->
    <radialGradient id="cloudNight" cx="30%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#5A6A82"/>
      <stop offset="45%" stop-color="#3A4A62"/>
      <stop offset="80%" stop-color="#2A3A52"/>
      <stop offset="100%" stop-color="#1A2A3A"/>
    </radialGradient>

    <!-- PŁATEK ŚNIEGU NOCNY -->
    <radialGradient id="snowDotNight" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#A0C8F0" stop-opacity="0.3"/>
    </radialGradient>

    <!-- PODMUD WIATRU NOCNE: FALUJĄCE SMUGI Z CHŁODNYM GRADIENTEM -->
    <linearGradient id="gustGradNight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="30%" stop-color="#D0E8FF" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#B0D0F0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="gustGradNight2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="40%" stop-color="#A0C8E8" stop-opacity="0.6"/>
      <stop offset="80%" stop-color="#80B0D0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- FILTRY -->
    <filter id="cloudShadowNight" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0A1128" flood-opacity="0.7"/>
    </filter>
    <filter id="snowGlowNight" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
    <filter id="gustBlurNight" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1 3"/>
    </filter>
    <filter id="softBlurNight" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <style>
    .bgLayerNight { animation: bgPulseNight 6s ease-in-out infinite; }
    .cloudMoveNight { animation: cloudFloatNight 5s ease-in-out infinite; }
    
    /* PODMUCHY WIATRU – falujące ścieżki (nocne) */
    .gustNight {
      animation: gustBlowNight 3s ease-in-out infinite;
      filter: url(#gustBlurNight);
    }
    .gustFastNight {
      animation: gustFastBlowNight 2s ease-in-out infinite;
      filter: url(#gustBlurNight);
    }
    .gustSlowNight {
      animation: gustSlowBlowNight 4s ease-in-out infinite;
      filter: url(#gustBlurNight);
    }
    
    /* PŁATKI ŚNIEGU (wirowane) */
    .flurryNight {
      animation: snowFlurryNight 2.5s ease-in-out infinite;
    }
    
    /* GWIAZDY */
    .twinkleStar { animation: twinkle 3s ease-in-out infinite; }
    .twinkleStarSlow { animation: twinkle 5s ease-in-out infinite; }
    
    /* Opóźnienia dla podmuchów (zachowane oryginalne klasy) */
    .g1 { animation-delay: 0.0s; }
    .g2 { animation-delay: 0.4s; }
    .g3 { animation-delay: 0.8s; }
    .g4 { animation-delay: 1.2s; }
    .g5 { animation-delay: 1.6s; }
    .g6 { animation-delay: 0.2s; }
    .g7 { animation-delay: 0.6s; }
    .g8 { animation-delay: 1.0s; }
    .g9 { animation-delay: 1.4s; }
    .g10 { animation-delay: 1.8s; }
    
    /* Opóźnienia dla płatków (30 sztuk) */
    .f1 { animation-delay: 0.0s; }
    .f2 { animation-delay: 0.15s; }
    .f3 { animation-delay: 0.30s; }
    .f4 { animation-delay: 0.45s; }
    .f5 { animation-delay: 0.60s; }
    .f6 { animation-delay: 0.75s; }
    .f7 { animation-delay: 0.90s; }
    .f8 { animation-delay: 1.05s; }
    .f9 { animation-delay: 1.20s; }
    .f10 { animation-delay: 1.35s; }
    .f11 { animation-delay: 1.50s; }
    .f12 { animation-delay: 1.65s; }
    .f13 { animation-delay: 1.80s; }
    .f14 { animation-delay: 1.95s; }
    .f15 { animation-delay: 2.10s; }
    .f16 { animation-delay: 0.08s; }
    .f17 { animation-delay: 0.23s; }
    .f18 { animation-delay: 0.38s; }
    .f19 { animation-delay: 0.53s; }
    .f20 { animation-delay: 0.68s; }
    .f21 { animation-delay: 0.83s; }
    .f22 { animation-delay: 0.98s; }
    .f23 { animation-delay: 1.13s; }
    .f24 { animation-delay: 1.28s; }
    .f25 { animation-delay: 1.43s; }
    .f26 { animation-delay: 1.58s; }
    .f27 { animation-delay: 1.73s; }
    .f28 { animation-delay: 1.88s; }
    .f29 { animation-delay: 2.03s; }
    .f30 { animation-delay: 2.18s; }

    @keyframes bgPulseNight {
      0%,100% { opacity: 0.85; }
      50% { opacity: 1; }
    }
    @keyframes cloudFloatNight {
      0%,100% { transform: translateX(0) translateY(0); }
      50% { transform: translateX(-5px) translateY(-3px); }
    }
    
    /* Podmuchy – przelot od prawej do lewej z falowaniem (nocne) */
    @keyframes gustBlowNight {
      0% { transform: translateX(80px) translateY(-20px) scaleX(0.8); opacity: 0; }
      20% { opacity: 0.7; }
      80% { opacity: 0.5; }
      100% { transform: translateX(-120px) translateY(30px) scaleX(1.2); opacity: 0; }
    }
    @keyframes gustFastBlowNight {
      0% { transform: translateX(60px) translateY(-10px) scaleX(0.7); opacity: 0; }
      20% { opacity: 0.8; }
      80% { opacity: 0.4; }
      100% { transform: translateX(-140px) translateY(40px) scaleX(1.3); opacity: 0; }
    }
    @keyframes gustSlowBlowNight {
      0% { transform: translateX(100px) translateY(-30px) scaleX(0.9); opacity: 0; }
      20% { opacity: 0.6; }
      80% { opacity: 0.4; }
      100% { transform: translateX(-100px) translateY(20px) scaleX(1.1); opacity: 0; }
    }
    
    /* Płatki śniegu – unoszone wiatrem (nocne) */
    @keyframes snowFlurryNight {
      0% { transform: translateX(40px) translateY(-20px) rotate(0deg); opacity: 0; }
      25% { opacity: 0.8; }
      75% { opacity: 0.6; }
      100% { transform: translateX(-60px) translateY(60px) rotate(540deg); opacity: 0; }
    }
    
    @keyframes twinkle {
      0%,100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }
  </style>

  <!-- TŁO NOCNE -->
  <rect width="233" height="200" fill="url(#bgNight)" class="bgLayerNight"/>

  <!-- GWIAZDY -->
  <g fill="#FFFFFF">
    <circle cx="25" cy="30" r="1.2" class="twinkleStar" style="animation-delay: 0s"/>
    <circle cx="60" cy="15" r="0.8" class="twinkleStarSlow" style="animation-delay: 0.5s"/>
    <circle cx="100" cy="45" r="1" class="twinkleStar" style="animation-delay: 1.2s"/>
    <circle cx="160" cy="20" r="1.3" class="twinkleStar" style="animation-delay: 2s"/>
    <circle cx="210" cy="30" r="0.9" class="twinkleStarSlow" style="animation-delay: 0.8s"/>
    <circle cx="195" cy="65" r="1.1" class="twinkleStar" style="animation-delay: 1.5s"/>
    <circle cx="35" cy="80" r="0.7" class="twinkleStar" style="animation-delay: 2.5s"/>
    <circle cx="15" cy="130" r="1" class="twinkleStarSlow" style="animation-delay: 0.3s"/>
    <circle cx="50" cy="170" r="0.9" class="twinkleStar" style="animation-delay: 1.8s"/>
    <circle cx="90" cy="185" r="1.2" class="twinkleStar" style="animation-delay: 2.2s"/>
    <circle cx="140" cy="170" r="0.8" class="twinkleStarSlow" style="animation-delay: 0.6s"/>
    <circle cx="180" cy="185" r="1" class="twinkleStar" style="animation-delay: 1.1s"/>
    <circle cx="215" cy="140" r="1.3" class="twinkleStar" style="animation-delay: 2.8s"/>
    <circle cx="175" cy="105" r="0.9" class="twinkleStarSlow" style="animation-delay: 1.4s"/>
    <circle cx="55" cy="105" r="0.6" class="twinkleStar" style="animation-delay: 3s"/>
    <circle cx="135" cy="55" r="1.1" class="twinkleStar" style="animation-delay: 0.9s"/>
    <circle cx="80" cy="65" r="0.8" class="twinkleStarSlow" style="animation-delay: 1.7s"/>
    <circle cx="200" cy="95" r="0.7" class="twinkleStar" style="animation-delay: 2.3s"/>
  </g>

  <!-- CHMURA NOCNA -->
  <g class="cloudMoveNight" filter="url(#cloudShadowNight)">
    <path d="M 40,115 C 40,95 60,82 78,88 C 88,68 120,60 138,75 C 152,68 175,76 182,96 C 198,98 205,110 198,124 C 192,136 170,138 158,132 L 65,134 C 48,136 38,130 40,115 Z" fill="url(#cloudNight)"/>
    <path d="M 70,105 C 80,88 105,82 125,90 C 135,85 152,90 158,104 C 165,100 175,106 172,118 C 168,126 148,128 135,124 L 85,126 C 73,127 66,120 70,105 Z" fill="#D0D8F0" opacity="0.1"/>
  </g>

  <!-- PODMUCHY WIATRU NOCNE (falujące smugi) -->
  <!-- Warstwa 1: szybsze podmuchy -->
  <g class="gustFastNight">
    <path class="gustFastNight g1" d="M 20,130 Q 60,125 100,135 T 180,130" fill="none" stroke="url(#gustGradNight)" stroke-width="4" stroke-linecap="round"/>
    <path class="gustFastNight g2" d="M 0,145 Q 50,140 110,155 T 200,145" fill="none" stroke="url(#gustGradNight2)" stroke-width="3" stroke-linecap="round"/>
    <path class="gustFastNight g3" d="M 30,160 Q 70,150 120,165 T 190,155" fill="none" stroke="url(#gustGradNight)" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Warstwa 2: wolniejsze, bardziej rozległe -->
  <g class="gustSlowNight">
    <path class="gustSlowNight g4" d="M 10,140 Q 80,130 140,150 T 210,135" fill="none" stroke="url(#gustGradNight2)" stroke-width="6" stroke-linecap="round"/>
    <path class="gustSlowNight g5" d="M -10,155 Q 60,145 120,165 T 220,150" fill="none" stroke="url(#gustGradNight)" stroke-width="4" stroke-linecap="round"/>
    <path class="gustSlowNight g6" d="M 20,170 Q 90,160 150,180 T 200,165" fill="none" stroke="url(#gustGradNight2)" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Warstwa 3: średnie, zróżnicowane -->
  <g class="gustNight">
    <path class="gustNight g7" d="M 40,125 Q 100,120 150,135 T 210,128" fill="none" stroke="url(#gustGradNight)" stroke-width="3" stroke-linecap="round"/>
    <path class="gustNight g8" d="M 5,150 Q 70,140 130,160 T 195,148" fill="none" stroke="url(#gustGradNight2)" stroke-width="4" stroke-linecap="round"/>
    <path class="gustNight g9" d="M 25,165 Q 80,155 140,175 T 205,160" fill="none" stroke="url(#gustGradNight)" stroke-width="5" stroke-linecap="round"/>
    <path class="gustNight g10" d="M 50,135 Q 110,125 160,145 T 215,132" fill="none" stroke="url(#gustGradNight2)" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- PŁATKI NOCNEGO ŚNIEGU (30 sztuk, unoszone przez wiatr) -->
  <g filter="url(#snowGlowNight)">
    <circle class="flurryNight f1" cx="30" cy="130" r="2" fill="url(#snowDotNight)"/>
    <circle class="flurryNight f2" cx="60" cy="145" r="2.5" fill="url(#snowDotNight)"/>
    <circle class="flurryNight f3" cx="90" cy="125" r="2" fill="url(#snowDotNight)"/>
    <circle class="flurryNight f4" cx="120" cy="140" r="3" fill="url(#snowDotNight)"/>
    <circle class="flurryNight f5" cx="150" cy="135" r="2" fill="url(#snowDotNight)"/>
    <circle class="flurryNight f6" cx="180" cy="150" r="2.5" fill="url(#snowDotNight)"/>
    <circle class="flurryNight f7" cx="25" cy="160" r="2" fill="url(#snowDotNight)"/>
    <circle class="flurryNight f8" cx="55" cy="170" r="2.5" fill="url(#snowDotNight)"/>
    <circle class="flurryNight f9" cx="85" cy="155" r="3" fill="url(#snowDotNight)"/>
    <circle class="flurryNight f10" cx="115" cy="165" r="2" fill="url(#snowDotNight)"/>
    <circle class="flurryNight f11" cx="145" cy="175" r="2.5" fill="url(#snowDotNight)"/>
    <circle class="flurryNight f12" cx="175" cy="160" r="2" fill="url(#snowDotNight)"/>
    <circle class="flurryNight f13" cx="40" cy="180" r="3" fill="url(#snowDotNight)"/>
    <circle class="flurryNight f14" cx="70" cy="185" r="2" fill="url(#snowDotNight)"/>
    <circle class="flurryNight f15" cx="100" cy="175" r="2.5" fill="url(#snowDotNight)"/>
    <circle class="flurryNight f16" cx="130" cy="188" r="2" fill="url(#snowDotNight)"/>
    <circle class="flurryNight f17" cx="160" cy="182" r="3" fill="url(#snowDotNight)"/>
    <circle class="flurryNight f18" cx="190" cy="170" r="2" fill="url(#snowDotNight)"/>
    <circle class="flurryNight f19" cx="15" cy="190" r="2.5" fill="url(#snowDotNight)"/>
    <circle class="flurryNight f20" cx="45" cy="195" r="2" fill="url(#snowDotNight)"/>
    <circle class="flurryNight f21" cx="75" cy="192" r="3" fill="url(#snowDotNight)"/>
    <circle class="flurryNight f22" cx="105" cy="198" r="2" fill="url(#snowDotNight)"/>
    <circle class="flurryNight f23" cx="135" cy="195" r="2.5" fill="url(#snowDotNight)"/>
    <circle class="flurryNight f24" cx="165" cy="190" r="2" fill="url(#snowDotNight)"/>
    <circle class="flurryNight f25" cx="195" cy="185" r="3" fill="url(#snowDotNight)"/>
    <circle class="flurryNight f26" cx="35" cy="138" r="2" fill="url(#snowDotNight)"/>
    <circle class="flurryNight f27" cx="65" cy="148" r="2.5" fill="url(#snowDotNight)"/>
    <circle class="flurryNight f28" cx="95" cy="142" r="2" fill="url(#snowDotNight)"/>
    <circle class="flurryNight f29" cx="125" cy="152" r="3" fill="url(#snowDotNight)"/>
    <circle class="flurryNight f30" cx="155" cy="145" r="2" fill="url(#snowDotNight)"/>
  </g>

  <!-- ROZPYLONY ŚNIEG NOCNY PRZY PODŁOŻU -->
  <ellipse cx="115" cy="192" rx="100" ry="8" fill="#90CAF9" opacity="0.15" filter="url(#softBlurNight)"/>
  <ellipse cx="115" cy="197" rx="70" ry="4" fill="#B0D0F0" opacity="0.1" filter="url(#softBlurNight)"/>
</svg>