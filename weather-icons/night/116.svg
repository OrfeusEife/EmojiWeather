<svg width="233" height="200" viewBox="0 0 233 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- TŁO: NOCNY GRADIENT Z PRZEZROCZYSTOŚCIĄ -->
    <radialGradient id="bgNightGlow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#0D1B2A" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#1A237E" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#283593" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#64B5F6" stop-opacity="0"/>
    </radialGradient>

    <!-- KSIĘŻYC: POŚWIATA -->
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E3F2FD" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#90CAF9" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1A237E" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="moonCore" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#B0BEC5"/>
    </linearGradient>

    <!-- CHMURKA NOCNA (ciemniejsza, srebrzysto-granatowa) -->
    <radialGradient id="cloudGradNight" cx="30%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#E0E7FF"/>
      <stop offset="45%" stop-color="#9FABC9"/>
      <stop offset="80%" stop-color="#5C6A92"/>
      <stop offset="100%" stop-color="#2C3A5E"/>
    </radialGradient>

    <!-- FILTRY -->
    <filter id="moonGlowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
    <filter id="cloudShadowNight" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0A1128" flood-opacity="0.6"/>
    </filter>
  </defs>

  <style>
    .bgLayerNight { animation: bgPulseNight 8s ease-in-out infinite; }
    .moonPulse { animation: moonPulseNight 4s ease-in-out infinite; transform-origin: 116px 100px; }
    .moonGlowAnim { animation: moonGlowPulse 4s ease-in-out infinite; transform-origin: 116px 100px; }
    .cloudMoveNight { animation: cloudFloatNight 6s ease-in-out infinite; }
    .twinkleStar { animation: twinkle 3s ease-in-out infinite; }
    .twinkleStarSlow { animation: twinkle 5s ease-in-out infinite; }

    @keyframes bgPulseNight { 0%,100% { opacity: 0.85; } 50% { opacity: 1; } }
    @keyframes moonPulseNight { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    @keyframes moonGlowPulse { 0%,100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.12); opacity: 0.8; } }
    @keyframes cloudFloatNight { 0%,100% { transform: translateX(0) translateY(0); } 50% { transform: translateX(-2px) translateY(-2px); } }
    @keyframes twinkle { 0%,100% { opacity: 0.2; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }
  </style>

  <!-- TŁO NOCNE -->
  <rect width="233" height="200" fill="url(#bgNightGlow)" class="bgLayerNight"/>

  <!-- GWIAZDY -->
  <g fill="#FFFFFF">
    <circle cx="25" cy="30" r="1.2" class="twinkleStar" style="animation-delay: 0s"/>
    <circle cx="55" cy="15" r="0.8" class="twinkleStarSlow" style="animation-delay: 0.5s"/>
    <circle cx="90" cy="45" r="1" class="twinkleStar" style="animation-delay: 1.2s"/>
    <circle cx="150" cy="20" r="1.3" class="twinkleStar" style="animation-delay: 2s"/>
    <circle cx="200" cy="35" r="0.9" class="twinkleStarSlow" style="animation-delay: 0.8s"/>
    <circle cx="215" cy="70" r="1.1" class="twinkleStar" style="animation-delay: 1.5s"/>
    <circle cx="30" cy="80" r="0.7" class="twinkleStar" style="animation-delay: 2.5s"/>
    <circle cx="15" cy="140" r="1" class="twinkleStarSlow" style="animation-delay: 0.3s"/>
    <circle cx="45" cy="170" r="0.9" class="twinkleStar" style="animation-delay: 1.8s"/>
    <circle cx="80" cy="185" r="1.2" class="twinkleStar" style="animation-delay: 2.2s"/>
    <circle cx="130" cy="175" r="0.8" class="twinkleStarSlow" style="animation-delay: 0.6s"/>
    <circle cx="170" cy="190" r="1" class="twinkleStar" style="animation-delay: 1.1s"/>
    <circle cx="210" cy="160" r="1.3" class="twinkleStar" style="animation-delay: 2.8s"/>
    <circle cx="195" cy="120" r="0.9" class="twinkleStarSlow" style="animation-delay: 1.4s"/>
    <circle cx="65" cy="110" r="0.6" class="twinkleStar" style="animation-delay: 3s"/>
    <circle cx="180" cy="80" r="1.1" class="twinkleStar" style="animation-delay: 0.9s"/>
  </g>

  <!-- POŚWIATA KSIĘŻYCA -->
  <circle cx="116" cy="100" r="52" fill="url(#moonGlow)" filter="url(#moonGlowFilter)" class="moonGlowAnim"/>

  <!-- KSIĘŻYC -->
  <g class="moonPulse">
    <circle cx="116" cy="100" r="32" fill="url(#moonCore)" filter="url(#moonGlowFilter)" opacity="0.95"/>
    <circle cx="116" cy="100" r="28" fill="url(#moonCore)"/>

    <!-- KRATERY -->
    <circle cx="106" cy="90" r="5" fill="#CFD8DC" opacity="0.35"/>
    <circle cx="124" cy="108" r="4.5" fill="#CFD8DC" opacity="0.3"/>
    <circle cx="112" cy="115" r="3" fill="#CFD8DC" opacity="0.4"/>
    <circle cx="130" cy="86" r="2.5" fill="#CFD8DC" opacity="0.25"/>
    <circle cx="100" cy="108" r="2" fill="#CFD8DC" opacity="0.35"/>
    <circle cx="120" cy="92" r="2" fill="#CFD8DC" opacity="0.3"/>

    <!-- ODBLASKI -->
    <circle cx="103" cy="94" r="3" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="125" cy="100" r="2.5" fill="#FFFFFF" opacity="0.4"/>
    <circle cx="114" cy="84" r="2" fill="#FFFFFF" opacity="0.5"/>
  </g>

  <!-- CHMURKA NOCNA (odbita lustrzanie, nachodząca z prawej) -->
  <g class="cloudMoveNight" filter="url(#cloudShadowNight)" transform="translate(240, 0) scale(-1, 1)">
    <path d="M 125,115 
             C 125,100 140,92 152,96 
             C 160,82 178,80 188,90 
             C 196,86 208,92 210,105 
             C 215,108 216,118 210,125 
             C 205,130 190,128 180,125 
             L 135,125 
             C 125,125 120,120 125,115 Z"
          fill="url(#cloudGradNight)"/>
  </g>
</svg>