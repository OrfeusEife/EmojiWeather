    <rect class="streakSlowNight st28" x="140" y="168" width="38" height="3" fill="url(#streakGradNight)" transform="rotate(-8, 159, 169)"/>
    <rect class="streakSlowNight st29" x="160" y="152" width="35" height="3" fill="url(#streakGradNight)" transform="rotate(-12, 177, 153)"/>
