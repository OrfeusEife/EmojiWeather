    <rect class="streakSlowNight st22" x="20" y="148" width="40" height="3" fill="url(#streakGradNight)" transform="rotate(-9, 40, 149)"/>
    <rect class="streakSlowNight st23" x="40" y="132" width="30" height="3" fill="url(#streakGradNight)" transform="rotate(-4, 55, 133)"/>
    <rect class="streakSlowNight st24" x="60" y="158" width="38" height="3" fill="url(#streakGradNight)" transform="rotate(-11, 79, 159)"/>
