<svg width="233" height="200" viewBox="0 0 233 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- TŁO: NOCNY BURZOWY GRADIENT ZANIKAJĄCY -->
    <radialGradient id="bgNight" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#0D1B2A" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#1A237E" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#283593" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#64B5F6" stop-opacity="0"/>
    </radialGradient>

    <!-- CHMURA NOCNA: CIEMNA, ZIMOWA, GRANATOWA -->
    <radialGradient id="cloudNight" cx="30%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#5A6A82"/>
      <stop offset="45%" stop-color="#3A4A62"/>
      <stop offset="80%" stop-color="#2A3A52"/>
      <stop offset="100%" stop-color="#1A2A3A"/>
    </radialGradient>

    <!-- PŁATEK ŚNIEGU NOCNY -->
    <radialGradient id="snowDotNight" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#A0C8F0" stop-opacity="0.4"/>
    </radialGradient>

    <!-- SMUGA ŚNIEŻNA NOCNA – DLA POZIOMYCH PODMICHÓW -->
    <linearGradient id="streakGradNight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="30%" stop-color="#D0E8FF" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#B0D0F0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- FILTRY -->
    <filter id="cloudShadowNight" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0A1128" flood-opacity="0.7"/>
    </filter>
    <filter id="snowGlowNight" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
    <filter id="motionBlurNight" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0 3"/>
    </filter>
    <filter id="heavyBlurNight" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5 4"/>
    </filter>
  </defs>

  <style>
    .bgLayerNight { animation: bgPulseNight 4s ease-in-out infinite; }
    .cloudMoveNight { animation: cloudFloatNight 5s ease-in-out infinite; }
    
    /* Szybkie smugi poziome (podmuchy) nocne */
    .streakFastNight {
      animation: streakHorizontalNight 0.8s linear infinite;
      filter: url(#motionBlurNight);
    }
    /* Wolniejsze smugi nocne */
    .streakSlowNight {
      animation: streakHorizontalNight 1.4s linear infinite;
      filter: url(#heavyBlurNight);
    }
    /* Płatki śniegu – wirowane i unoszone */
    .flurryNight {
      animation: snowBlowNight 2.0s ease-in-out infinite;
    }
    /* Dodatkowe drobne płatki */
    .dustNight {
      animation: dustBlowNight 1.6s ease-in-out infinite;
    }
    
    /* GWIAZDY */
    .twinkleStar { animation: twinkle 3s ease-in-out infinite; }
    .twinkleStarSlow { animation: twinkle 5s ease-in-out infinite; }
    
    /* Opóźnienia dla smug (40 smug) – zachowane oryginalne klasy */
    .st1 { animation-delay: 0.00s; }
    .st2 { animation-delay: 0.03s; }
    .st3 { animation-delay: 0.06s; }
    .st4 { animation-delay: 0.09s; }
    .st5 { animation-delay: 0.12s; }
    .st6 { animation-delay: 0.15s; }
    .st7 { animation-delay: 0.18s; }
    .st8 { animation-delay: 0.21s; }
    .st9 { animation-delay: 0.24s; }
    .st10 { animation-delay: 0.27s; }
    .st11 { animation-delay: 0.30s; }
    .st12 { animation-delay: 0.33s; }
    .st13 { animation-delay: 0.36s; }
    .st14 { animation-delay: 0.39s; }
    .st15 { animation-delay: 0.42s; }
    .st16 { animation-delay: 0.45s; }
    .st17 { animation-delay: 0.48s; }
    .st18 { animation-delay: 0.51s; }
    .st19 { animation-delay: 0.54s; }
    .st20 { animation-delay: 0.57s; }
    .st21 { animation-delay: 0.01s; }
    .st22 { animation-delay: 0.04s; }
    .st23 { animation-delay: 0.07s; }
    .st24 { animation-delay: 0.10s; }
    .st25 { animation-delay: 0.13s; }
    .st26 { animation-delay: 0.16s; }
    .st27 { animation-delay: 0.19s; }
    .st28 { animation-delay: 0.22s; }
    .st29 { animation-delay: 0.25s; }
    .st30 { animation-delay: 0.28s; }
    .st31 { animation-delay: 0.31s; }
    .st32 { animation-delay: 0.34s; }
    .st33 { animation-delay: 0.37s; }
    .st34 { animation-delay: 0.40s; }
    .st35 { animation-delay: 0.43s; }
    .st36 { animation-delay: 0.46s; }
    .st37 { animation-delay: 0.49s; }
    .st38 { animation-delay: 0.52s; }
    .st39 { animation-delay: 0.55s; }
    .st40 { animation-delay: 0.58s; }
    
    /* Opóźnienia dla płatków (50 sztuk) */
    .f1 { animation-delay: 0.00s; }
    .f2 { animation-delay: 0.10s; }
    .f3 { animation-delay: 0.20s; }
    .f4 { animation-delay: 0.30s; }
    .f5 { animation-delay: 0.40s; }
    .f6 { animation-delay: 0.50s; }
    .f7 { animation-delay: 0.60s; }
    .f8 { animation-delay: 0.70s; }
    .f9 { animation-delay: 0.80s; }
    .f10 { animation-delay: 0.90s; }
    .f11 { animation-delay: 1.00s; }
    .f12 { animation-delay: 1.10s; }
    .f13 { animation-delay: 1.20s; }
    .f14 { animation-delay: 1.30s; }
    .f15 { animation-delay: 1.40s; }
    .f16 { animation-delay: 1.50s; }
    .f17 { animation-delay: 1.60s; }
    .f18 { animation-delay: 1.70s; }
    .f19 { animation-delay: 1.80s; }
    .f20 { animation-delay: 1.90s; }
    .f21 { animation-delay: 0.05s; }
    .f22 { animation-delay: 0.15s; }
    .f23 { animation-delay: 0.25s; }
    .f24 { animation-delay: 0.35s; }
    .f25 { animation-delay: 0.45s; }
    .f26 { animation-delay: 0.55s; }
    .f27 { animation-delay: 0.65s; }
    .f28 { animation-delay: 0.75s; }
    .f29 { animation-delay: 0.85s; }
    .f30 { animation-delay: 0.95s; }
    .f31 { animation-delay: 1.05s; }
    .f32 { animation-delay: 1.15s; }
    .f33 { animation-delay: 1.25s; }
    .f34 { animation-delay: 1.35s; }
    .f35 { animation-delay: 1.45s; }
    .f36 { animation-delay: 1.55s; }
    .f37 { animation-delay: 1.65s; }
    .f38 { animation-delay: 1.75s; }
    .f39 { animation-delay: 1.85s; }
    .f40 { animation-delay: 1.95s; }
    
    /* Dodatkowe dla pyłu */
    .dust1 { animation-delay: 0.02s; }
    .dust2 { animation-delay: 0.08s; }
    .dust3 { animation-delay: 0.14s; }
    .dust4 { animation-delay: 0.20s; }
    .dust5 { animation-delay: 0.26s; }
    .dust6 { animation-delay: 0.32s; }
    .dust7 { animation-delay: 0.38s; }
    .dust8 { animation-delay: 0.44s; }
    .dust9 { animation-delay: 0.50s; }
    .dust10 { animation-delay: 0.56s; }

    @keyframes bgPulseNight {
      0%,100% { opacity: 0.85; }
      50% { opacity: 1; }
    }
    @keyframes cloudFloatNight {
      0%,100% { transform: translateX(0) translateY(0); }
      50% { transform: translateX(-6px) translateY(-4px); }
    }
    @keyframes streakHorizontalNight {
      0% { transform: translateX(80px) translateY(-10px); opacity: 0; }
      20% { opacity: 0.8; }
      80% { opacity: 0.5; }
      100% { transform: translateX(-120px) translateY(20px); opacity: 0; }
    }
    @keyframes snowBlowNight {
      0% { transform: translateX(50px) translateY(-30px) rotate(0deg); opacity: 0; }
      25% { opacity: 0.8; }
      75% { opacity: 0.5; }
      100% { transform: translateX(-70px) translateY(50px) rotate(720deg); opacity: 0; }
    }
    @keyframes dustBlowNight {
      0% { transform: translateX(30px) translateY(-15px); opacity: 0; }
      20% { opacity: 0.7; }
      80% { opacity: 0.4; }
      100% { transform: translateX(-80px) translateY(40px); opacity: 0; }
    }
    @keyframes twinkle {
      0%,100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }
  </style>

  <!-- TŁO NOCNE -->
  <rect width="233" height="200" fill="url(#bgNight)" class="bgLayerNight"/>

  <!-- GWIAZDY -->
  <g fill="#FFFFFF">
    <circle cx="25" cy="30" r="1.2" class="twinkleStar" style="animation-delay: 0s"/>
    <circle cx="60" cy="15" r="0.8" class="twinkleStarSlow" style="animation-delay: 0.5s"/>
    <circle cx="100" cy="45" r="1" class="twinkleStar" style="animation-delay: 1.2s"/>
    <circle cx="160" cy="20" r="1.3" class="twinkleStar" style="animation-delay: 2s"/>
    <circle cx="210" cy="30" r="0.9" class="twinkleStarSlow" style="animation-delay: 0.8s"/>
    <circle cx="195" cy="65" r="1.1" class="twinkleStar" style="animation-delay: 1.5s"/>
    <circle cx="35" cy="80" r="0.7" class="twinkleStar" style="animation-delay: 2.5s"/>
    <circle cx="15" cy="130" r="1" class="twinkleStarSlow" style="animation-delay: 0.3s"/>
    <circle cx="50" cy="170" r="0.9" class="twinkleStar" style="animation-delay: 1.8s"/>
    <circle cx="90" cy="185" r="1.2" class="twinkleStar" style="animation-delay: 2.2s"/>
    <circle cx="140" cy="170" r="0.8" class="twinkleStarSlow" style="animation-delay: 0.6s"/>
    <circle cx="180" cy="185" r="1" class="twinkleStar" style="animation-delay: 1.1s"/>
    <circle cx="215" cy="140" r="1.3" class="twinkleStar" style="animation-delay: 2.8s"/>
    <circle cx="175" cy="105" r="0.9" class="twinkleStarSlow" style="animation-delay: 1.4s"/>
    <circle cx="55" cy="105" r="0.6" class="twinkleStar" style="animation-delay: 3s"/>
    <circle cx="135" cy="55" r="1.1" class="twinkleStar" style="animation-delay: 0.9s"/>
    <circle cx="80" cy="65" r="0.8" class="twinkleStarSlow" style="animation-delay: 1.7s"/>
    <circle cx="200" cy="95" r="0.7" class="twinkleStar" style="animation-delay: 2.3s"/>
  </g>

  <!-- CHMURA NOCNA -->
  <g class="cloudMoveNight" filter="url(#cloudShadowNight)">
    <path d="M 40,115 C 40,95 60,82 78,88 C 88,68 120,60 138,75 C 152,68 175,76 182,96 C 198,98 205,110 198,124 C 192,136 170,138 158,132 L 65,134 C 48,136 38,130 40,115 Z" fill="url(#cloudNight)"/>
    <path d="M 70,105 C 80,88 105,82 125,90 C 135,85 152,90 158,104 C 165,100 175,106 172,118 C 168,126 148,128 135,124 L 85,126 C 73,127 66,120 70,105 Z" fill="#D0D8F0" opacity="0.08"/>
  </g>

