<svg width="233" height="200" viewBox="0 0 233 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- TŁO: NOCNY RADIALNY GRADIENT ZANIKAJĄCY DO PRZEZROCZYSTOŚCI -->
    <radialGradient id="bgNight" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#0D1B2A" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#1A237E" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#283593" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#64B5F6" stop-opacity="0"/>
    </radialGradient>

    <!-- CHMURA NOCNA: CIEMNIEJSZA, SREBRZYSTO-GRANATOWA -->
    <radialGradient id="cloudNight" cx="30%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#E0E7FF"/>
      <stop offset="45%" stop-color="#9FABC9"/>
      <stop offset="80%" stop-color="#5C6A92"/>
      <stop offset="100%" stop-color="#2C3A5E"/>
    </radialGradient>

    <!-- FILTRY -->
    <filter id="cloudShadowNight" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0A1128" flood-opacity="0.6"/>
    </filter>
  </defs>

  <style>
    .bgLayerNight {
      animation: bgPulseNight 8s ease-in-out infinite;
    }
    .cloudMoveNight {
      animation: cloudFloatNight 5s ease-in-out infinite;
    }
    .twinkleStar {
      animation: twinkle 3s ease-in-out infinite;
    }
    .twinkleStarSlow {
      animation: twinkle 5s ease-in-out infinite;
    }

    @keyframes bgPulseNight {
      0%,100% { opacity: 0.85; }
      50% { opacity: 1; }
    }
    @keyframes cloudFloatNight {
      0%,100% { transform: translateX(0) translateY(0); }
      50% { transform: translateX(-3px) translateY(-2px); }
    }
    @keyframes twinkle {
      0%,100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }
  </style>

  <!-- TŁO NOCNE -->
  <rect width="233" height="200" fill="url(#bgNight)" class="bgLayerNight"/>

  <!-- GWIAZDY -->
  <g fill="#FFFFFF">
    <circle cx="30" cy="25" r="1.2" class="twinkleStar" style="animation-delay: 0s"/>
    <circle cx="70" cy="15" r="0.8" class="twinkleStarSlow" style="animation-delay: 0.5s"/>
    <circle cx="110" cy="40" r="1" class="twinkleStar" style="animation-delay: 1.2s"/>
    <circle cx="170" cy="20" r="1.3" class="twinkleStar" style="animation-delay: 2s"/>
    <circle cx="210" cy="35" r="0.9" class="twinkleStarSlow" style="animation-delay: 0.8s"/>
    <circle cx="195" cy="70" r="1.1" class="twinkleStar" style="animation-delay: 1.5s"/>
    <circle cx="35" cy="80" r="0.7" class="twinkleStar" style="animation-delay: 2.5s"/>
    <circle cx="20" cy="140" r="1" class="twinkleStarSlow" style="animation-delay: 0.3s"/>
    <circle cx="50" cy="170" r="0.9" class="twinkleStar" style="animation-delay: 1.8s"/>
    <circle cx="90" cy="185" r="1.2" class="twinkleStar" style="animation-delay: 2.2s"/>
    <circle cx="150" cy="175" r="0.8" class="twinkleStarSlow" style="animation-delay: 0.6s"/>
    <circle cx="190" cy="190" r="1" class="twinkleStar" style="animation-delay: 1.1s"/>
    <circle cx="215" cy="150" r="1.3" class="twinkleStar" style="animation-delay: 2.8s"/>
    <circle cx="180" cy="110" r="0.9" class="twinkleStarSlow" style="animation-delay: 1.4s"/>
    <circle cx="55" cy="100" r="0.6" class="twinkleStar" style="animation-delay: 3s"/>
    <circle cx="145" cy="55" r="1.1" class="twinkleStar" style="animation-delay: 0.9s"/>
  </g>

  <!-- CHMURA NOCNA (ten sam kształt, tylko nocne kolory i cień) -->
  <path class="cloudMoveNight" filter="url(#cloudShadowNight)"
        d="M 50,115 
           C 50,95 70,85 85,90 
           C 95,70 125,65 140,80 
           C 155,75 175,85 180,105 
           C 195,105 200,115 195,125 
           C 190,135 170,135 160,130 
           L 70,130 
           C 55,130 45,125 50,115 Z"
        fill="url(#cloudNight)"/>

  <!-- DYSKRETNA MGIEŁKA NOCNA NA DOLE -->
  <ellipse cx="115" cy="188" rx="60" ry="4" fill="#1A237E" opacity="0.25" filter="url(#cloudShadowNight)"/>
</svg>